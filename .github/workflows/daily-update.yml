name: Daily Data Update

on:
  schedule:
    - cron: '30 0 * * 1-5'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run auto-update script
        run: python3 scripts/auto_update.py

      - name: Check for changes
        id: changes
        run: |
          git diff --exit-code site/api/portfolio.json || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add site/api/portfolio.json
          git commit -m "auto: update trading data for $(date -u +%Y-%m-%d -d '8 hours')" || echo "nothing to commit"
          git push origin main || echo "push failed"

      - name: Deploy to Cloudflare Pages
        if: steps.changes.outputs.changed == 'true'
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: a-share-review-dashboard
          directory: site
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
