<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A股短线复盘看板</title>
<meta name="theme-color" content="#0f1117">
<link rel="manifest" href="/manifest.json">
<style>
  :root {
    --bg: #0f1117; --card: #1a1d27; --card-hover: #22263a; --border: #2a2e3e;
    --text: #e4e6eb; --text-dim: #8b8fa3;
    --green: #ff1744; --green-bg: rgba(255,23,68,0.1);
    --red: #00c853; --red-bg: rgba(0,200,83,0.1);
    --yellow: #ffd600; --yellow-bg: rgba(255,214,0,0.08);
    --blue: #448aff; --blue-bg: rgba(68,138,255,0.1);
  }
  body.light {
    --bg: #f5f7fb; --card: #ffffff; --card-hover: #f0f3fa; --border: #dbe1ef;
    --text: #1e2433; --text-dim: #657089;
    --green-bg: rgba(255,23,68,0.08); --red-bg: rgba(0,150,72,0.08);
    --yellow: #b77900; --yellow-bg: rgba(255,184,0,0.14);
    --blue: #2563eb; --blue-bg: rgba(37,99,235,0.08);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background:var(--bg); color:var(--text); line-height:1.6; padding:20px; max-width:1400px; margin:0 auto; }
  h1 { font-size:1.6rem; }
  h2 { font-size:1.15rem; color:var(--yellow); margin-bottom:14px; padding-bottom:8px; border-bottom:1px solid var(--border); }
  h3 { font-size:0.95rem; color:var(--text-dim); margin-bottom:8px; }
  .pos { color:var(--green); } .neg { color:var(--red); } .warn { color:var(--yellow); }
  .tag { display:inline-block; padding:2px 8px; border-radius:6px; font-size:0.78rem; font-weight:600; }
  .tag-green { background:var(--green-bg); color:var(--green); }
  .tag-red { background:var(--red-bg); color:var(--red); }
  .tag-yellow { background:var(--yellow-bg); color:var(--yellow); }
  .tag-blue { background:var(--blue-bg); color:var(--blue); }
  .hl-yellow { background:var(--yellow-bg); padding:2px 8px; border-radius:4px; }
  .hl-green { background:var(--green-bg); padding:2px 8px; border-radius:4px; }
  .hl-red { background:var(--red-bg); padding:2px 8px; border-radius:4px; }
  .badge { display:inline-block; padding:1px 6px; border-radius:4px; font-size:0.75rem; font-weight:600; }
  .badge-hot { background:rgba(255,23,68,0.1); color:#ff1744; }
  .badge-strong { background:rgba(0,200,83,0.1); color:#00c853; }

  /* Header + Date picker */
  .header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:20px; flex-wrap:wrap; gap:12px; }
  .date-picker { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .date-picker button {
    background:var(--card); color:var(--text); border:1px solid var(--border);
    padding:6px 14px; border-radius:8px; cursor:pointer; font-size:0.85rem; transition:all 0.2s;
  }
  .date-picker button:hover { background:var(--card-hover); border-color:var(--yellow); }
  .date-picker button.active { background:var(--yellow-bg); border-color:var(--yellow); color:var(--yellow); }
  .date-picker select {
    background:var(--card); color:var(--text); border:1px solid var(--border);
    padding:6px 12px; border-radius:8px; font-size:0.85rem; cursor:pointer;
  }
  .toolbar { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .theme-toggle {
    background:var(--card); color:var(--text); border:1px solid var(--border);
    padding:6px 12px; border-radius:8px; cursor:pointer; font-size:0.85rem;
  }
  .theme-toggle:hover { border-color:var(--yellow); color:var(--yellow); }

  /* 金元宝icon - 点击弹出股市祝福语 */
  .ingot-icon { cursor:pointer; user-select:none; animation: ingotFloat 3s ease-in-out infinite; filter: drop-shadow(0 0 12px rgba(255,214,0,0.6)); transition: transform .2s; line-height:1; position:relative; width:56px; height:44px; display:flex; align-items:center; justify-content:center; }
  .ingot-icon .ingot-body { position:relative; width:48px; height:30px; background:linear-gradient(180deg,#fff3a3 0%,#ffd700 25%,#daa520 60%,#b8860b 100%); border-radius:6px 6px 14px 14px/6px 6px 18px 18px; border:2px solid #8b6914; box-shadow:inset 0 -4px 8px rgba(139,105,20,0.4), inset 0 3px 6px rgba(255,255,255,0.5); }
  .ingot-icon .ingot-body::before { content:''; position:absolute; top:-10px; left:50%; transform:translateX(-50%); width:28px; height:14px; background:linear-gradient(180deg,#fff8c4 0%,#ffd700 40%,#daa520 100%); border:2px solid #8b6914; border-bottom:none; border-radius:14px 14px 2px 2px; box-shadow:inset 0 2px 4px rgba(255,255,255,0.6); }
  .ingot-icon .ingot-body::after { content:'金'; position:absolute; top:50%; left:50%; transform:translate(-50%,-20%); font-size:.85rem; font-weight:900; color:#8b4513; font-family:"STKaiti","KaiTi","SimKai",serif; text-shadow:0 1px 1px rgba(255,255,255,0.5); z-index:2; }
  .ingot-icon:hover { animation-play-state:paused; transform:scale(1.18); }
  .ingot-icon.bounce { animation:ingotBounce .5s ease; }
  @keyframes ingotFloat { 0%,100%{transform:translateY(0) rotate(-3deg);} 50%{transform:translateY(-6px) rotate(3deg);} }
  @keyframes ingotBounce { 0%{transform:scale(1) rotate(0);} 30%{transform:scale(1.35) rotate(-15deg);} 60%{transform:scale(0.9) rotate(10deg);} 100%{transform:scale(1) rotate(0);} }
  @media (max-width:768px){ .ingot-icon{width:48px;height:38px;} .ingot-icon .ingot-body{width:40px;height:25px;} .ingot-icon .ingot-body::before{width:22px;height:11px;top:-8px;} .ingot-icon .ingot-body::after{font-size:.72rem;} }
  .ingot-toast { position:fixed; top:80px; left:50%; transform:translateX(-50%) translateY(-20px); background:linear-gradient(135deg,#c41e3a,#8b0000); color:#ffd700; padding:14px 28px; border-radius:12px; font-size:1.1rem; font-weight:700; font-family:"STKaiti","KaiTi","SimKai",serif; z-index:10000; box-shadow:0 8px 30px rgba(196,30,58,0.5),0 0 20px rgba(255,215,0,0.3); border:2px solid #ffd700; white-space:nowrap; pointer-events:none; opacity:0; transition:all .4s cubic-bezier(.34,1.56,.64,1); }
  .ingot-toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  .ingot-toast::after { content:''; position:absolute; bottom:-10px; left:50%; transform:translateX(-50%); width:0; height:0; border-left:10px solid transparent; border-right:10px solid transparent; border-top:10px solid #8b0000; }

  .section { margin-bottom:28px; }

  /* Summary boxes */
  .summary-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:12px; margin-bottom:16px; }
  .summary-box { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:14px 18px; text-align:center; }
  .summary-box .label { color:var(--text-dim); font-size:0.82rem; margin-bottom:4px; }
  .summary-box .value { font-size:1.5rem; font-weight:700; }
  .summary-box.hl-g { border-color:var(--green); box-shadow:0 0 16px var(--green-bg); }
  .summary-box.hl-r { border-color:var(--red); box-shadow:0 0 16px var(--red-bg); }

  /* Cards */
  .cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(320px,1fr)); gap:14px; }
  .card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:16px 18px; transition:background 0.2s; }
  .card:hover { background:var(--card-hover); }
  .card-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
  .card-head .name { font-weight:600; font-size:1.02rem; }
  .card-head .code { color:var(--text-dim); font-size:0.82rem; }
  .card-price { font-size:1.7rem; font-weight:700; margin-bottom:2px; }
  .card-chg { font-size:0.92rem; font-weight:600; margin-bottom:12px; }
  .card-grid { display:grid; grid-template-columns:1fr 1fr; gap:5px 14px; font-size:0.83rem; }
  .card-grid .l { color:var(--text-dim); }
  .card-grid .v { text-align:right; font-weight:500; }
  .holding-matrix { display:none; }

  /* Index cards */
  .idx-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:16px; }
  .idx-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:14px 16px; text-align:center; }
  .idx-card .name { color:var(--text-dim); font-size:0.82rem; margin-bottom:4px; }
  .idx-card .pt { font-size:1.4rem; font-weight:700; margin-bottom:2px; }
  .idx-card .chg { font-size:1rem; font-weight:600; }

  /* Info row */
  .info-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:10px; margin-bottom:14px; }
  .info-item { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:12px 16px; font-size:0.88rem; }
  .info-item .label { color:var(--text-dim); font-size:0.78rem; margin-bottom:3px; }
  .market-compact { grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); }
  .market-compact .info-item { padding:10px 12px; }
  .market-compact .info-item .value { font-weight:800; line-height:1.35; }

  /* Sector card */
  .sector { background:var(--card); border:1px solid var(--yellow); border-radius:12px; padding:18px 22px; margin-bottom:14px; }
  .sector .sname { font-size:1.1rem; font-weight:700; color:var(--yellow); margin-bottom:8px; }
  .sector ul { padding-left:16px; margin-bottom:8px; }
  .sector li { margin-bottom:3px; font-size:0.88rem; }
  .sector .leader { background:var(--yellow-bg); padding:8px 12px; border-radius:8px; font-size:0.88rem; margin-top:6px; }

  /* Table */
  .tbl-wrap { overflow-x:auto; margin-bottom:14px; }
  table { width:100%; border-collapse:collapse; font-size:0.88rem; }
  th { background:var(--card); color:var(--text-dim); font-weight:600; text-align:left; padding:8px 12px; border-bottom:1px solid var(--border); }
  td { padding:8px 12px; border-bottom:1px solid var(--border); }
  tr:hover td { background:var(--card-hover); }

  /* Strategy box */
  .strat { background:var(--card); border:2px solid var(--yellow); border-radius:12px; padding:18px 22px; font-size:0.95rem; line-height:1.8; box-shadow:0 0 24px var(--yellow-bg); }

  /* Rules */
  .rules { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .rules-box { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:14px 18px; }
  .rules-box h3 { color:var(--blue); margin-bottom:6px; }
  .rules-box ol { padding-left:16px; }
  .rules-box li { margin-bottom:3px; font-size:0.85rem; color:var(--text-dim); }

  /* Themes grid */
  .themes { display:grid; grid-template-columns:repeat(auto-fit,minmax(320px,1fr)); gap:12px; }
  .theme { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:14px 16px; transition:all 0.2s; }
  .theme:hover { border-color:var(--blue); box-shadow:0 2px 12px rgba(52,152,219,.15); }
  .theme .rank { display:inline-flex; align-items:center; justify-content:center; width:28px; height:28px; background:var(--yellow-bg); color:var(--yellow); border-radius:8px; font-size:0.95rem; font-weight:800; margin-right:8px; }
  .theme .tn { display:flex; align-items:center; flex-wrap:wrap; gap:6px; font-weight:700; font-size:0.95rem; margin-bottom:8px; }
  .theme .tn .badge { font-size:0.72rem; padding:2px 8px; border-radius:6px; font-weight:600; }
  .theme .tn .badge-hot { background:linear-gradient(135deg,#ff6b6b,#ee5a24); color:#fff; }
  .theme .tn .badge-active { background:var(--blue-bg); color:var(--blue); border:1px solid var(--blue); }
  .theme .pct { font-size:0.82rem; font-weight:600; color:var(--green); margin-left:4px; }
  .theme .td { font-size:0.84rem; color:var(--text); line-height:1.6; margin-bottom:8px; opacity:0.85; }
  .theme .ts { display:flex; flex-wrap:wrap; gap:6px; font-size:0.82rem; }
  .theme .ts .stock-link { font-size:0.8rem; padding:3px 10px; }
  .theme.dim { opacity:0.65; }
  .theme.dim .rank { background:var(--card-hover); color:var(--text-dim); }

  /* Stock links & prices */
  .stock-link { display:inline-flex; align-items:center; gap:6px; cursor:pointer; color:var(--blue); text-decoration:none; background:var(--blue-bg); border:1px solid var(--blue); border-radius:6px; padding:2px 8px; transition:all 0.2s; font-weight:600; }
  .stock-link:hover { border-color:var(--yellow); color:var(--yellow); background:var(--card-hover); }
  .stock-link::before { content:'📈'; font-size:0.75rem; }
  .fund-link { display:inline-flex; align-items:center; gap:6px; cursor:pointer; color:var(--yellow); text-decoration:none; background:var(--yellow-bg); border:1px solid var(--yellow); border-radius:6px; padding:2px 8px; transition:all 0.2s; font-weight:600; }
  .fund-link:hover { border-color:var(--blue); color:var(--blue); background:var(--card-hover); }
  .fund-link::before { content:'💰'; font-size:0.75rem; }
  .card.clickable { cursor:pointer; transition:transform .15s, box-shadow .15s, border-color .15s; }
  .card.clickable:hover { border-color:var(--blue); box-shadow:0 4px 16px rgba(52,152,219,.2); transform:translateY(-1px); }
  .card.clickable:active { transform:translateY(0); }
  .fund-quote-bar { display:flex; align-items:baseline; gap:14px; flex-wrap:wrap; padding:10px 14px; background:linear-gradient(135deg,rgba(255,214,0,.08),rgba(52,152,219,.06)); border:1px solid var(--border); border-radius:10px; margin-bottom:10px; }
  .fqb-nav { font-size:1.6rem; font-weight:700; color:var(--yellow); }
  .fqb-date { color:var(--text-dim); font-size:.82rem; }
  .fqb-daily { font-size:1rem; font-weight:600; }
  .fund-summary, .fund-strategy, .fund-trades { margin-top:14px; }
  .fund-summary h4, .fund-strategy h4, .fund-trades h4 { margin:0 0 8px; font-size:.92rem; color:var(--text); border-left:3px solid var(--yellow); padding-left:8px; }
  .fund-strategy p { margin:0; color:var(--text-dim); font-size:.85rem; line-height:1.6; background:rgba(255,255,255,.03); padding:10px 12px; border-radius:8px; border:1px solid var(--border); }
  .fs-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr)); gap:8px; }
  .fs-box { background:rgba(255,255,255,.03); border:1px solid var(--border); border-radius:8px; padding:8px 10px; }
  .fs-box .l { color:var(--text-dim); font-size:.72rem; margin-bottom:2px; }
  .fs-box .v { font-weight:600; font-size:.9rem; }
  .trade-buy-text { color:var(--green); }
  .trade-sell-text { color:var(--red); }
  .trade-other-text { color:var(--yellow); }
  .fund-chart-wrap { margin:6px 0 4px; }
  .fcw-title { font-size:.78rem; color:var(--text-dim); text-align:center; padding:4px 0; }
  #fundChartCanvas { background:#0a0c10; border-radius:10px; }
  .trade-buy { background:var(--green-bg); color:var(--green); border:1px solid rgba(255,23,68,.22); }
  .trade-sell { background:var(--red-bg); color:var(--red); border:1px solid rgba(0,200,83,.22); }
  .trade-other { background:var(--yellow-bg); color:var(--yellow); border:1px solid rgba(255,214,0,.22); }
  .trade-marker { display:flex; flex-wrap:wrap; gap:6px; justify-content:flex-end; }
  .detail-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:10px; margin:10px 0 12px; }
  .detail-box { background:rgba(255,255,255,.03); border:1px solid var(--border); border-radius:10px; padding:10px 12px; }
  .detail-box .l { color:var(--text-dim); font-size:.76rem; margin-bottom:3px; }
  .detail-box .v { font-size:1rem; font-weight:800; }
  .stock-price { font-size:0.82rem; color:var(--yellow); font-weight:600; }
  .stock-code { color:var(--text-dim); font-size:0.8rem; }

  /* Trend modal */
  #trendModal { display:none; position:fixed; inset:0; z-index:1000; background:rgba(0,0,0,0.75); align-items:center; justify-content:center; padding:20px; }
  #trendModal.active { display:flex; }
  #trendModal .modal-box { background:var(--card); border:1px solid var(--border); border-radius:14px; width:100%; max-width:720px; max-height:90vh; overflow:auto; padding:20px; position:relative; }
  #trendModal .modal-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
  #trendModal .modal-title { font-size:1.2rem; font-weight:700; }
  #trendModal .modal-close { background:var(--card-hover); color:var(--text); border:1px solid var(--border); border-radius:8px; padding:6px 14px; cursor:pointer; }
  #trendModal .modal-close:hover { border-color:var(--yellow); color:var(--yellow); }
  #trendModal .modal-chart { width:100%; border-radius:10px; background:var(--bg); min-height:200px; }
  #trendModal .modal-chart-error { display:flex; align-items:center; justify-content:center; color:var(--text-dim); font-size:0.9rem; padding:40px; }
  #trendModal .modal-foot { margin-top:12px; text-align:center; }
  #trendModal .modal-foot a { color:var(--blue); text-decoration:none; font-size:0.85rem; }
  #trendModal .modal-foot a:hover { text-decoration:underline; }
  .range-tabs { display:flex; gap:8px; flex-wrap:wrap; margin:0 0 12px; }
  .range-tabs button {
    background:var(--card-hover); color:var(--text); border:1px solid var(--border);
    border-radius:8px; padding:6px 12px; cursor:pointer; font-size:0.82rem;
  }
  .range-tabs button.active { border-color:var(--yellow); color:var(--yellow); background:var(--yellow-bg); }

  .version-button {
    width:30px; height:30px; border-radius:50%; border:1px solid var(--yellow);
    background:var(--yellow-bg); color:var(--yellow); font-weight:900; cursor:pointer;
    display:inline-flex; align-items:center; justify-content:center;
    position:absolute; top:14px; right:14px; z-index:10;
  }
  #versionModal { display:none; position:fixed; inset:0; z-index:1001; background:rgba(0,0,0,0.75); align-items:center; justify-content:center; padding:20px; }
  #versionModal.active { display:flex; }
  #versionModal .modal-box { background:var(--card); border:1px solid var(--border); border-radius:14px; width:100%; max-width:680px; max-height:88vh; overflow:auto; padding:20px; }
  #versionModal .modal-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
  #versionModal .modal-title { font-size:1.2rem; font-weight:800; color:var(--yellow); }
  #versionModal .modal-close { background:var(--card-hover); color:var(--text); border:1px solid var(--border); border-radius:8px; padding:6px 14px; cursor:pointer; }
  #versionModal .modal-close:hover { border-color:var(--yellow); color:var(--yellow); }
  .version-list { display:flex; flex-direction:column; gap:10px; }
  .version-item { border:1px solid var(--border); border-radius:10px; padding:12px 14px; background:rgba(255,255,255,0.02); }
  .version-item.current { border-color:var(--yellow); background:var(--yellow-bg); }
  .version-row { display:flex; justify-content:space-between; gap:12px; align-items:center; margin-bottom:6px; }
  .version-name { font-weight:800; color:var(--text); }
  .version-date { color:var(--text-dim); font-size:.78rem; white-space:nowrap; }
  .version-notes { color:var(--text-dim); font-size:.84rem; line-height:1.65; padding-left:20px; margin:8px 0 0; }
  .version-notes li { margin-bottom:10px; }
  .version-notes li:last-child { margin-bottom:0; }
  .live-status { margin-left:8px; color:var(--text-dim); font-size:.76rem; font-weight:500; }
  .api-badge { margin-left:8px; font-size:.72rem; color:var(--blue); background:var(--blue-bg); border:1px solid var(--blue); border-radius:999px; padding:2px 8px; white-space:nowrap; }
  .calendar-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:8px; }
  .calendar-cell { min-height:78px; border:1px solid var(--border); border-radius:10px; background:var(--card); padding:8px; }
  .calendar-cell .cd { color:var(--text-dim); font-size:.74rem; margin-bottom:8px; }
  .calendar-cell .cv { font-weight:900; font-size:.95rem; }
  .calendar-cell.pos-day { border-color:rgba(255,23,68,.35); background:rgba(255,23,68,.07); }
  .calendar-cell.neg-day { border-color:rgba(0,200,83,.35); background:rgba(0,200,83,.07); }
  .module-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:12px; }
  .fund-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:14px 16px; }
  .fund-card .fund-title { display:flex; justify-content:space-between; gap:10px; align-items:flex-start; margin-bottom:10px; }
  .fund-card .fund-name { font-weight:800; }
  .fund-card .fund-code { color:var(--text-dim); font-size:.76rem; }
  .fund-metrics { display:grid; grid-template-columns:1fr 1fr; gap:6px 12px; font-size:.82rem; }
  .fund-metrics .l { color:var(--text-dim); }
  .fund-metrics .v { text-align:right; font-weight:700; }
  .empty-state { background:var(--card); border:1px dashed var(--border); border-radius:12px; padding:18px; color:var(--text-dim); line-height:1.7; }
  .collapse-box { background:var(--card); border:1px solid var(--border); border-radius:12px; margin-bottom:10px; overflow:hidden; }
  .collapse-head { width:100%; background:transparent; color:var(--text); border:0; padding:14px 16px; display:flex; justify-content:space-between; align-items:center; cursor:pointer; font-size:.92rem; font-weight:800; text-align:left; }
  .collapse-head:hover { background:var(--card-hover); }
  .collapse-meta { color:var(--text-dim); font-size:.78rem; font-weight:500; margin-left:8px; }
  .collapse-icon { color:var(--yellow); font-weight:900; transition:transform .2s; }
  .collapse-box.open .collapse-icon { transform:rotate(180deg); }
  .collapse-body { display:none; padding:0 14px 14px; }
  .collapse-box.open .collapse-body { display:block; }
  .trade-table { width:100%; border-collapse:collapse; table-layout:fixed; font-size:.78rem; }
  .trade-table th, .trade-table td { border-bottom:1px solid var(--border); padding:8px 6px; vertical-align:top; }
  .trade-table th { color:var(--text-dim); font-weight:700; background:rgba(255,255,255,.03); }
  .trade-table td { color:var(--text); word-break:break-word; }
  .trade-time-mini { color:var(--text-dim); font-size:.72rem; line-height:1.35; }
  .trade-note-mini { color:var(--text-dim); font-size:.72rem; line-height:1.45; margin-top:3px; }
  .fund-detail-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:14px; }
  .fund-detail-head { display:flex; justify-content:space-between; align-items:flex-start; gap:10px; margin-bottom:12px; }
  .fund-detail-name { font-weight:900; font-size:1rem; }
  .fund-detail-code { color:var(--text-dim); font-size:.76rem; margin-top:3px; }
  .fund-detail-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px 18px; padding:10px 0; border-top:1px solid var(--border); border-bottom:1px solid var(--border); }
  .fund-detail-grid .l { color:var(--text-dim); font-size:.78rem; margin-bottom:3px; }
  .fund-detail-grid .v { font-weight:800; }
  .fund-income-row { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; padding-top:12px; }
  .fund-income-row .l { color:var(--text-dim); font-size:.78rem; margin-bottom:4px; }
  .fund-income-row .v { font-weight:900; font-size:1rem; }
  .tab-bar { display:flex; gap:0; margin-bottom:14px; border-bottom:2px solid var(--border); }
  .tab-btn { flex:1; padding:10px 16px; background:transparent; border:none; color:var(--text-dim); font-size:.92rem; font-weight:700; cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-2px; transition:all .2s; }
  .tab-btn:hover { color:var(--text); }
  .tab-btn.active { color:var(--yellow); border-bottom-color:var(--yellow); }
  .tab-content { display:none; }
  .tab-content.active { display:block; }

  /* Summary Section */
  .summary-tab-bar { display:flex; gap:8px; margin-bottom:14px; }
  .summary-tab-btn { flex:1; padding:8px 12px; background:var(--card); border:1px solid var(--border); border-radius:8px; color:var(--text-dim); font-size:.88rem; font-weight:700; cursor:pointer; transition:all .2s; }
  .summary-tab-btn:hover { border-color:var(--blue); color:var(--text); }
  .summary-tab-btn.active { background:rgba(52,152,219,.15); border-color:var(--blue); color:var(--blue); }
  .summary-section .summary-main .summary-box { min-width:120px; }
  .summary-section .summary-box .unit { font-size:.78rem; color:var(--text-dim); margin-top:2px; }
  .update-time { display:flex; align-items:center; gap:6px; margin-top:12px; padding:6px 10px; background:rgba(255,255,255,.03); border-radius:6px; font-size:.74rem; color:var(--text-dim); }
  .update-dot { width:6px; height:6px; border-radius:50%; background:var(--green); display:inline-block; }

  /* Daily P&L Controls */
  .pl-controls { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:10px; padding:8px; background:var(--card); border-radius:8px; border:1px solid var(--border); }
  .pl-control-group { display:flex; gap:4px; }
  .pl-btn { padding:5px 10px; background:transparent; border:1px solid var(--border); border-radius:6px; color:var(--text-dim); font-size:.78rem; font-weight:600; cursor:pointer; transition:all .2s; }
  .pl-btn:hover { border-color:var(--blue); color:var(--text); }
  .pl-btn.active { background:rgba(52,152,219,.15); border-color:var(--blue); color:var(--blue); }

  /* Weekly P&L chart */
  .week-chart { display:grid; grid-template-columns:repeat(5,1fr); gap:8px; margin-bottom:16px; }
  .wc-bar { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:10px; text-align:center; cursor:pointer; transition:all 0.2s; }
  .wc-bar:hover { border-color:var(--yellow); }
  .wc-bar.active { border-color:var(--yellow); box-shadow:0 0 12px var(--yellow-bg); }
  .wc-bar .d { font-size:0.75rem; color:var(--text-dim); margin-bottom:4px; }
  .wc-bar .v { font-size:1.05rem; font-weight:700; }
  .wc-bar .p { font-size:0.78rem; margin-top:2px; }

  .disclaimer { margin-top:28px; padding:14px; background:var(--card); border-radius:10px; font-size:0.78rem; color:var(--text-dim); text-align:center; }
  .version-info { margin-top:12px; padding:10px 16px; background:var(--card); border:1px solid var(--border); border-radius:12px; color:var(--text-dim); font-size:0.78rem; text-align:center; line-height:1.8; }
  .version-info .vi-ver { color:var(--blue); font-weight:600; }
  .version-info .vi-date { color:var(--text-dim); margin-left:4px; }
  .version-info .vi-poem { display:block; margin-top:6px; color:var(--text); font-size:0.82rem; font-style:italic; letter-spacing:0.5px; opacity:0.85; }

  /* Charts */
  .chart-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:20px; }
  .chart-box { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:16px 18px; }
  .chart-box h3 { color:var(--text); font-size:0.92rem; margin-bottom:10px; }
  .chart-box canvas { width:100%!important; }
  .chart-full { grid-column: 1 / -1; }
  .treemap {
    position:relative; display:flex; flex-wrap:wrap; gap:6px; min-height:360px;
    background:var(--card); border:1px solid var(--border); border-radius:14px; padding:8px; overflow:hidden;
  }
  .tree-cell {
    position:relative; flex:var(--grow,1) 1 var(--basis,22%); min-width:130px; min-height:96px;
    border:1px solid var(--border); border-radius:12px; padding:12px; overflow:hidden;
    cursor:pointer; transition:transform .18s, border-color .18s, box-shadow .18s;
  }
  .tree-cell:hover, .tree-cell:focus { transform:translateY(-2px); border-color:var(--yellow); box-shadow:0 10px 28px rgba(0,0,0,.24); z-index:5; outline:none; }
  .tree-cell .hn { font-size:1rem; font-weight:800; margin-bottom:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .tree-cell .hp { font-size:1.45rem; font-weight:900; line-height:1.1; margin-bottom:6px; }
  .tree-cell .heat-desc { color:var(--text-dim); font-size:.78rem; line-height:1.45; margin-bottom:6px; display:block; }
  .tree-cell .leader-line { font-size:.78rem; color:var(--text-dim); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .tree-tip {
    display:none; position:absolute; left:10px; right:10px; bottom:10px; padding:10px;
    background:rgba(15,17,23,.94); color:#e4e6eb; border:1px solid rgba(255,255,255,.16);
    border-radius:10px; font-size:.78rem; line-height:1.6; box-shadow:0 12px 30px rgba(0,0,0,.35);
  }
  body.light .tree-tip { background:rgba(255,255,255,.96); color:#1e2433; border-color:#dbe1ef; }
  .tree-cell:hover .tree-tip, .tree-cell:focus .tree-tip { display:block; }
  .tree-tip .stock-link { margin-top:4px; margin-right:4px; }
  .install-tip { font-size:0.78rem; color:var(--text-dim); margin-top:6px; }
  .watch-matrix { display:none; }

  .home-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(380px,1fr)); gap:20px; margin-bottom:20px; }
  .home-card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:24px; cursor:pointer; transition:all .2s; display:flex; flex-direction:column; justify-content:space-between; }
  .home-card:hover { background:var(--card-hover); border-color:var(--blue); transform:translateY(-2px); }
  .home-card-body { flex:1; }
  .home-card > .card-arrow { margin-top:auto; }
  .home-card h2 { border-bottom:none; padding-bottom:0; margin-bottom:16px; }
  .home-card .card-arrow { text-align:center; color:var(--yellow); font-size:.9rem; margin-top:14px; padding:8px 12px; background:var(--yellow-bg); border:1px solid var(--yellow); border-radius:8px; font-weight:600; cursor:pointer; transition:all .2s; }
  .home-card .card-arrow:hover { background:var(--yellow); color:#000; }
  .page-nav { display:flex; gap:8px; margin-bottom:16px; align-items:center; }
  .page-nav .breadcrumb { color:var(--text-dim); font-size:.82rem; margin-left:auto; display:flex; align-items:center; gap:2px; flex-wrap:wrap; }
  .page-nav .breadcrumb a { color:var(--text-dim); cursor:pointer; text-decoration:none; padding:2px 6px; border-radius:4px; transition:all 0.2s; }
  .page-nav .breadcrumb a:hover { color:var(--text); background:var(--card); }
  .page-nav .breadcrumb .crumb-sep { color:var(--text-dim); opacity:0.5; margin:0 2px; }
  .page-nav .breadcrumb .crumb-current { color:var(--text); font-weight:500; padding:2px 6px; }
  .page-nav-btn { padding:8px 16px; background:var(--card); border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:.88rem; cursor:pointer; }
  .page-nav-btn.active { background:var(--blue); border-color:var(--blue); color:#fff; }

  @media(max-width:768px) {
    body { padding:12px; }
    .idx-grid { grid-template-columns:repeat(3,minmax(0,1fr)); gap:8px; }
    .idx-card { padding:10px 8px; }
    .idx-card .name { font-size:0.72rem; }
    .idx-card .pt { font-size:1rem; }
    .idx-card .chg { font-size:0.82rem; }
    .market-compact { grid-template-columns:repeat(2,minmax(0,1fr)); gap:8px; }
    .market-compact .info-item { padding:9px 10px; min-height:58px; }
    .market-compact .info-item .label { font-size:.7rem; }
    .market-compact .info-item .value { font-size:.82rem; }
    .rules { grid-template-columns:1fr; }
    .cards { display:none; }
    .holding-matrix {
      display:block; overflow:hidden; background:var(--card); border:1px solid var(--border);
      border-radius:12px; margin-top:10px;
    }
    .holding-matrix table { table-layout:fixed; width:100%; font-size:0.72rem; }
    .holding-matrix th, .holding-matrix td { padding:7px 5px; text-align:center; vertical-align:middle; }
    .holding-matrix th:first-child, .holding-matrix td:first-child {
      width:22%; color:var(--text-dim); font-weight:600; text-align:left; background:rgba(255,255,255,0.02);
    }
    .holding-matrix .hm-stock .stock-link {
      padding:1px 4px; gap:3px; font-size:0.68rem; max-width:100%; white-space:normal; justify-content:center;
    }
    .holding-matrix .hm-value { font-weight:800; }
    .week-chart { grid-template-columns:repeat(3,1fr); }
    .chart-grid { grid-template-columns:1fr; }
    .treemap { display:block; min-height:0; padding:8px; }
    .tree-cell { width:100%; min-width:0; min-height:0; padding:12px; margin-bottom:8px; flex:none!important; overflow:visible; }
    .tree-cell:last-child { margin-bottom:0; }
    .tree-cell .hn { font-size:1rem; white-space:normal; overflow:visible; text-overflow:clip; }
    .tree-cell .hp { font-size:1.22rem; margin-bottom:6px; }
    .tree-cell .heat-desc { display:block; }
    .tree-cell .leader-line { display:block; font-size:.72rem; white-space:normal; overflow:visible; text-overflow:clip; line-height:1.45; }
    .tree-cell .leader-line .stock-link { padding:1px 4px; margin:2px 2px 0 0; font-size:.68rem; white-space:normal; }
    .tree-tip { display:none!important; }
    .watch-table { display:none; }
    .watch-matrix {
      display:block; overflow:hidden; background:var(--card); border:1px solid var(--border);
      border-radius:12px; margin-top:10px;
    }
    .watch-matrix table { table-layout:fixed; width:100%; font-size:0.7rem; }
    .watch-matrix th, .watch-matrix td { padding:7px 5px; text-align:center; vertical-align:middle; }
    .watch-matrix th:first-child, .watch-matrix td:first-child {
      width:22%; color:var(--text-dim); font-weight:600; text-align:left; background:rgba(255,255,255,0.02);
    }
    .watch-matrix .stock-link { padding:1px 4px; gap:3px; font-size:0.66rem; max-width:100%; white-space:normal; justify-content:center; }
    .watch-matrix .wm-value { font-weight:700; line-height:1.45; }
    .calendar-grid { grid-template-columns:repeat(2,1fr); gap:8px; }
    .calendar-cell { min-height:68px; }
  }

  /* ===== Login System ===== */
  .auth-btn {
    background: var(--blue-bg); color: var(--blue); border: 1px solid var(--blue);
    padding: 6px 16px; border-radius: 20px; cursor: pointer; font-size: 0.85rem;
    font-weight: 600; transition: all 0.2s; display: flex; align-items: center; gap: 6px;
    white-space: nowrap;
  }
  .auth-btn:hover { background: var(--blue); color: #fff; }
  .auth-btn .auth-avatar {
    width: 20px; height: 20px; border-radius: 50%; background: var(--blue); color: #fff;
    display: flex; align-items: center; justify-content: center; font-size: 0.72rem; font-weight: 700;
  }
  .auth-btn.logged-in { background: var(--green-bg); border-color: var(--green); color: var(--green); }
  .auth-btn.logged-in .auth-avatar { background: var(--green); }

  .login-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:2000; justify-content:center; align-items:center; backdrop-filter: blur(4px); }
  .login-modal.show { display:flex; }
  .login-box { background:var(--card); border:1px solid var(--border); border-radius:20px; padding:36px 32px; width:360px; max-width:90vw; box-shadow: 0 8px 40px rgba(0,0,0,0.4); }
  .login-box h2 { text-align:center; border:none; padding:0; margin:0 0 8px; font-size:1.3rem; }
  .login-box .login-sub { text-align:center; color:var(--text-dim); font-size:0.82rem; margin-bottom:24px; }
  .login-box .login-icon { text-align:center; font-size:2.4rem; margin-bottom:12px; }
  .login-field { margin-bottom:16px; }
  .login-field label { display:block; font-size:0.8rem; color:var(--text-dim); margin-bottom:6px; }
  .login-field input {
    width:100%; background:var(--bg); border:1px solid var(--border); border-radius:10px;
    padding:10px 14px; color:var(--text); font-size:0.95rem; outline:none; transition:border-color 0.2s;
  }
  .login-field input:focus { border-color: var(--blue); }
  .login-submit {
    width:100%; background:var(--blue); color:#fff; border:none; border-radius:10px;
    padding:12px; font-size:1rem; font-weight:700; cursor:pointer; margin-top:8px; transition: all 0.2s;
  }
  .login-submit:hover { opacity:0.85; }
  .login-error { color:#ff5a5f; font-size:0.8rem; text-align:center; margin-top:8px; min-height:1.2em; }
  .login-hint { text-align:center; font-size:0.75rem; color:var(--text-dim); margin-top:16px; }

  /* ===== Todo List ===== */
  .todo-item {
    display:flex; align-items:center; gap:10px; padding:10px 14px; background:var(--bg);
    border:1px solid var(--border); border-radius:10px; margin-bottom:8px; transition:all 0.2s;
  }
  .todo-item:hover { border-color:var(--blue); }
  .todo-item.done { opacity:0.5; }
  .todo-item.done .todo-text { text-decoration:line-through; color:var(--text-dim); }
  .todo-check {
    width:20px; height:20px; border-radius:6px; border:2px solid var(--border); cursor:pointer;
    display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all 0.2s;
  }
  .todo-check.done { background:var(--green); border-color:var(--green); }
  .todo-check.done::after { content:'✓'; color:#fff; font-size:0.72rem; font-weight:700; }
  .todo-text { flex:1; font-size:0.88rem; cursor:pointer; word-break:break-word; }
  .todo-del { color:var(--text-dim); cursor:pointer; font-size:1.1rem; padding:2px 6px; border-radius:4px; transition:all 0.2s; flex-shrink:0; }
  .todo-del:hover { color:#ff5a5f; }
  .todo-add-bar { display:flex; gap:8px; margin-bottom:10px; }
  .todo-add-bar input {
    flex:1; background:var(--bg); border:1px solid var(--border); border-radius:10px;
    padding:8px 14px; color:var(--text); font-size:0.88rem; outline:none;
  }
  .todo-add-bar input:focus { border-color:var(--blue); }
  .todo-add-bar button {
    background:var(--blue); color:#fff; border:none; border-radius:10px; padding:8px 16px;
    font-size:0.85rem; font-weight:600; cursor:pointer; white-space:nowrap; transition:opacity 0.2s;
  }
  .todo-add-bar button:hover { opacity:0.85; }
  .todo-empty { text-align:center; color:var(--text-dim); font-size:0.85rem; padding:20px 0; }

  /* ===== Anniversary ===== */
  .anni-item {
    display:flex; align-items:center; gap:12px; padding:10px 14px; background:var(--bg);
    border:1px solid var(--border); border-radius:10px; margin-bottom:8px; transition:all 0.2s;
  }
  .anni-item:hover { border-color:var(--yellow); }
  .anni-date {
    text-align:center; min-width:52px; flex-shrink:0;
    background:var(--yellow-bg); border:1px solid var(--yellow); border-radius:8px; padding:4px 8px;
  }
  .anni-date .anni-md { font-size:0.95rem; font-weight:700; color:var(--yellow); }
  .anni-date .anni-cd { font-size:0.72rem; color:var(--text-dim); margin-top:2px; }
  .anni-info { flex:1; }
  .anni-name { font-size:0.88rem; font-weight:600; }
  .anni-desc { font-size:0.78rem; color:var(--text-dim); margin-top:2px; }
  .anni-actions { display:flex; gap:2px; flex-shrink:0; }
  .anni-edit { color:var(--text-dim); cursor:pointer; font-size:0.95rem; padding:2px 6px; border-radius:4px; transition:all 0.2s; }
  .anni-edit:hover { color:var(--yellow); }
  .anni-del { color:var(--text-dim); cursor:pointer; font-size:1.1rem; padding:2px 6px; border-radius:4px; flex-shrink:0; transition:all 0.2s; }
  .anni-del:hover { color:#ff5a5f; }
  .anni-desc-placeholder { font-size:0.76rem; color:var(--text-dim); margin-top:3px; cursor:pointer; opacity:0.6; transition:opacity 0.2s; }
  .anni-desc-placeholder:hover { opacity:1; }
  .anni-desc-edit { display:flex; gap:6px; margin-top:4px; align-items:center; }
  .anni-desc-edit input {
    flex:1; background:var(--bg); border:1px solid var(--yellow); border-radius:6px;
    padding:4px 8px; color:var(--text); font-size:0.76rem; outline:none;
  }
  .anni-desc-edit button {
    background:var(--yellow); color:#000; border:none; border-radius:6px; padding:4px 10px;
    font-size:0.72rem; font-weight:600; cursor:pointer; white-space:nowrap;
  }
  .anni-desc-edit button.cancel { background:var(--card); color:var(--text-dim); border:1px solid var(--border); }
  .anni-countdown {
    text-align:center; font-size:0.72rem; color:var(--text-dim); margin-top:8px; padding:6px;
    background:rgba(255,214,0,0.05); border-radius:6px;
  }
  .anni-countdown b { color:var(--yellow); font-size:0.9rem; }
  .anni-add-bar { display:flex; gap:8px; margin-bottom:10px; flex-wrap:wrap; }
  .anni-add-bar input, .anni-add-bar select {
    background:var(--bg); border:1px solid var(--border); border-radius:10px;
    padding:8px 12px; color:var(--text); font-size:0.82rem; outline:none;
  }
  .anni-add-bar input:focus, .anni-add-bar select:focus { border-color:var(--yellow); }
  .anni-add-bar input.anni-name-in { flex:1; min-width:120px; }
  .anni-add-bar button {
    background:var(--yellow); color:#000; border:none; border-radius:10px; padding:8px 16px;
    font-size:0.82rem; font-weight:600; cursor:pointer; white-space:nowrap; transition:opacity 0.2s;
  }
  .anni-add-bar button:hover { opacity:0.85; }
  .anni-empty { text-align:center; color:var(--text-dim); font-size:0.85rem; padding:20px 0; }

  /* 金融市场早报 */
  .report-hero { text-align:center; margin-bottom:28px; padding:28px 20px 22px; background:linear-gradient(135deg, rgba(255,214,0,0.06), rgba(68,138,255,0.06)); border-radius:16px; border:1px solid var(--border); }
  .report-hero .en { font-size:.75rem; letter-spacing:3px; color:var(--text-dim); text-transform:uppercase; margin-bottom:6px; font-weight:600; }
  .report-hero h1 { font-size:1.6rem; color:var(--yellow); margin-bottom:8px; }
  .report-hero .date-line { font-size:.9rem; color:var(--text-dim); margin-bottom:6px; }
  .report-hero .sub { font-size:.82rem; color:var(--text-dim); }
  .report-anchor-bar { display:flex; gap:6px; flex-wrap:wrap; justify-content:center; margin:16px 0 24px; padding:10px; background:var(--card); border-radius:10px; border:1px solid var(--border); }
  .report-anchor { font-size:.78rem; padding:4px 10px; border-radius:6px; color:var(--text-dim); cursor:pointer; transition:all .15s; text-decoration:none; white-space:nowrap; }
  .report-anchor:hover { background:var(--card-hover); color:var(--yellow); }

  /* 核心概览指数网格 */
  .report-core-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:10px; margin-bottom:16px; }
  .report-core-card { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:12px 10px; text-align:center; }

const LUNAR_MONTH_CN = ['正','二','三','四','五','六','七','八','九','十','冬','腊'];
const LUNAR_DAY_CN = ['初一','初二','初三','初四','初五','初六','初七','初八','初九','初十',
  '十一','十二','十三','十四','十五','十六','十七','十八','十九','二十',
  '廿一','廿二','廿三','廿四','廿五','廿六','廿七','廿八','廿九','三十'];

function lunarYearDays(y) {
  let sum = 348;
  for (let i = 0x8000; i > 0x8; i >>= 1) sum += (LUNAR_INFO[y - 1900] & i) ? 1 : 0;
  return sum + leapDays(y);
}
function leapMonth(y) { return LUNAR_INFO[y - 1900] & 0xf; }
function leapDays(y) { return leapMonth(y) ? ((LUNAR_INFO[y - 1900] & 0x10000) ? 30 : 29) : 0; }
function monthDays(y, m) { return (LUNAR_INFO[y - 1900] & (0x10000 >> m)) ? 30 : 29; }

function solarToLunar(sY, sM, sD) {
  let offset = Math.floor((new Date(sY, sM - 1, sD) - new Date(1900, 0, 31)) / 86400000);
  let lY, lM, lD, isLeap = false;
  for (lY = 1900; lY < 2101 && offset > 0; lY++) offset -= lunarYearDays(lY);
  if (offset < 0) { offset += lunarYearDays(--lY); }
  const leap = leapMonth(lY);
  for (lM = 1; lM < 13 && offset > 0; lM++) {
    if (leap > 0 && lM === leap + 1 && !isLeap) { --lM; isLeap = true; offset -= leapDays(lY); }
    else { offset -= monthDays(lY, lM); }
    if (isLeap && lM === leap + 1) isLeap = false;
  }
  if (offset === 0 && leap > 0 && lM === leap + 1) { if (isLeap) isLeap = false; else { isLeap = true; --lM; } }
  if (offset < 0) { offset += monthDays(lY, --lM); }
  lD = offset + 1;
  return { year: lY, month: lM, day: lD, isLeap };
}

function lunarStr(sY, sM, sD) {
  try {
    const l = solarToLunar(sY, sM, sD);
    const mStr = (l.isLeap ? '闰' : '') + LUNAR_MONTH_CN[l.month - 1] + '月';

    return `${mStr}${dStr} ${gzY[gIdx]}${gzY2[zIdx]}年【${animal[zIdx]}年】`;
  } catch(e) { return ''; }
}

  { text: '春蚕到死丝方尽，蜡炬成灰泪始干。', author: '李商隐' },
  { text: '何当共剪西窗烛，却话巴山夜雨时。', author: '李商隐' },
  { text: '锦瑟无端五十弦，一弦一柱思华年。', author: '李商隐' },
  { text: '夕阳无限好，只是近黄昏。', author: '李商隐' },
  { text: '身无彩凤双飞翼，心有灵犀一点通。', author: '李商隐' },
  { text: '昨夜星辰昨夜风，画楼西畔桂堂东。', author: '李商隐' },
  { text: '洛阳亲友如相问，一片冰心在玉壶。', author: '王昌龄' },
  { text: '青海长云暗雪山，孤城遥望玉门关。', author: '王昌龄' },
  { text: '但使龙城飞将在，不教胡马度阴山。', author: '王昌龄' },
  { text: '明月出天山，苍茫云海间。', author: '李白' },
  { text: '我寄愁心与明月，随风直到夜郎西。', author: '李白' },
  { text: '故人西辞黄鹤楼，烟花三月下扬州。', author: '李白' },
  { text: '抽刀断水水更流，举杯消愁愁更愁。', author: '李白' },
  { text: '醉卧沙场君莫笑，古来征战几人回。', author: '王翰' },
  { text: '劝君更尽一杯酒，西出阳关无故人。', author: '王维' },
  { text: '君自故乡来，应知故乡事。', author: '王维' },
  { text: '空山新雨后，天气晚来秋。', author: '王维' },
  { text: '明月松间照，清泉石上流。', author: '王维' },
  { text: '随意春芳歇，王孙自可留。', author: '王维' },
  { text: '江畔何人初见月？江月何年初照人？', author: '张若虚' },
  { text: '春江潮水连海平，海上明月共潮生。', author: '张若虚' },
  { text: '海上生明月，天涯共此时。', author: '张九龄' },
  { text: '相看两不厌，只有敬亭山。', author: '李白' },
  { text: '云想衣裳花想容，春风拂槛露华浓。', author: '李白' },
  { text: '兰陵美酒郁金香，玉碗盛来琥珀光。', author: '李白' },
  { text: '关关雎鸠，在河之洲。窈窕淑女，君子好逑。', author: '诗经' },
  { text: '蒹葭苍苍，白露为霜。所谓伊人，在水一方。', author: '诗经' },
  { text: '桃之夭夭，灼灼其华。', author: '诗经' },
  { text: '昔我往矣，杨柳依依。今我来思，雨雪霏霏。', author: '诗经' },
  { text: '青青子衿，悠悠我心。', author: '诗经' },
  { text: '死生契阔，与子成说。执子之手，与子偕老。', author: '诗经' },
  { text: '投我以木桃，报之以琼瑶。', author: '诗经' },
  { text: '他山之石，可以攻玉。', author: '诗经' },
  { text: '高山仰止，景行行止。', author: '诗经' },
  { text: '一日不见，如三秋兮。', author: '诗经' },
  { text: '路漫漫其修远兮，吾将上下而求索。', author: '屈原' },
  { text: '长太息以掩涕兮，哀民生之多艰。', author: '屈原' },
  { text: '亦余心之所善兮，虽九死其犹未悔。', author: '屈原' },
  { text: '举世皆浊我独清，众人皆醉我独醒。', author: '屈原' },
  { text: '沅有芷兮澧有兰，思公子兮未敢言。', author: '屈原' },
  { text: '悲哉秋之为气也，萧瑟兮草木摇落而变衰。', author: '宋玉' },
  { text: '风萧萧兮易水寒，壮士一去兮不复还。', author: '荆轲' },
  { text: '力拔山兮气盖世，时不利兮骓不逝。', author: '项羽' },
  { text: '大风起兮云飞扬，威加海内兮归故乡，安得猛士兮守四方。', author: '刘邦' },
  { text: '老骥伏枥，志在千里。烈士暮年，壮心不已。', author: '曹操' },
  { text: '对酒当歌，人生几何。譬如朝露，去日苦多。', author: '曹操' },
  { text: '山不厌高，海不厌深。周公吐哺，天下归心。', author: '曹操' },
  { text: '东临碣石，以观沧海。水何澹澹，山岛竦峙。', author: '曹操' },
  { text: '日月之行，若出其中。星汉灿烂，若出其里。', author: '曹操' },
  { text: '白骨露于野，千里无鸡鸣。', author: '曹操' },
  { text: '本是同根生，相煎何太急。', author: '曹植' },
  { text: '捐躯赴国难，视死忽如归。', author: '曹植' },
  { text: '丈夫志四海，万里犹比邻。', author: '曹植' },
  { text: '结庐在人境，而无车马喧。问君何能尔，心远地自偏。', author: '陶渊明' },
  { text: '山气日夕佳，飞鸟相与还。此中有真意，欲辨已忘言。', author: '陶渊明' },
  { text: '盛年不重来，一日难再晨。及时当勉励，岁月不待人。', author: '陶渊明' },
  { text: '刑天舞干戚，猛志固常在。', author: '陶渊明' },
  { text: '奇文共欣赏，疑义相与析。', author: '陶渊明' },
  { text: '久在樊笼里，复得返自然。', author: '陶渊明' },
  { text: '羁鸟恋旧林，池鱼思故渊。', author: '陶渊明' },
  { text: '不戚戚于贫贱，不汲汲于富贵。', author: '陶渊明' },
  { text: '晨兴理荒秽，带月荷锄归。', author: '陶渊明' },
  { text: '道狭草木长，夕露沾我衣。衣沾不足惜，但使愿无违。', author: '陶渊明' },
  { text: '池塘生春草，园柳变鸣禽。', author: '谢灵运' },
  { text: '蝉噪林逾静，鸟鸣山更幽。', author: '王籍' },
  { text: '余霞散成绮，澄江静如练。', author: '谢朓' },
  { text: '天苍苍，野茫茫，风吹草低见牛羊。', author: '北朝民歌' },
  { text: '雄兔脚扑朔，雌兔眼迷离。双兔傍地走，安能辨我是雄雌。', author: '北朝民歌' },
  { text: '万里赴戎机，关山度若飞。将军百战死，壮士十年归。', author: '北朝民歌' },
  { text: '鹅鹅鹅，曲项向天歌。白毛浮绿水，红掌拨清波。', author: '骆宾王' },
  { text: '老当益壮，宁移白首之心；穷且益坚，不坠青云之志。', author: '王勃' },
  { text: '东隅已逝，桑榆非晚。', author: '王勃' },
  { text: '阁中帝子今何在，槛外长江空自流。', author: '王勃' },
  { text: '前不见古人，后不见来者。念天地之悠悠，独怆然而涕下。', author: '陈子昂' },
  { text: '气蒸云梦泽，波撼岳阳城。', author: '孟浩然' },
  { text: '坐观垂钓者，徒有羡鱼情。', author: '孟浩然' },
  { text: '开轩面场圃，把酒话桑麻。待到重阳日，还来就菊花。', author: '孟浩然' },
  { text: '人事有代谢，往来成古今。江山留胜迹，我辈复登临。', author: '孟浩然' },
  { text: '水是眼波横，山是眉峰聚。欲问行人去那边，眉眼盈盈处。', author: '王观' },
  { text: '才始送春归，又送君归去。若到江南赶上春，千万和春住。', author: '王观' },
  { text: '黄河远上白云间，一片孤城万仞山。羌笛何须怨杨柳，春风不度玉门关。', author: '王之涣' },
  { text: '闺中少妇不知愁，春日凝妆上翠楼。忽见陌头杨柳色，悔教夫婿觅封侯。', author: '王昌龄' },
  { text: '竹喧归浣女，莲动下渔舟。', author: '王维' },
  { text: '红豆生南国，春来发几枝。愿君多采撷，此物最相思。', author: '王维' },
  { text: '独坐幽篁里，弹琴复长啸。深林人不知，明月来相照。', author: '王维' },
  { text: '人闲桂花落，夜静春山空。月出惊山鸟，时鸣春涧中。', author: '王维' },
  { text: '来日绮窗前，寒梅著花未。', author: '王维' },
  { text: '遥知兄弟登高处，遍插茱萸少一人。', author: '王维' },
  { text: '渡头余落日，墟里上孤烟。', author: '王维' },
  { text: '举头望明月，低头思故乡。', author: '李白' },
  { text: '日照香炉生紫烟，遥看瀑布挂前川。', author: '李白' },
  { text: '天门中断楚江开，碧水东流至此回。两岸青山相对出，孤帆一片日边来。', author: '李白' },
  { text: '众鸟高飞尽，孤云独去闲。', author: '李白' },
  { text: '白发三千丈，缘愁似个长。不知明镜里，何处得秋霜。', author: '李白' },
  { text: '峨眉山月半轮秋，影入平羌江水流。夜发清溪向三峡，思君不见下渝州。', author: '李白' },
  { text: '谁家玉笛暗飞声，散入春风满洛城。此夜曲中闻折柳，何人不起故园情。', author: '李白' },
  { text: '月下飞天镜，云生结海楼。仍怜故乡水，万里送行舟。', author: '李白' },
  { text: '浮云游子意，落日故人情。挥手自兹去，萧萧班马鸣。', author: '李白' },
  { text: '花间一壶酒，独酌无相亲。举杯邀明月，对影成三人。', author: '李白' },
  { text: '但使主人能醉客，不知何处是他乡。', author: '李白' },
  { text: '危楼高百尺，手可摘星辰。不敢高声语，恐惊天上人。', author: '李白' },
  { text: '玉阶生白露，夜久侵罗袜。却下水晶帘，玲珑望秋月。', author: '李白' },
  { text: '长风几万里，吹度玉门关。', author: '李白' },
  { text: '金樽清酒斗十千，玉盘珍羞直万钱。停杯投箸不能食，拔剑四顾心茫然。', author: '李白' },
  { text: '闲来垂钓碧溪上，忽复乘舟梦日边。', author: '李白' },
  { text: '君不见黄河之水天上来，奔流到海不复回。', author: '李白' },
  { text: '君不见高堂明镜悲白发，朝如青丝暮成雪。', author: '李白' },
  { text: '钟鼓馔玉不足贵，但愿长醉不愿醒。古来圣贤皆寂寞，惟有饮者留其名。', author: '李白' },
  { text: '五花马，千金裘，呼儿将出换美酒，与尔同销万古愁。', author: '李白' },
  { text: '弃我去者，昨日之日不可留。乱我心者，今日之日多烦忧。', author: '李白' },
  { text: '长风万里送秋雁，对此可以酣高楼。蓬莱文章建安骨，中间小谢又清发。', author: '李白' },
  { text: '俱怀逸兴壮思飞，欲上青天览明月。', author: '李白' },
  { text: '人生在世不称意，明朝散发弄扁舟。', author: '李白' },
  { text: '安能摧眉折腰事权贵，使我不得开心颜。', author: '李白' },
  { text: '一夫当关，万夫莫开。', author: '李白' },
  { text: '锦城虽云乐，不如早还家。', author: '李白' },
  { text: '窗含西岭千秋雪，门泊东吴万里船。', author: '杜甫' },
  { text: '迟日江山丽，春风花草香。泥融飞燕子，沙暖睡鸳鸯。', author: '杜甫' },
  { text: '黄四娘家花满蹊，千朵万朵压枝低。留连戏蝶时时舞，自在娇莺恰恰啼。', author: '杜甫' },
  { text: '此曲只应天上有，人间能得几回闻。', author: '杜甫' },
  { text: '正是江南好风景，落花时节又逢君。', author: '杜甫' },
  { text: '万里悲秋常作客，百年多病独登台。艰难苦恨繁霜鬓，潦倒新停浊酒杯。', author: '杜甫' },
  { text: '出师未捷身先死，长使英雄泪满襟。', author: '杜甫' },
  { text: '花径不曾缘客扫，蓬门今始为君开。', author: '杜甫' },
  { text: '吴楚东南坼，乾坤日夜浮。亲朋无一字，老病有孤舟。', author: '杜甫' },
  { text: '戎马关山北，凭轩涕泗流。', author: '杜甫' },
  { text: '名岂文章著，官应老病休。飘飘何所似，天地一沙鸥。', author: '杜甫' },
  { text: '岱宗夫如何，齐鲁青未了。造化钟神秀，阴阳割昏晓。荡胸生曾云，决眦入归鸟。', author: '杜甫' },
  { text: '安得广厦千万间，大庇天下寒士俱欢颜，风雨不动安如山。', author: '杜甫' },
  { text: '何时眼前突兀见此屋，吾庐独破受冻死亦足。', author: '杜甫' },
  { text: '剑外忽传收蓟北，初闻涕泪满衣裳。却看妻子愁何在，漫卷诗书喜欲狂。', author: '杜甫' },
  { text: '白日放歌须纵酒，青春作伴好还乡。即从巴峡穿巫峡，便下襄阳向洛阳。', author: '杜甫' },
  { text: '功盖三分国，名成八阵图。江流石不转，遗恨失吞吴。', author: '杜甫' },
  { text: '挽弓当挽强，用箭当用长。射人先射马，擒贼先擒王。', author: '杜甫' },
  { text: '文章憎命达，魑魅喜人过。', author: '杜甫' },
  { text: '读书破万卷，下笔如有神。', author: '杜甫' },
  { text: '致君尧舜上，再使风俗淳。', author: '杜甫' },
  { text: '千呼万唤始出来，犹抱琵琶半遮面。', author: '白居易' },
  { text: '大弦嘈嘈如急雨，小弦切切如私语。嘈嘈切切错杂弹，大珠小珠落玉盘。', author: '白居易' },
  { text: '别有幽愁暗恨生，此时无声胜有声。', author: '白居易' },
  { text: '银瓶乍破水浆迸，铁骑突出刀枪鸣。', author: '白居易' },
  { text: '东船西舫悄无言，唯见江心秋月白。', author: '白居易' },
  { text: '座中泣下谁最多，江州司马青衫湿。', author: '白居易' },
  { text: '曾经沧海难为水，除却巫山不是云。', author: '元稹' },
  { text: '后宫佳丽三千人，三千宠爱在一身。', author: '白居易' },
  { text: '遂令天下父母心，不重生男重生女。', author: '白居易' },
  { text: '渔阳鼙鼓动地来，惊破霓裳羽衣曲。', author: '白居易' },
  { text: '六军不发无奈何，宛转蛾眉马前死。君王掩面救不得，回看血泪相和流。', author: '白居易' },
  { text: '芙蓉如面柳如眉，对此如何不泪垂。春风桃李花开日，秋雨梧桐叶落时。', author: '白居易' },
  { text: '上穷碧落下黄泉，两处茫茫皆不见。', author: '白居易' },
  { text: '玉容寂寞泪阑干，梨花一枝春带雨。', author: '白居易' },
  { text: '七月七日长生殿，夜半无人私语时。', author: '白居易' },
  { text: '远芳侵古道，晴翠接荒城。又送王孙去，萋萋满别情。', author: '白居易' },
  { text: '江南好，风景旧曾谙。能不忆江南。', author: '白居易' },
  { text: '最爱湖东行不足，绿杨阴里白沙堤。', author: '白居易' },
  { text: '一道残阳铺水中，半江瑟瑟半江红。可怜九月初三夜，露似真珠月似弓。', author: '白居易' },
  { text: '小娃撑小艇，偷采白莲回。不解藏踪迹，浮萍一道开。', author: '白居易' },
  { text: '春种一粒粟，秋收万颗子。四海无闲田，农夫犹饿死。', author: '李绅' },
  { text: '清明时节雨纷纷，路上行人欲断魂。借问酒家何处有，牧童遥指杏花村。', author: '杜牧' },
  { text: '烟笼寒水月笼沙，夜泊秦淮近酒家。商女不知亡国恨，隔江犹唱后庭花。', author: '杜牧' },
  { text: '折戟沉沙铁未销，自将磨洗认前朝。东风不与周郎便，铜雀春深锁二乔。', author: '杜牧' },
  { text: '银烛秋光冷画屏，轻罗小扇扑流萤。天阶夜色凉如水，卧看牵牛织女星。', author: '杜牧' },
  { text: '多情却似总无情，唯觉樽前笑不成。蜡烛有心还惜别，替人垂泪到天明。', author: '杜牧' },
  { text: '娉娉袅袅十三余，豆蔻梢头二月初。春风十里扬州路，卷上珠帘总不如。', author: '杜牧' },
  { text: '青山隐隐水迢迢，秋尽江南草未凋。二十四桥明月夜，玉人何处教吹箫。', author: '杜牧' },
  { text: '十年一觉扬州梦，赢得青楼薄幸名。', author: '杜牧' },
  { text: '长安回望绣成堆，山顶千门次第开。一骑红尘妃子笑，无人知是荔枝来。', author: '杜牧' },
  { text: '胜败兵家事不期，包羞忍耻是男儿。江东子弟多才俊，卷土重来未可知。', author: '杜牧' },
  { text: '晓镜但愁云鬓改，夜吟应觉月光寒。蓬山此去无多路，青鸟殷勤为探看。', author: '李商隐' },
  { text: '隔座送钩春酒暖，分曹射覆蜡灯红。嗟余听鼓应官去，走马兰台类转蓬。', author: '李商隐' },
  { text: '庄生晓梦迷蝴蝶，望帝春心托杜鹃。沧海月明珠有泪，蓝田日暖玉生烟。', author: '李商隐' },
  { text: '向晚意不适，驱车登古原。夕阳无限好，只是近黄昏。', author: '李商隐' },
  { text: '可怜夜半虚前席，不问苍生问鬼神。', author: '李商隐' },
  { text: '嫦娥应悔偷灵药，碧海青天夜夜心。', author: '李商隐' },
  { text: '神女生涯原是梦，小姑居处本无郎。', author: '李商隐' },
  { text: '春心莫共花争发，一寸相思一寸灰。', author: '李商隐' },
  { text: '刘郎已恨蓬山远，更隔蓬山一万重。', author: '李商隐' },
  { text: '秋阴不散霜飞晚，留得枯荷听雨声。', author: '李商隐' },
  { text: '天意怜幽草，人间重晚晴。', author: '李商隐' },
  { text: '永忆江湖归白发，欲回天地入扁舟。不知腐鼠成滋味，猜意鹓雏竟未休。', author: '李商隐' },
  { text: '此日六军同驻马，当时七夕笑牵牛。如何四纪为天子，不及卢家有莫愁。', author: '李商隐' },
  { text: '鸡声茅店月，人迹板桥霜。', author: '温庭筠' },
  { text: '因思杜陵梦，凫雁满回塘。', author: '温庭筠' },
  { text: '梳洗罢，独倚望江楼。过尽千帆皆不是，斜晖脉脉水悠悠。肠断白苹洲。', author: '温庭筠' },
  { text: '小山重叠金明灭，鬓云欲度香腮雪。懒起画蛾眉，弄妆梳洗迟。', author: '温庭筠' },
  { text: '照花前后镜，花面交相映。新帖绣罗襦，双双金鹧鸪。', author: '温庭筠' },
  { text: '梧桐树，三更雨，不道离情正苦。一叶叶，一声声，空阶滴到明。', author: '温庭筠' },
  { text: '姑苏城外寒山寺，夜半钟声到客船。', author: '张继' },
  { text: '独怜幽草涧边生，上有黄鹂深树鸣。春潮带雨晚来急，野渡无人舟自横。', author: '韦应物' },
  { text: '怀君属秋夜，散步咏凉天。空山松子落，幽人应未眠。', author: '韦应物' },
  { text: '浮云一别后，流水十年间。欢笑情如旧，萧疏鬓已斑。', author: '韦应物' },
  { text: '身多疾病思田里，邑有流亡愧俸钱。', author: '韦应物' },
  { text: '昔日龌龊不足夸，今朝放荡思无涯。春风得意马蹄疾，一日看尽长安花。', author: '孟郊' },
  { text: '鸟宿池边树，僧敲月下门。过桥分野色，移石动云根。', author: '贾岛' },
  { text: '十年磨一剑，霜刃未曾试。今日把示君，谁有不平事。', author: '贾岛' },
  { text: '秋风生渭水，落叶满长安。', author: '贾岛' },
  { text: '两句三年得，一吟双泪流。', author: '贾岛' },
  { text: '昔人已乘黄鹤去，此地空余黄鹤楼。黄鹤一去不复返，白云千载空悠悠。', author: '崔颢' },
  { text: '晴川历历汉阳树，芳草萋萋鹦鹉洲。日暮乡关何处是，烟波江上使人愁。', author: '崔颢' },
  { text: '去年今日此门中，人面桃花相映红。人面不知何处去，桃花依旧笑春风。', author: '崔护' },
  { text: '千里黄云白日曛，北风吹雁雪纷纷。莫愁前路无知己，天下谁人不识君。', author: '高适' },
  { text: '战士军前半死生，美人帐下犹歌舞。', author: '高适' },
  { text: '君不见沙场征战苦，至今犹忆李将军。', author: '高适' },
  { text: '日暮苍山远，天寒白屋贫。柴门闻犬吠，风雪夜归人。', author: '刘长卿' },
  { text: '苍苍竹林寺，杳杳钟声晚。荷笠带斜阳，青山独归远。', author: '刘长卿' },
  { text: '泠泠七弦上，静听松风寒。古调虽自爱，今人多不弹。', author: '刘长卿' },
  { text: '斯是陋室，惟吾德馨。苔痕上阶绿，草色入帘青。', author: '刘禹锡' },
  { text: '谈笑有鸿儒，往来无白丁。', author: '刘禹锡' },
  { text: '东边日出西边雨，道是无晴却有晴。', author: '刘禹锡' },
  { text: '朱雀桥边野草花，乌衣巷口夕阳斜。旧时王谢堂前燕，飞入寻常百姓家。', author: '刘禹锡' },
  { text: '遥望洞庭山水翠，白银盘里一青螺。', author: '刘禹锡' },
  { text: '自古逢秋悲寂寥，我言秋日胜春朝。晴空一鹤排云上，便引诗情到碧霄。', author: '刘禹锡' },
  { text: '九曲黄河万里沙，浪淘风簸自天涯。如今直上银河去，同到牵牛织女家。', author: '刘禹锡' },
  { text: '淮水东边旧时月，夜深还过女墙来。', author: '刘禹锡' },
  { text: '千寻铁锁沉江底，一片降幡出石头。人世几回伤往事，山形依旧枕寒流。', author: '刘禹锡' },
  { text: '百亩庭中半是苔，桃花净尽菜花开。种桃道士归何处，前度刘郎今又来。', author: '刘禹锡' },
  { text: '山光悦鸟性，潭影空人心。', author: '常建' },
  { text: '滟滟随波千万里，何处春江无月明。', author: '张若虚' },
  { text: '江天一色无纤尘，皎皎空中孤月轮。', author: '张若虚' },
  { text: '人生代代无穷已，江月年年望相似。', author: '张若虚' },
  { text: '白云一片去悠悠，青枫浦上不胜愁。谁家今夜扁舟子，何处相思明月楼。', author: '张若虚' },
  { text: '不知乘月几人归，落月摇情满江树。', author: '张若虚' },
  { text: '情人怨遥夜，竟夕起相思。灭烛怜光满，披衣觉露滋。不堪盈手赠，还寝梦佳期。', author: '张九龄' },
  { text: '草木有本心，何求美人折。', author: '张九龄' },
  { text: '墙角数枝梅，凌寒独自开。遥知不是雪，为有暗香来。', author: '王安石' },
  { text: '爆竹声中一岁除，春风送暖入屠苏。千门万户曈曈日，总把新桃换旧符。', author: '王安石' },
  { text: '京口瓜洲一水间，钟山只隔数重山。', author: '王安石' },
  { text: '至今商女，时时犹唱，后庭遗曲。', author: '王安石' },
  { text: '半亩方塘一鉴开，天光云影共徘徊。', author: '朱熹' },
  { text: '少年易老学难成，一寸光阴不可轻。未觉池塘春草梦，阶前梧叶已秋声。', author: '朱熹' },
  { text: '向来枉费推移力，此日中流自在行。', author: '朱熹' },
  { text: '僵卧孤村不自哀，尚思为国戍轮台。夜阑卧听风吹雨，铁马冰河入梦来。', author: '陆游' },
  { text: '三万里河东入海，五千仞岳上摩天。遗民泪尽胡尘里，南望王师又一年。', author: '陆游' },
  { text: '出师一表真名世，千载谁堪伯仲间。', author: '陆游' },
  { text: '小楼一夜听春雨，深巷明朝卖杏花。矮纸斜行闲作草，晴窗细乳戏分茶。', author: '陆游' },
  { text: '素衣莫起风尘叹，犹及清明可到家。', author: '陆游' },
  { text: '红酥手，黄縢酒，满城春色宫墙柳。东风恶，欢情薄。一怀愁绪，几年离索。错错错。', author: '陆游' },
  { text: '春如旧，人空瘦，泪痕红浥鲛绡透。桃花落，闲池阁。山盟虽在，锦书难托。莫莫莫。', author: '陆游' },
  { text: '驿外断桥边，寂寞开无主。已是黄昏独自愁，更著风和雨。', author: '陆游' },
  { text: '无意苦争春，一任群芳妒。零落成泥碾作尘，只有香如故。', author: '陆游' },
  { text: '辛苦遭逢起一经，干戈寥落四周星。山河破碎风飘絮，身世浮沉雨打萍。', author: '文天祥' },
  { text: '天地有正气，杂然赋流形。下则为河岳，上则为日星。', author: '文天祥' },
  { text: '时穷节乃见，一一垂丹青。', author: '文天祥' },
  { text: '应怜屐齿印苍苔，小扣柴扉久不开。', author: '叶绍翁' },
  { text: '泉眼无声惜细流，树阴照水爱晴柔。', author: '杨万里' },
  { text: '毕竟西湖六月中，风光不与四时同。', author: '杨万里' },
  { text: '莫言下岭便无难，赚得行人错喜欢。正入万山圈子里，一山放过一山拦。', author: '杨万里' },
  { text: '月子弯弯照九州，几家欢乐几家愁。', author: '南宋民歌' },
  { text: '怒发冲冠，凭栏处潇潇雨歇。抬望眼，仰天长啸，壮怀激烈。', author: '岳飞' },
  { text: '三十功名尘与土，八千里路云和月。莫等闲白了少年头，空悲切。', author: '岳飞' },
  { text: '靖康耻，犹未雪。臣子恨，何时灭。驾长车踏破，贺兰山缺。', author: '岳飞' },
  { text: '壮志饥餐胡虏肉，笑谈渴饮匈奴血。待从头收拾旧山河，朝天阙。', author: '岳飞' },
  { text: '欲将心事付瑶琴，知音少，弦断有谁听。', author: '岳飞' },
  { text: '先天下之忧而忧，后天下之乐而乐。', author: '范仲淹' },
  { text: '不以物喜，不以己悲。', author: '范仲淹' },
  { text: '浊酒一杯家万里，燕然未勒归无计。羌管悠悠霜满地，人不寐，将军白发征夫泪。', author: '范仲淹' },
  { text: '碧云天，黄叶地，秋色连波，波上寒烟翠。山映斜阳天接水，芳草无情，更在斜阳外。', author: '范仲淹' },
  { text: '明月楼高休独倚，酒入愁肠，化作相思泪。', author: '范仲淹' },
  { text: '衣带渐宽终不悔，为伊消得人憔悴。', author: '柳永' },
  { text: '寒蝉凄切，对长亭晚，骤雨初歇。都门帐饮无绪，留恋处，兰舟催发。', author: '柳永' },
  { text: '执手相看泪眼，竟无语凝噎。念去去千里烟波，暮霭沉沉楚天阔。', author: '柳永' },
  { text: '多情自古伤离别，更那堪冷落清秋节。今宵酒醒何处，杨柳岸晓风残月。', author: '柳永' },
  { text: '此去经年，应是良辰好景虚设。便纵有千种风情，更与何人说。', author: '柳永' },
  { text: '有三秋桂子，十里荷花。', author: '柳永' },
  { text: '渐霜风凄紧，关河冷落，残照当楼。', author: '柳永' },
  { text: '忍把浮名，换了浅斟低唱。', author: '柳永' },
  { text: '一曲新词酒一杯，去年天气旧亭台。夕阳西下几时回。', author: '晏殊' },
  { text: '无可奈何花落去，似曾相识燕归来。小园香径独徘徊。', author: '晏殊' },
  { text: '昨夜西风凋碧树，独上高楼，望尽天涯路。欲寄彩笺兼尺素，山长水阔知何处。', author: '晏殊' },
  { text: '满目山河空念远，落花风雨更伤春。不如怜取眼前人。', author: '晏殊' },
  { text: '池上碧苔三四点，叶底黄鹂一两声。日长飞絮轻。', author: '晏殊' },
  { text: '疑怪昨宵春梦好，元是今朝斗草赢。笑从双脸生。', author: '晏殊' },
  { text: '春花秋月何时了，往事知多少。小楼昨夜又东风，故国不堪回首月明中。', author: '李煜' },
  { text: '雕栏玉砌应犹在，只是朱颜改。问君能有几多愁，恰似一江春水向东流。', author: '李煜' },
  { text: '无言独上西楼，月如钩。寂寞梧桐深院锁清秋。剪不断，理还乱，是离愁。别是一般滋味在心头。', author: '李煜' },
  { text: '林花谢了春红，太匆匆。无奈朝来寒雨晚来风。胭脂泪，相留醉，几时重。自是人生长恨水长东。', author: '李煜' },
  { text: '帘外雨潺潺，春意阑珊。罗衾不耐五更寒。梦里不知身是客，一晌贪欢。', author: '李煜' },
  { text: '独自莫凭栏，无限江山，别时容易见时难。流水落花春去也，天上人间。', author: '李煜' },
  { text: '还似旧时游上苑，车如流水马如龙。花月正春风。', author: '李煜' },
  { text: '离恨恰如春草，更行更远还生。', author: '李煜' },
  { text: '人生若只如初见，何事秋风悲画扇。等闲变却故人心，却道故人心易变。', author: '纳兰性德' },
  { text: '骊山语罢清宵半，泪雨霖铃终不怨。何如薄幸锦衣郎，比翼连枝当日愿。', author: '纳兰性德' },
  { text: '谁念西风独自凉，萧萧黄叶闭疏窗。沉思往事立残阳。被酒莫惊春睡重，赌书消得泼茶香。当时只道是寻常。', author: '纳兰性德' },
  { text: '山一程，水一程，身向榆关那畔行，夜深千帐灯。风一更，雪一更，聒碎乡心梦不成，故园无此声。', author: '纳兰性德' },
  { text: '辛苦最怜天上月，一昔如环，昔昔都成玦。若似月轮终皎洁，不辞冰雪为卿热。', author: '纳兰性德' },
  { text: '而今才道当时错，心绪凄迷。红泪偷垂，满眼春风百事非。', author: '纳兰性德' },
  { text: '滚滚长江东逝水，浪花淘尽英雄。是非成败转头空。青山依旧在，几度夕阳红。', author: '杨慎' },
  { text: '白发渔樵江渚上，惯看秋月春风。一壶浊酒喜相逢。古今多少事，都付笑谈中。', author: '杨慎' },
  { text: '千锤万凿出深山，烈火焚烧若等闲。粉骨碎身浑不怕，要留清白在人间。', author: '于谦' },
  { text: '但愿苍生俱饱暖，不辞辛苦出山林。', author: '于谦' },
  { text: '待到秋来九月八，我花开后百花杀。冲天香阵透长安，满城尽带黄金甲。', author: '黄巢' },
  { text: '他年我若为青帝，报与桃花一处开。', author: '黄巢' },
  { text: '溪云初起日沉阁，山雨欲来风满楼。', author: '许浑' },
  { text: '行人莫问当年事，故国东来渭水流。', author: '许浑' },
  { text: '洛阳城里见秋风，欲作家书意万重。复恐匆匆说不尽，行人临发又开封。', author: '张籍' },
  { text: '还君明珠双泪垂，何不相逢未嫁时。', author: '张籍' },
  { text: '三日入厨下，洗手作羹汤。未谙姑食性，先遣小姑尝。', author: '王建' },
  { text: '今夜月明人尽望，不知秋思落谁家。', author: '王建' },
  { text: '未谙姑食性，先遣小姑尝。', author: '王建' },
  { text: '潮落夜江斜月里，两三星火是瓜洲。', author: '张祜' },
  { text: '故国三千里，深宫二十年。一声何满子，双泪落君前。', author: '张祜' },
  { text: '凭君莫话封侯事，一将功成万骨枯。', author: '曹松' },
  { text: '打起黄莺儿，莫教枝上啼。啼时惊妾梦，不得到辽西。', author: '金昌绪' },
  { text: '劝君莫惜金缕衣，劝君惜取少年时。花开堪折直须折，莫待无花空折枝。', author: '杜秋娘' },
  { text: '妆罢低声问夫婿，画眉深浅入时无。', author: '朱庆馀' },
  { text: '可怜无定河边骨，犹是春闺梦里人。', author: '陈陶' },
  { text: '愿得此身长报国，何须生入玉门关。', author: '戴叔伦' },
  { text: '一年将尽夜，万里未归人。', author: '戴叔伦' },
  { text: '兰溪三日桃花雨，半夜鲤鱼来上滩。', author: '戴叔伦' },
  { text: '回乐峰前沙似雪，受降城外月如霜。不知何处吹芦管，一夜征人尽望乡。', author: '李益' },
  { text: '问姓惊初见，称名忆旧容。', author: '李益' },
  { text: '早知潮有信，嫁与弄潮儿。', author: '李益' },
  { text: '从此无心爱良夜，任他明月下西楼。', author: '李益' },
  { text: '碛里征人三十万，一时回向月明看。', author: '李益' },
  { text: '位卑未敢忘忧国，事定犹须待阖棺。', author: '陆游' },
  { text: '一身报国有万死，双鬓向人无再青。', author: '陆游' },
  { text: '呜呼楚虽三户能亡秦，岂有堂堂中国空无人。', author: '陆游' },
  { text: '遗民忍死望恢复，几处今宵垂泪痕。', author: '陆游' },
  { text: '此生谁料，心在天山，身老沧洲。', author: '陆游' },
  { text: '臣心一片磁针石，不指南方不肯休。', author: '文天祥' },
  { text: '故垒西边，人道是，三国周郎赤壁。乱石穿空，惊涛拍岸，卷起千堆雪。', author: '苏轼' },
  { text: '江山如画，一时多少豪杰。遥想公瑾当年，小乔初嫁了，雄姿英发。', author: '苏轼' },
  { text: '羽扇纶巾，谈笑间，樯橹灰飞烟灭。故国神游，多情应笑我，早生华发。', author: '苏轼' },
  { text: '人生如梦，一尊还酹江月。', author: '苏轼' },
  { text: '我欲乘风归去，又恐琼楼玉宇，高处不胜寒。起舞弄清影，何似在人间。', author: '苏轼' },
  { text: '千里孤坟，无处话凄凉。纵使相逢应不识，尘满面，鬓如霜。', author: '苏轼' },
  { text: '夜来幽梦忽还乡，小轩窗，正梳妆。相顾无言，惟有泪千行。', author: '苏轼' },
  { text: '料得年年肠断处，明月夜，短松冈。', author: '苏轼' },
  { text: '锦帽貂裘，千骑卷平冈。为报倾城随太守，亲射虎，看孙郎。', author: '苏轼' },
  { text: '酒酣胸胆尚开张，鬓微霜，又何妨。持节云中，何日遣冯唐。会挽雕弓如满月，西北望，射天狼。', author: '苏轼' },
  { text: '料峭春风吹酒醒，微冷，山头斜照却相迎。回首向来萧瑟处，归去，也无风雨也无晴。', author: '苏轼' },
  { text: '谁见幽人独往来，缥缈孤鸿影。惊起却回头，有恨无人省。拣尽寒枝不肯栖，寂寞沙洲冷。', author: '苏轼' },
  { text: '春色三分，二分尘土，一分流水。细看来，不是杨花，点点是离人泪。', author: '苏轼' },
  { text: '水光潋滟晴方好，山色空蒙雨亦奇。欲把西湖比西子，淡妆浓抹总相宜。', author: '苏轼' },
  { text: '蒌蒿满地芦芽短，正是河豚欲上时。', author: '苏轼' },
  { text: '黑云翻墨未遮山，白雨跳珠乱入船。卷地风来忽吹散，望湖楼下水如天。', author: '苏轼' },
  { text: '一年好景君须记，最是橙黄橘绿时。', author: '苏轼' },
  { text: '此生此夜不长好，明月明年何处看。', author: '苏轼' },
  { text: '春宵一刻值千金，花有清香月有阴。', author: '苏轼' },
  { text: '人生到处知何似，应似飞鸿踏雪泥。泥上偶然留指爪，鸿飞那复计东西。', author: '苏轼' },
  { text: '可使食无肉，不可居无竹。无肉令人瘦，无竹令人俗。', author: '苏轼' },
  { text: '日啖荔枝三百颗，不辞长作岭南人。', author: '苏轼' },
  { text: '九死南荒吾不恨，兹游奇绝冠平生。', author: '苏轼' },
  { text: '谁道人生无再少，门前流水尚能西。休将白发唱黄鸡。', author: '苏轼' },
  { text: '酒困路长惟欲睡，日高人渴漫思茶。敲门试问野人家。', author: '苏轼' },
  { text: '枝上柳绵吹又少，天涯何处无芳草。墙里秋千墙外道。墙外行人，墙里佳人笑。', author: '苏轼' },
  { text: '笑渐不闻声渐悄，多情却被无情恼。', author: '苏轼' },
  { text: '燕子楼空，佳人何在，空锁楼中燕。古今如梦，何曾梦觉，但有旧欢新怨。', author: '苏轼' },
  { text: '试问夜如何，夜已三更，金波淡，玉绳低转。但屈指西风几时来，又不道流年暗中偷换。', author: '苏轼' },
  { text: '小舟从此逝，江海寄余生。', author: '苏轼' },
  { text: '此心安处是吾乡。', author: '苏轼' },
  { text: '乍暖还寒时候，最难将息。三杯两盏淡酒，怎敌他晚来风急。雁过也，正伤心，却是旧时相识。', author: '李清照' },
  { text: '满地黄花堆积，憔悴损，如今有谁堪摘。守着窗儿，独自怎生得黑。梧桐更兼细雨，到黄昏点点滴滴。这次第，怎一个愁字了得。', author: '李清照' },
  { text: '佳节又重阳，玉枕纱厨，半夜凉初透。东篱把酒黄昏后，有暗香盈袖。', author: '李清照' },
  { text: '云中谁寄锦书来，雁字回时，月满西楼。花自飘零水自流，一种相思，两处闲愁。此情无计可消除，才下眉头，却上心头。', author: '李清照' },
  { text: '物是人非事事休，欲语泪先流。闻说双溪春尚好，也拟泛轻舟。只恐双溪舴艋舟，载不动许多愁。', author: '李清照' },
  { text: '试问卷帘人，却道海棠依旧。', author: '李清照' },
  { text: '兴尽晚回舟，误入藕花深处。争渡，争渡，惊起一滩鸥鹭。', author: '李清照' },
  { text: '仿佛梦魂归帝所，闻天语，殷勤问我归何处。我报路长嗟日暮，学诗谩有惊人句。九万里风鹏正举，风休住，蓬舟吹取三山去。', author: '李清照' },
  { text: '至今思项羽，不肯过江东。', author: '李清照' },
  { text: '不如向帘儿底下，听人笑语。', author: '李清照' },
  { text: '新来瘦，非干病酒，不是悲秋。', author: '李清照' },
  { text: '倚门回首，却把青梅嗅。', author: '李清照' },
  { text: '何须浅碧深红色，自是花中第一流。', author: '李清照' },
  { text: '舞榭歌台，风流总被雨打风吹去。斜阳草树，寻常巷陌，人道寄奴曾住。想当年，金戈铁马，气吞万里如虎。', author: '辛弃疾' },
  { text: '元嘉草草，封狼居胥，赢得仓皇北顾。四十三年，望中犹记，烽火扬州路。可堪回首，佛狸祠下，一片神鸦社鼓。凭谁问，廉颇老矣，尚能饭否。', author: '辛弃疾' },
  { text: '八百里分麾下炙，五十弦翻塞外声，沙场秋点兵。马作的卢飞快，弓如霹雳弦惊。了却君王天下事，赢得生前身后名。可怜白发生。', author: '辛弃疾' },
  { text: '东风夜放花千树，更吹落星如雨。宝马雕车香满路，凤箫声动，玉壶光转，一夜鱼龙舞。蛾儿雪柳黄金缕，笑语盈盈暗香去。', author: '辛弃疾' },
  { text: '众里寻他千百度，蓦然回首，那人却在，灯火阑珊处。', author: '辛弃疾' },
  { text: '明月别枝惊鹊，清风半夜鸣蝉。稻花香里说丰年，听取蛙声一片。七八个星天外，两三点雨山前。旧时茅店社林边，路转溪桥忽见。', author: '辛弃疾' },
  { text: '茅檐低小，溪上青青草。醉里吴音相媚好，白发谁家翁媪。大儿锄豆溪东，中儿正织鸡笼。最喜小儿亡赖，溪头卧剥莲蓬。', author: '辛弃疾' },
  { text: '少年不识愁滋味，爱上层楼。爱上层楼，为赋新词强说愁。而今识尽愁滋味，欲说还休。欲说还休，却道天凉好个秋。', author: '辛弃疾' },
  { text: '郁孤台下清江水，中间多少行人泪。西北望长安，可怜无数山。青山遮不住，毕竟东流去。江晚正愁余，山深闻鹧鸪。', author: '辛弃疾' },
  { text: '何处望神州，满眼风光北固楼。千古兴亡多少事，悠悠，不尽长江滚滚流。年少万兜鍪，坐断东南战未休。天下英雄谁敌手，曹刘，生子当如孙仲谋。', author: '辛弃疾' },
  { text: '更能消几番风雨，匆匆春又归去。惜春长怕花开早，何况落红无数。春且住，见说道天涯芳草无归路。怨春不语，算只有殷勤，画檐蛛网，尽日惹飞絮。', author: '辛弃疾' },
  { text: '长门事，准拟佳期又误，蛾眉曾有人妒。千金纵买相如赋，脉脉此情谁诉。君莫舞，君不见玉环飞燕皆尘土。闲愁最苦，休去倚危栏，斜阳正在，烟柳断肠处。', author: '辛弃疾' },
  { text: '楚天千里清秋，水随天去秋无际。遥岑远目，献愁供恨，玉簪螺髻。落日楼头，断鸿声里，江南游子。把吴钩看了，栏杆拍遍，无人会登临意。', author: '辛弃疾' },
  { text: '休说鲈鱼堪脍，尽西风季鹰归未。求田问舍，怕应羞见，刘郎才气。可惜流年，忧愁风雨，树犹如此。倩何人唤取，红巾翠袖，揾英雄泪。', author: '辛弃疾' },
  { text: '壮岁旌旗拥万夫，锦襜突骑渡江初。燕兵夜娖银胡觮，汉箭朝飞金仆姑。追往事，叹今吾，春风不染白髭须。却将万字平戎策，换得东家种树书。', author: '辛弃疾' },
  { text: '我见青山多妩媚，料青山见我应如是。', author: '辛弃疾' },
  { text: '不恨古人吾不见，恨古人不见吾狂耳。知我者，二三子。', author: '辛弃疾' },
  { text: '最苦是立尽月黄昏，阑干曲。', author: '辛弃疾' },
  { text: '斫去桂婆娑，人道是清光更多。', author: '辛弃疾' },
  { text: '城中桃李愁风雨，春在溪头荠菜花。', author: '辛弃疾' },
  { text: '江头未是风波恶，别有人间行路难。', author: '辛弃疾' },
  { text: '若教眼底无离恨，不信人间有白头。', author: '辛弃疾' },
  { text: '梦回人远许多愁，只在梨花风雨处。', author: '辛弃疾' },
  { text: '布被秋宵梦觉，眼前万里江山。', author: '辛弃疾' },
  { text: '稻花香里说丰年，听取蛙声一片。', author: '辛弃疾' },
  { text: '醉里且贪欢笑，要愁那得工夫。近来始觉古人书，信著全无是处。昨夜松边醉倒，问松我醉何如。只疑松动要来扶，以手推松曰去。', author: '辛弃疾' },
  { text: '最喜小儿亡赖，溪头卧剥莲蓬。', author: '辛弃疾' },
  { text: '天下英雄谁敌手，曹刘，生子当如孙仲谋。', author: '辛弃疾' },
  { text: '青山遮不住，毕竟东流去。', author: '辛弃疾' },
  { text: '蓦然回首，那人却在，灯火阑珊处。', author: '辛弃疾' },
  { text: '枯藤老树昏鸦，小桥流水人家，古道西风瘦马。夕阳西下，断肠人在天涯。', author: '马致远' },
  { text: '兴，百姓苦；亡，百姓苦。', author: '张养浩' },
  { text: '峰峦如聚，波涛如怒，山河表里潼关路。', author: '张养浩' },
  { text: '望西都，意踌躇。伤心秦汉经行处，宫阙万间都做了土。', author: '张养浩' },
  { text: '碧云天，黄花地，西风紧，北雁南飞。晓来谁染霜林醉，总是离人泪。', author: '王实甫' },
  { text: '花落水流红，闲愁万种，无语怨东风。', author: '王实甫' },
  { text: '良辰美景奈何天，赏心乐事谁家院。', author: '汤显祖' },
  { text: '玲珑骰子安红豆，入骨相思知不知。', author: '温庭筠' }
];

function stockPrefix(code) {
  if (STOCK_INFO[code]) return STOCK_INFO[code].prefix;
  if (/^(60|68|8)/.test(code)) return 'sh';
  if (/^(00|30|15|12|16)/.test(code)) return 'sz';
  return 'sh';
}

function formatUd(ud) {
  if (!ud) return '—';
  const upColor = '#ff1744';
  const downColor = '#00c853';
  let up, down, flat;
  if (typeof ud === 'string') {
    const parts = ud.split(':').map(s => s.trim());
    if (parts.length < 2) return ud;
    up = parts[0]; down = parts[1]; flat = parts[2];
  } else {
    up = ud.up; down = ud.down; flat = ud.flat;
  }
  let html = `<span style="color:${upColor};font-weight:700">${up}</span> : <span style="color:${downColor};font-weight:700">${down}</span>`;
  if (flat && (typeof flat === 'number' ? flat > 0 : flat !== '0')) {
    html += ` : <span style="color:var(--text-dim);font-weight:600">${flat}</span>`;
  }
  return html;
}

function linkStocks(text, opts={}) {
  if (!text) return text;
  const showPrice = opts.price === true;
  let html = text;
  const entries = Object.keys(STOCK_INFO).map(code => ({code, ...STOCK_INFO[code]}))
    .sort((a,b) => b.name.length - a.name.length);
  // Replace name (optionally with adjacent code in parentheses) by placeholder
  entries.forEach(e => {
    const escName = e.name.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const re = new RegExp(`${escName}(?:[（(]${e.code}[^）)]*[）)])?`, 'g');
    html = html.replace(re, `@@STOCK_${e.code}@@`);
  });
  // Replace any remaining 6-digit codes
  html = html.replace(/\b(\d{6})\b/g, (m, code) => STOCK_INFO[code] ? `@@STOCK_${code}@@` : m);
  // Resolve placeholders to clickable tags
  entries.forEach(e => {
    html = html.replace(new RegExp(`@@STOCK_${e.code}@@`, 'g'), stockTag(e.code, { price: showPrice }));
  });
  return html;
}

function stockTag(code, opts={}) {
  const info = STOCK_INFO[code];
  if (!info) return code;
  const showName = opts.name !== false;
  const showCode = opts.code !== false;
  const showPrice = opts.price !== false;
  const label = (showName ? info.name : '') + (showCode ? (showName ? '(' : '') + code + (showName ? ')' : '') : '');
  if (info.prefix) {
    return `<a class="stock-link" onclick="showTrend('${code}');event.stopPropagation();">${label}${showPrice && info.price !== '—' ? ' <span class="stock-price">¥' + info.price + '</span>' : ''}</a>`;
  }
  return `<span class="stock-link" style="cursor:default;font-weight:600">${label}</span>`;
}

function tradeTagClass(side='') {
  if (side.includes('买') || side.includes('定投')) return 'trade-buy';
  if (side.includes('卖') || side.includes('赎回')) return 'trade-sell';

}
function tradeStats(code, group='stocks') {
  const rows = (TRANSACTIONS[group] || []).filter(t => t.code === code);
  const buy = rows.filter(t => t.side.includes('买') || t.side.includes('定投'));
  const sell = rows.filter(t => t.side.includes('卖') || t.side.includes('赎回'));
  const other = rows.length - buy.length - sell.length;
  const buyAmount = buy.reduce((s,t) => s + Number(t.amount || 0), 0);
  const sellAmount = sell.reduce((s,t) => s + Number(t.amount || 0), 0);
  const latest = rows[0];
  return { rows, buy, sell, other, buyAmount, sellAmount, latest };
}
function tradeMarkers(code, group='stocks') {

}

async function fetchKlineData(code, klt) {
  const secid = eastmoneySecid(code);
  const url = `https://push2his.eastmoney.com/api/qt/stock/kline/get?secid=${secid}&fields1=f1,f2,f3,f4,f5,f6&fields2=f51,f52,f53,f54,f55,f56,f57,f58,f59,f60,f61&klt=${klt}&fqt=0&end=20500101&lmt=120`;
  const r = await fetch(url);
  if (!r.ok) throw new Error('K线数据请求失败');
  const data = await r.json();
  if (!data || !data.data || !data.data.klines || !data.data.klines.length) {
    throw new Error('K线数据为空');
  }
  return data.data.klines.map(line => {
    const parts = line.split(',');
    return {
      date: parts[0],
      open: parseFloat(parts[1]),
      close: parseFloat(parts[2]),
      high: parseFloat(parts[3]),
      low: parseFloat(parts[4]),
      volume: parseFloat(parts[5]),
      amount: parseFloat(parts[6])
    };
  });
}

function calcMA(data, period) {
  const result = [];
  for (let i = 0; i < data.length; i++) {
    if (i < period - 1) {
      result.push(null);
    } else {
      let sum = 0;
      for (let j = i - period + 1; j <= i; j++) {
        sum += data[j].close;
      }
      result.push(+(sum / period).toFixed(3));
    }
  }
  return result;
}

function drawFundNavChart(canvas, code) {
  const f = FUND_PORTFOLIO.find(item => item.code === code);
  if (!f || !canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  const W = rect.width, H = rect.height || 200;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, W, H);

  // 收集该基金的交易记录（按日期排序）加上当前净值
  const trades = (TRANSACTIONS.funds || []).filter(t => t.code === code && t.price > 0).slice().sort((a,b) => a.date.localeCompare(b.date));
  if (!trades.length) {
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.font = '14px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('暂无净值走势数据', W/2, H/2);
    return;
  }

  // 构建数据点：交易日期->净值，加上今天的最新净值
  const points = trades.map(t => ({ date: t.date, nav: Number(t.price), label: t.side }));
  points.push({ date: new Date().toISOString().slice(0,10), nav: Number(f.latestNav), label: '最新' });

  const navs = points.map(p => p.nav);
  const minNav = Math.min(...navs) * 0.98;
  const maxNav = Math.max(...navs) * 1.02;
  const pad = { l: 50, r: 20, t: 20, b: 30 };
  const cw = W - pad.l - pad.r;
  const ch = H - pad.t - pad.b;

  // 背景网格
  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = pad.t + ch * i / 4;
    ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(W - pad.r, y); ctx.stroke();
    const val = maxNav - (maxNav - minNav) * i / 4;
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.font = '11px sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText(val.toFixed(4), pad.l - 6, y + 4);
  }

  // 成本线
  const costY = pad.t + ch * (1 - (Number(f.unitCost) - minNav) / (maxNav - minNav));
  ctx.strokeStyle = 'rgba(255,214,0,0.5)';
  ctx.setLineDash([5, 4]);
  ctx.beginPath(); ctx.moveTo(pad.l, costY); ctx.lineTo(W - pad.r, costY); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = 'rgba(255,214,0,0.8)';
  ctx.font = '11px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText(`成本 ${Number(f.unitCost).toFixed(4)}`, pad.l + 4, costY - 4);

  // 绘制折线
  ctx.strokeStyle = Number(f.holdingIncome) >= 0 ? '#e74c3c' : '#2ecc71';
  ctx.lineWidth = 2;
  ctx.beginPath();
  points.forEach((p, i) => {
    const x = pad.l + cw * i / (points.length - 1);
    const y = pad.t + ch * (1 - (p.nav - minNav) / (maxNav - minNav));
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  });
  ctx.stroke();

  // 填充区域
  ctx.lineTo(pad.l + cw, pad.t + ch);
  ctx.lineTo(pad.l, pad.t + ch);
  ctx.closePath();
  const grad = ctx.createLinearGradient(0, pad.t, 0, pad.t + ch);
  grad.addColorStop(0, Number(f.holdingIncome) >= 0 ? 'rgba(231,76,60,0.25)' : 'rgba(46,204,113,0.25)');
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grad;
  ctx.fill();

  // 数据点
  points.forEach((p, i) => {
    const x = pad.l + cw * i / (points.length - 1);
    const y = pad.t + ch * (1 - (p.nav - minNav) / (maxNav - minNav));
    const isLatest = i === points.length - 1;
    const isBuy = p.label.includes('买') || p.label.includes('定投');
    ctx.fillStyle = isLatest ? (Number(f.holdingIncome) >= 0 ? '#e74c3c' : '#2ecc71') : (isBuy ? '#3498db' : '#9b59b6');
    ctx.beginPath(); ctx.arc(x, y, isLatest ? 5 : 3.5, 0, Math.PI * 2); ctx.fill();
    if (isLatest) {
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
      ctx.fillStyle = '#fff'; ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'left';
      ctx.fillText(p.nav.toFixed(4), x + 8, y + 4);
    }
  });

  // X轴日期标签（首/中/末）
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.font = '10px sans-serif';
  ctx.textAlign = 'center';
  [0, Math.floor(points.length/2), points.length-1].forEach(i => {
    const x = pad.l + cw * i / (points.length - 1);
    ctx.fillText(points[i].date.slice(5), x, H - 10);
  });

  // 图例
  ctx.fillStyle = 'rgba(52,152,219,0.9)';
  ctx.beginPath(); ctx.arc(pad.l + 10, pad.t - 6, 3, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.font = '10px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('买入点', pad.l + 18, pad.t - 2);
}

function rebuildFundHistory() {
  const fundTrades = (TRANSACTIONS.funds || []).slice().sort((a,b) => a.date.localeCompare(b.date));
  const fundCodes = Object.keys(FUND_NAV_HISTORY);
  DAYS.forEach(day => {
    if (day.funds) return;
    const sharesMap = {};
    const costMap = {};
    fundCodes.forEach(code => {
      sharesMap[code] = 0;
      costMap[code] = 0;
    });
    fundTrades.forEach(t => {
      if (t.date <= day.date && sharesMap.hasOwnProperty(t.code)) {
        sharesMap[t.code] += Number(t.qty || 0);
        costMap[t.code] += Number(t.price || 0) * Number(t.qty || 0);
      }
    });
    const dayFunds = [];
    let hasData = false;
    fundCodes.forEach(code => {
      const nav = FUND_NAV_HISTORY[code] ? FUND_NAV_HISTORY[code][day.date] : null;
      const shares = Number(sharesMap[code] || 0);
      const base = FUND_BASE_INFO[code] || {};
      if (nav && shares > 0) {
        hasData = true;
        const navHistory = FUND_NAV_HISTORY[code] || {};
        const prevDates = Object.keys(navHistory).filter(d => d < day.date).sort();
        const prevDate = prevDates.length ? prevDates[prevDates.length - 1] : null;
        const prevNav = prevDate ? navHistory[prevDate] : nav;
        const amount = Number((nav * shares).toFixed(2));
        const totalCost = Number(costMap[code] || 0);
        const avgCost = totalCost > 0 && shares > 0 ? totalCost / shares : nav;
        const holdingIncome = Number(((nav - avgCost) * shares).toFixed(2));
        const holdingYield = Number(((nav / avgCost - 1) * 100).toFixed(2));
        const dailyIncome = Number(((nav - prevNav) * shares).toFixed(2));
        const navDate = day.date.slice(5);
        dayFunds.push({
          code: code, name: base.name || code, latestNav: nav, navDate: navDate,
          dailyIncome: dailyIncome, holdingIncome: holdingIncome,
          holdingYield: holdingYield, amount: amount, shares: shares,
          unitCost: Number(avgCost.toFixed(4)), available: shares, account: base.account || '—'
        });
      }
    });
    if (hasData) {
      day.funds = dayFunds;
    }
  });
}
