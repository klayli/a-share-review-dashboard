<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A股短线复盘看板</title>
<meta name="theme-color" content="#0f1117">
<link rel="manifest" href="/manifest.json">
<style>
  :root {
    --bg: #0f1117; --card: #1a1d27; --card-hover: #22263a; --border: #2a2e3e;
    --text: #e4e6eb; --text-dim: #8b8fa3;
    --green: #ff1744; --green-bg: rgba(255,23,68,0.1);
    --red: #00c853; --red-bg: rgba(0,200,83,0.1);
    --yellow: #ffd600; --yellow-bg: rgba(255,214,0,0.08);
    --blue: #448aff; --blue-bg: rgba(68,138,255,0.1);
  }
  body.light {
    --bg: #f5f7fb; --card: #ffffff; --card-hover: #f0f3fa; --border: #dbe1ef;
    --text: #1e2433; --text-dim: #657089;
    --green-bg: rgba(255,23,68,0.08); --red-bg: rgba(0,150,72,0.08);
    --yellow: #b77900; --yellow-bg: rgba(255,184,0,0.14);
    --blue: #2563eb; --blue-bg: rgba(37,99,235,0.08);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background:var(--bg); color:var(--text); line-height:1.6; padding:20px; max-width:1400px; margin:0 auto; }
  h1 { font-size:1.6rem; }
  h2 { font-size:1.15rem; color:var(--yellow); margin-bottom:14px; padding-bottom:8px; border-bottom:1px solid var(--border); }
  h3 { font-size:0.95rem; color:var(--text-dim); margin-bottom:8px; }
  .pos { color:var(--green); } .neg { color:var(--red); } .warn { color:var(--yellow); }
  .tag { display:inline-block; padding:2px 8px; border-radius:6px; font-size:0.78rem; font-weight:600; }
  .tag-green { background:var(--green-bg); color:var(--green); }
  .tag-red { background:var(--red-bg); color:var(--red); }
  .tag-yellow { background:var(--yellow-bg); color:var(--yellow); }
  .tag-blue { background:var(--blue-bg); color:var(--blue); }
  .hl-yellow { background:var(--yellow-bg); padding:2px 8px; border-radius:4px; }
  .hl-green { background:var(--green-bg); padding:2px 8px; border-radius:4px; }
  .hl-red { background:var(--red-bg); padding:2px 8px; border-radius:4px; }
  .badge { display:inline-block; padding:1px 6px; border-radius:4px; font-size:0.75rem; font-weight:600; }
  .badge-hot { background:rgba(255,23,68,0.1); color:#ff1744; }
  .badge-strong { background:rgba(0,200,83,0.1); color:#00c853; }

  /* Header + Date picker */
  .header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:20px; flex-wrap:wrap; gap:12px; }
  .date-picker { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .date-picker button {
    background:var(--card); color:var(--text); border:1px solid var(--border);
    padding:6px 14px; border-radius:8px; cursor:pointer; font-size:0.85rem; transition:all 0.2s;
  }
  .date-picker button:hover { background:var(--card-hover); border-color:var(--yellow); }
  .date-picker button.active { background:var(--yellow-bg); border-color:var(--yellow); color:var(--yellow); }
  .date-picker select {
    background:var(--card); color:var(--text); border:1px solid var(--border);
    padding:6px 12px; border-radius:8px; font-size:0.85rem; cursor:pointer;
  }
  .toolbar { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .theme-toggle {
    background:var(--card); color:var(--text); border:1px solid var(--border);
    padding:6px 12px; border-radius:8px; cursor:pointer; font-size:0.85rem;
  }
  .theme-toggle:hover { border-color:var(--yellow); color:var(--yellow); }

  .section { margin-bottom:28px; }

  /* Summary boxes */
  .summary-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:12px; margin-bottom:16px; }
  .summary-box { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:14px 18px; text-align:center; }
  .summary-box .label { color:var(--text-dim); font-size:0.82rem; margin-bottom:4px; }
  .summary-box .value { font-size:1.5rem; font-weight:700; }
  .summary-box.hl-g { border-color:var(--green); box-shadow:0 0 16px var(--green-bg); }
  .summary-box.hl-r { border-color:var(--red); box-shadow:0 0 16px var(--red-bg); }

  /* Cards */
  .cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(320px,1fr)); gap:14px; }
  .card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:16px 18px; transition:background 0.2s; }
  .card:hover { background:var(--card-hover); }
  .card-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
  .card-head .name { font-weight:600; font-size:1.02rem; }
  .card-head .code { color:var(--text-dim); font-size:0.82rem; }
  .card-price { font-size:1.7rem; font-weight:700; margin-bottom:2px; }
  .card-chg { font-size:0.92rem; font-weight:600; margin-bottom:12px; }
  .card-grid { display:grid; grid-template-columns:1fr 1fr; gap:5px 14px; font-size:0.83rem; }
  .card-grid .l { color:var(--text-dim); }
  .card-grid .v { text-align:right; font-weight:500; }
  .holding-matrix { display:none; }

  /* Index cards */
  .idx-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:16px; }
  .idx-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:14px 16px; text-align:center; }
  .idx-card .name { color:var(--text-dim); font-size:0.82rem; margin-bottom:4px; }
  .idx-card .pt { font-size:1.4rem; font-weight:700; margin-bottom:2px; }
  .idx-card .chg { font-size:1rem; font-weight:600; }

  /* Info row */
  .info-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:10px; margin-bottom:14px; }
  .info-item { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:12px 16px; font-size:0.88rem; }
  .info-item .label { color:var(--text-dim); font-size:0.78rem; margin-bottom:3px; }
  .market-compact { grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); }
  .market-compact .info-item { padding:10px 12px; }
  .market-compact .info-item .value { font-weight:800; line-height:1.35; }

  /* Sector card */
  .sector { background:var(--card); border:1px solid var(--yellow); border-radius:12px; padding:18px 22px; margin-bottom:14px; }
  .sector .sname { font-size:1.1rem; font-weight:700; color:var(--yellow); margin-bottom:8px; }
  .sector ul { padding-left:16px; margin-bottom:8px; }
  .sector li { margin-bottom:3px; font-size:0.88rem; }
  .sector .leader { background:var(--yellow-bg); padding:8px 12px; border-radius:8px; font-size:0.88rem; margin-top:6px; }

  /* Table */
  .tbl-wrap { overflow-x:auto; margin-bottom:14px; }
  table { width:100%; border-collapse:collapse; font-size:0.88rem; }
  th { background:var(--card); color:var(--text-dim); font-weight:600; text-align:left; padding:8px 12px; border-bottom:1px solid var(--border); }
  td { padding:8px 12px; border-bottom:1px solid var(--border); }
  tr:hover td { background:var(--card-hover); }

  /* Strategy box */
  .strat { background:var(--card); border:2px solid var(--yellow); border-radius:12px; padding:18px 22px; font-size:0.95rem; line-height:1.8; box-shadow:0 0 24px var(--yellow-bg); }

  /* Rules */
  .rules { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .rules-box { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:14px 18px; }
  .rules-box h3 { color:var(--blue); margin-bottom:6px; }
  .rules-box ol { padding-left:16px; }
  .rules-box li { margin-bottom:3px; font-size:0.85rem; color:var(--text-dim); }

  /* Themes grid */
  .themes { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:10px; }
  .theme { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:12px 16px; }
  .theme .rank { display:inline-block; width:22px; height:22px; background:var(--yellow-bg); color:var(--yellow); text-align:center; line-height:22px; border-radius:5px; font-size:0.78rem; font-weight:700; margin-right:6px; }
  .theme .tn { font-weight:600; margin-bottom:4px; }
  .theme .td { font-size:0.82rem; color:var(--text-dim); }
  .theme .ts { font-size:0.82rem; color:var(--blue); margin-top:4px; }
  .theme.dim { border-color:var(--red); opacity:0.7; }
  .theme.dim .rank { background:var(--red-bg); color:var(--red); }

  /* Stock links & prices */
  .stock-link { display:inline-flex; align-items:center; gap:6px; cursor:pointer; color:var(--blue); text-decoration:none; background:var(--blue-bg); border:1px solid var(--blue); border-radius:6px; padding:2px 8px; transition:all 0.2s; font-weight:600; }
  .stock-link:hover { border-color:var(--yellow); color:var(--yellow); background:var(--card-hover); }
  .stock-link::before { content:'📈'; font-size:0.75rem; }
  .fund-link { display:inline-flex; align-items:center; gap:6px; cursor:pointer; color:var(--yellow); text-decoration:none; background:var(--yellow-bg); border:1px solid var(--yellow); border-radius:6px; padding:2px 8px; transition:all 0.2s; font-weight:600; }
  .fund-link:hover { border-color:var(--blue); color:var(--blue); background:var(--card-hover); }
  .fund-link::before { content:'💰'; font-size:0.75rem; }
  .card.clickable { cursor:pointer; transition:transform .15s, box-shadow .15s, border-color .15s; }
  .card.clickable:hover { border-color:var(--blue); box-shadow:0 4px 16px rgba(52,152,219,.2); transform:translateY(-1px); }
  .card.clickable:active { transform:translateY(0); }
  .fund-quote-bar { display:flex; align-items:baseline; gap:14px; flex-wrap:wrap; padding:10px 14px; background:linear-gradient(135deg,rgba(255,214,0,.08),rgba(52,152,219,.06)); border:1px solid var(--border); border-radius:10px; margin-bottom:10px; }
  .fqb-nav { font-size:1.6rem; font-weight:700; color:var(--yellow); }
  .fqb-date { color:var(--text-dim); font-size:.82rem; }
  .fqb-daily { font-size:1rem; font-weight:600; }
  .fund-summary, .fund-strategy, .fund-trades { margin-top:14px; }
  .fund-summary h4, .fund-strategy h4, .fund-trades h4 { margin:0 0 8px; font-size:.92rem; color:var(--text); border-left:3px solid var(--yellow); padding-left:8px; }
  .fund-strategy p { margin:0; color:var(--text-dim); font-size:.85rem; line-height:1.6; background:rgba(255,255,255,.03); padding:10px 12px; border-radius:8px; border:1px solid var(--border); }
  .fs-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr)); gap:8px; }
  .fs-box { background:rgba(255,255,255,.03); border:1px solid var(--border); border-radius:8px; padding:8px 10px; }
  .fs-box .l { color:var(--text-dim); font-size:.72rem; margin-bottom:2px; }
  .fs-box .v { font-weight:600; font-size:.9rem; }
  .trade-buy-text { color:var(--green); }
  .trade-sell-text { color:var(--red); }
  .trade-other-text { color:var(--yellow); }
  .fund-chart-wrap { margin:6px 0 4px; }
  .fcw-title { font-size:.78rem; color:var(--text-dim); text-align:center; padding:4px 0; }
  #fundChartCanvas { background:#0a0c10; border-radius:10px; }
  .trade-buy { background:var(--green-bg); color:var(--green); border:1px solid rgba(255,23,68,.22); }
  .trade-sell { background:var(--red-bg); color:var(--red); border:1px solid rgba(0,200,83,.22); }
  .trade-other { background:var(--yellow-bg); color:var(--yellow); border:1px solid rgba(255,214,0,.22); }
  .trade-marker { display:flex; flex-wrap:wrap; gap:6px; justify-content:flex-end; }
  .detail-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:10px; margin:10px 0 12px; }
  .detail-box { background:rgba(255,255,255,.03); border:1px solid var(--border); border-radius:10px; padding:10px 12px; }
  .detail-box .l { color:var(--text-dim); font-size:.76rem; margin-bottom:3px; }
  .detail-box .v { font-size:1rem; font-weight:800; }
  .stock-price { font-size:0.82rem; color:var(--yellow); font-weight:600; }
  .stock-code { color:var(--text-dim); font-size:0.8rem; }

  /* Trend modal */
  #trendModal { display:none; position:fixed; inset:0; z-index:1000; background:rgba(0,0,0,0.75); align-items:center; justify-content:center; padding:20px; }
  #trendModal.active { display:flex; }
  #trendModal .modal-box { background:var(--card); border:1px solid var(--border); border-radius:14px; width:100%; max-width:720px; max-height:90vh; overflow:auto; padding:20px; position:relative; }
  #trendModal .modal-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
  #trendModal .modal-title { font-size:1.2rem; font-weight:700; }
  #trendModal .modal-close { background:var(--card-hover); color:var(--text); border:1px solid var(--border); border-radius:8px; padding:6px 14px; cursor:pointer; }
  #trendModal .modal-close:hover { border-color:var(--yellow); color:var(--yellow); }
  #trendModal .modal-chart { width:100%; border-radius:10px; background:#0a0c10; }
  #trendModal .modal-foot { margin-top:12px; text-align:center; }
  #trendModal .modal-foot a { color:var(--blue); text-decoration:none; font-size:0.85rem; }
  #trendModal .modal-foot a:hover { text-decoration:underline; }
  .range-tabs { display:flex; gap:8px; flex-wrap:wrap; margin:0 0 12px; }
  .range-tabs button {
    background:var(--card-hover); color:var(--text); border:1px solid var(--border);
    border-radius:8px; padding:6px 12px; cursor:pointer; font-size:0.82rem;
  }
  .range-tabs button.active { border-color:var(--yellow); color:var(--yellow); background:var(--yellow-bg); }

  .version-button {
    width:30px; height:30px; border-radius:50%; border:1px solid var(--yellow);
    background:var(--yellow-bg); color:var(--yellow); font-weight:900; cursor:pointer;
    display:inline-flex; align-items:center; justify-content:center;
    position:fixed; top:14px; right:14px; z-index:900;
  }
  #versionModal { display:none; position:fixed; inset:0; z-index:1001; background:rgba(0,0,0,0.75); align-items:center; justify-content:center; padding:20px; }
  #versionModal.active { display:flex; }
  #versionModal .modal-box { background:var(--card); border:1px solid var(--border); border-radius:14px; width:100%; max-width:680px; max-height:88vh; overflow:auto; padding:20px; }
  #versionModal .modal-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
  #versionModal .modal-title { font-size:1.2rem; font-weight:800; color:var(--yellow); }
  #versionModal .modal-close { background:var(--card-hover); color:var(--text); border:1px solid var(--border); border-radius:8px; padding:6px 14px; cursor:pointer; }
  #versionModal .modal-close:hover { border-color:var(--yellow); color:var(--yellow); }
  .version-list { display:flex; flex-direction:column; gap:10px; }
  .version-item { border:1px solid var(--border); border-radius:10px; padding:12px 14px; background:rgba(255,255,255,0.02); }
  .version-item.current { border-color:var(--yellow); background:var(--yellow-bg); }
  .version-row { display:flex; justify-content:space-between; gap:12px; align-items:center; margin-bottom:6px; }
  .version-name { font-weight:800; color:var(--text); }
  .version-date { color:var(--text-dim); font-size:.78rem; white-space:nowrap; }
  .version-notes { color:var(--text-dim); font-size:.84rem; line-height:1.65; padding-left:20px; margin:8px 0 0; }
  .version-notes li { margin-bottom:10px; }
  .version-notes li:last-child { margin-bottom:0; }
  .live-status { margin-left:8px; color:var(--text-dim); font-size:.76rem; font-weight:500; }
  .api-badge { margin-left:8px; font-size:.72rem; color:var(--blue); background:var(--blue-bg); border:1px solid var(--blue); border-radius:999px; padding:2px 8px; white-space:nowrap; }
  .calendar-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:8px; }
  .calendar-cell { min-height:78px; border:1px solid var(--border); border-radius:10px; background:var(--card); padding:8px; }
  .calendar-cell .cd { color:var(--text-dim); font-size:.74rem; margin-bottom:8px; }
  .calendar-cell .cv { font-weight:900; font-size:.95rem; }
  .calendar-cell.pos-day { border-color:rgba(255,23,68,.35); background:rgba(255,23,68,.07); }
  .calendar-cell.neg-day { border-color:rgba(0,200,83,.35); background:rgba(0,200,83,.07); }
  .module-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:12px; }
  .fund-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:14px 16px; }
  .fund-card .fund-title { display:flex; justify-content:space-between; gap:10px; align-items:flex-start; margin-bottom:10px; }
  .fund-card .fund-name { font-weight:800; }
  .fund-card .fund-code { color:var(--text-dim); font-size:.76rem; }
  .fund-metrics { display:grid; grid-template-columns:1fr 1fr; gap:6px 12px; font-size:.82rem; }
  .fund-metrics .l { color:var(--text-dim); }
  .fund-metrics .v { text-align:right; font-weight:700; }
  .empty-state { background:var(--card); border:1px dashed var(--border); border-radius:12px; padding:18px; color:var(--text-dim); line-height:1.7; }
  .collapse-box { background:var(--card); border:1px solid var(--border); border-radius:12px; margin-bottom:10px; overflow:hidden; }
  .collapse-head { width:100%; background:transparent; color:var(--text); border:0; padding:14px 16px; display:flex; justify-content:space-between; align-items:center; cursor:pointer; font-size:.92rem; font-weight:800; text-align:left; }
  .collapse-head:hover { background:var(--card-hover); }
  .collapse-meta { color:var(--text-dim); font-size:.78rem; font-weight:500; margin-left:8px; }
  .collapse-icon { color:var(--yellow); font-weight:900; transition:transform .2s; }
  .collapse-box.open .collapse-icon { transform:rotate(180deg); }
  .collapse-body { display:none; padding:0 14px 14px; }
  .collapse-box.open .collapse-body { display:block; }
  .trade-table { width:100%; border-collapse:collapse; table-layout:fixed; font-size:.78rem; }
  .trade-table th, .trade-table td { border-bottom:1px solid var(--border); padding:8px 6px; vertical-align:top; }
  .trade-table th { color:var(--text-dim); font-weight:700; background:rgba(255,255,255,.03); }
  .trade-table td { color:var(--text); word-break:break-word; }
  .trade-time-mini { color:var(--text-dim); font-size:.72rem; line-height:1.35; }
  .trade-note-mini { color:var(--text-dim); font-size:.72rem; line-height:1.45; margin-top:3px; }
  .fund-detail-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:14px; }
  .fund-detail-head { display:flex; justify-content:space-between; align-items:flex-start; gap:10px; margin-bottom:12px; }
  .fund-detail-name { font-weight:900; font-size:1rem; }
  .fund-detail-code { color:var(--text-dim); font-size:.76rem; margin-top:3px; }
  .fund-detail-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px 18px; padding:10px 0; border-top:1px solid var(--border); border-bottom:1px solid var(--border); }
  .fund-detail-grid .l { color:var(--text-dim); font-size:.78rem; margin-bottom:3px; }
  .fund-detail-grid .v { font-weight:800; }
  .fund-income-row { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; padding-top:12px; }
  .fund-income-row .l { color:var(--text-dim); font-size:.78rem; margin-bottom:4px; }
  .fund-income-row .v { font-weight:900; font-size:1rem; }
  .tab-bar { display:flex; gap:0; margin-bottom:14px; border-bottom:2px solid var(--border); }
  .tab-btn { flex:1; padding:10px 16px; background:transparent; border:none; color:var(--text-dim); font-size:.92rem; font-weight:700; cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-2px; transition:all .2s; }
  .tab-btn:hover { color:var(--text); }
  .tab-btn.active { color:var(--yellow); border-bottom-color:var(--yellow); }
  .tab-content { display:none; }
  .tab-content.active { display:block; }

  /* Weekly P&L chart */
  .week-chart { display:grid; grid-template-columns:repeat(5,1fr); gap:8px; margin-bottom:16px; }
  .wc-bar { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:10px; text-align:center; cursor:pointer; transition:all 0.2s; }
  .wc-bar:hover { border-color:var(--yellow); }
  .wc-bar.active { border-color:var(--yellow); box-shadow:0 0 12px var(--yellow-bg); }
  .wc-bar .d { font-size:0.75rem; color:var(--text-dim); margin-bottom:4px; }
  .wc-bar .v { font-size:1.05rem; font-weight:700; }
  .wc-bar .p { font-size:0.78rem; margin-top:2px; }

  .disclaimer { margin-top:28px; padding:14px; background:var(--card); border-radius:10px; font-size:0.78rem; color:var(--text-dim); text-align:center; }
  .version-info { margin-top:8px; color:var(--text-dim); font-size:0.74rem; }

  /* Charts */
  .chart-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:20px; }
  .chart-box { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:16px 18px; }
  .chart-box h3 { color:var(--text); font-size:0.92rem; margin-bottom:10px; }
  .chart-box canvas { width:100%!important; }
  .chart-full { grid-column: 1 / -1; }
  .treemap {
    position:relative; display:flex; flex-wrap:wrap; gap:6px; min-height:360px;

function stockPrefix(code) {
  if (STOCK_INFO[code]) return STOCK_INFO[code].prefix;
  if (/^(60|68|8)/.test(code)) return 'sh';
  if (/^(00|30|15|12|16)/.test(code)) return 'sz';
  return 'sh';
}

function linkStocks(text) {
  if (!text) return text;
  let html = text;
  const entries = Object.keys(STOCK_INFO).map(code => ({code, ...STOCK_INFO[code]}))
    .sort((a,b) => b.name.length - a.name.length);
  // Replace name (optionally with adjacent code in parentheses) by placeholder
  entries.forEach(e => {
    const escName = e.name.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const re = new RegExp(`${escName}(?:[（(]${e.code}[^）)]*[）)])?`, 'g');
    html = html.replace(re, `@@STOCK_${e.code}@@`);
  });
  // Replace any remaining 6-digit codes
  html = html.replace(/\b(\d{6})\b/g, (m, code) => STOCK_INFO[code] ? `@@STOCK_${code}@@` : m);
  // Resolve placeholders to clickable tags (include latest price inline)
  entries.forEach(e => {
    html = html.replace(new RegExp(`@@STOCK_${e.code}@@`, 'g'), stockTag(e.code));
  });
  return html;
}

function stockTag(code, opts={}) {
  const info = STOCK_INFO[code];
  if (!info) return code;
  const showName = opts.name !== false;
  const showCode = opts.code !== false;
  const showPrice = opts.price !== false;
  const label = (showName ? info.name : '') + (showCode ? (showName ? '(' : '') + code + (showName ? ')' : '') : '');
  return `<a class="stock-link" onclick="showTrend('${code}');event.stopPropagation();">${label}${showPrice && info.price !== '—' ? ' <span class="stock-price">¥' + info.price + '</span>' : ''}</a>`;
}
function fundTag(code, opts={}) {
  const f = FUND_PORTFOLIO.find(item => item.code === code);
  if (!f) return code;
  const showName = opts.name !== false;
  const showCode = opts.code !== false;
  const label = (showName ? f.name : '') + (showCode ? (showName ? '(' : '') + code + (showName ? ')' : '') : '');
  return `<a class="fund-link" onclick="showFundDetail('${code}');event.stopPropagation();">${label}</a>`;
}
function tradeTagClass(side='') {
  if (side.includes('买') || side.includes('定投')) return 'trade-buy';
  if (side.includes('卖') || side.includes('赎回')) return 'trade-sell';
  return 'trade-other';
}
function tradeStats(code, group='stocks') {
  const rows = (TRANSACTIONS[group] || []).filter(t => t.code === code);
  const buy = rows.filter(t => t.side.includes('买') || t.side.includes('定投'));
  const sell = rows.filter(t => t.side.includes('卖') || t.side.includes('赎回'));
  const other = rows.length - buy.length - sell.length;
  const buyAmount = buy.reduce((s,t) => s + Number(t.amount || 0), 0);
  const sellAmount = sell.reduce((s,t) => s + Number(t.amount || 0), 0);
  const latest = rows[0];
  return { rows, buy, sell, other, buyAmount, sellAmount, latest };
}
function tradeMarkers(code, group='stocks') {
  const st = tradeStats(code, group);
  if (!st.rows.length) return '<span class="tag tag-blue">暂无交易</span>';
  return `<span class="tag trade-buy">买入 ${st.buy.length}</span><span class="tag trade-sell">卖出 ${st.sell.length}</span>${st.other ? `<span class="tag trade-other">其他 ${st.other}</span>` : ''}<span class="tag tag-blue">最近 ${st.latest.date.slice(5)} ${st.latest.side}</span>`;
}

}

function drawFundNavChart(canvas, code) {
  const f = FUND_PORTFOLIO.find(item => item.code === code);
  if (!f || !canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  const W = rect.width, H = rect.height || 200;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, W, H);

  // 收集该基金的交易记录（按日期排序）加上当前净值
  const trades = (TRANSACTIONS.funds || []).filter(t => t.code === code && t.price > 0).slice().sort((a,b) => a.date.localeCompare(b.date));
  if (!trades.length) {
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.font = '14px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('暂无净值走势数据', W/2, H/2);
    return;
  }

  // 构建数据点：交易日期->净值，加上今天的最新净值
  const points = trades.map(t => ({ date: t.date, nav: Number(t.price), label: t.side }));
  points.push({ date: new Date().toISOString().slice(0,10), nav: Number(f.latestNav), label: '最新' });

  const navs = points.map(p => p.nav);
  const minNav = Math.min(...navs) * 0.98;
  const maxNav = Math.max(...navs) * 1.02;
  const pad = { l: 50, r: 20, t: 20, b: 30 };
  const cw = W - pad.l - pad.r;
  const ch = H - pad.t - pad.b;

  // 背景网格
  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = pad.t + ch * i / 4;
    ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(W - pad.r, y); ctx.stroke();
    const val = maxNav - (maxNav - minNav) * i / 4;
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.font = '11px sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText(val.toFixed(4), pad.l - 6, y + 4);
  }

  // 成本线
  const costY = pad.t + ch * (1 - (Number(f.unitCost) - minNav) / (maxNav - minNav));
  ctx.strokeStyle = 'rgba(255,214,0,0.5)';
  ctx.setLineDash([5, 4]);
  ctx.beginPath(); ctx.moveTo(pad.l, costY); ctx.lineTo(W - pad.r, costY); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = 'rgba(255,214,0,0.8)';
  ctx.font = '11px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText(`成本 ${Number(f.unitCost).toFixed(4)}`, pad.l + 4, costY - 4);

  // 绘制折线
  ctx.strokeStyle = Number(f.holdingIncome) >= 0 ? '#e74c3c' : '#2ecc71';
  ctx.lineWidth = 2;
  ctx.beginPath();
  points.forEach((p, i) => {
    const x = pad.l + cw * i / (points.length - 1);
    const y = pad.t + ch * (1 - (p.nav - minNav) / (maxNav - minNav));
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  });
  ctx.stroke();

  // 填充区域
  ctx.lineTo(pad.l + cw, pad.t + ch);
  ctx.lineTo(pad.l, pad.t + ch);
  ctx.closePath();
  const grad = ctx.createLinearGradient(0, pad.t, 0, pad.t + ch);
  grad.addColorStop(0, Number(f.holdingIncome) >= 0 ? 'rgba(231,76,60,0.25)' : 'rgba(46,204,113,0.25)');
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grad;
  ctx.fill();

  // 数据点
  points.forEach((p, i) => {
    const x = pad.l + cw * i / (points.length - 1);
    const y = pad.t + ch * (1 - (p.nav - minNav) / (maxNav - minNav));
    const isLatest = i === points.length - 1;
    const isBuy = p.label.includes('买') || p.label.includes('定投');
    ctx.fillStyle = isLatest ? (Number(f.holdingIncome) >= 0 ? '#e74c3c' : '#2ecc71') : (isBuy ? '#3498db' : '#9b59b6');
    ctx.beginPath(); ctx.arc(x, y, isLatest ? 5 : 3.5, 0, Math.PI * 2); ctx.fill();
    if (isLatest) {
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
      ctx.fillStyle = '#fff'; ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'left';
      ctx.fillText(p.nav.toFixed(4), x + 8, y + 4);
    }
  });

  // X轴日期标签（首/中/末）
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.font = '10px sans-serif';
  ctx.textAlign = 'center';
  [0, Math.floor(points.length/2), points.length-1].forEach(i => {
    const x = pad.l + cw * i / (points.length - 1);
    ctx.fillText(points[i].date.slice(5), x, H - 10);
  });

  // 图例
  ctx.fillStyle = 'rgba(52,152,219,0.9)';
  ctx.beginPath(); ctx.arc(pad.l + 10, pad.t - 6, 3, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.font = '10px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('买入点', pad.l + 18, pad.t - 2);
}

function openVersionLog() {
  const list = document.getElementById('versionList');
  const formatDate = date => date.includes('北京时间') ? date : `${date}（北京时间）`;
  const formatNotes = notes => notes
    .split('；')
    .map(note => note.trim().replace(/。$/, ''))
    .filter(Boolean)
    .map(note => `<li>${note}</li>`)
    .join('');
  list.innerHTML = VERSION_HISTORY.map(item => `
    <div class="version-item ${item.version === APP_VERSION ? 'current' : ''}">
      <div class="version-row">
        <span class="version-name">${item.version}${item.version === APP_VERSION ? '（当前）' : ''}</span>
        <span class="version-date">${formatDate(item.date)}</span>
      </div>
      <ol class="version-notes">${formatNotes(item.notes)}</ol>
    </div>
  `).join('');
  document.getElementById('versionModal').classList.add('active');
}

  document.getElementById('versionModal').classList.remove('active');
}

}

function calcPnL(d) {
  const codes = Object.keys(HOLDINGS.shares);
  const mv = codes.reduce((s, c) => s + HOLDINGS.shares[c] * d.price[c], 0);
  const prevMv = d.prev ? codes.reduce((s, c) => s + HOLDINGS.shares[c] * d.prev[c], 0) : null;
  const totalPnl = mv - HOLDINGS.cost.total;
  const totalPnlPct = (totalPnl / HOLDINGS.cost.total * 100);
  const dailyPnl = prevMv != null ? mv - prevMv : null;
  const dailyPnlPct = prevMv != null ? (dailyPnl / prevMv * 100) : null;
  const stocks = codes.map(c => {
    const cost = HOLDINGS.cost[c];
    const price = d.price[c];
    const shares = HOLDINGS.shares[c];
    const stockMv = shares * price;
    const stockCost = shares * cost;
    const pnl = stockMv - stockCost;
    const pnlPct = (pnl / stockCost * 100);
    const beNeed = ((cost - price) / price * 100);
    const daily = d.prev ? shares * (price - d.prev[c]) : null;
    const dailyPct = d.prev ? ((price - d.prev[c]) / d.prev[c] * 100) : null;
    const ma5 = d.ma5 ? d.ma5[c] : null;
    const ma20 = d.ma20 ? d.ma20[c] : null;
    const ma5Dist = ma5 ? ((price - ma5) / ma5 * 100) : null;
    const ma20Dist = ma20 ? ((price - ma20) / ma20 * 100) : null;
    return { code: c, name: HOLDINGS.names[c], shares, cost, price, stockMv, pnl, pnlPct, beNeed, beDays: d.beDays ? d.beDays[c] : null, daily, dailyPct, ma5, ma20, ma5Dist, ma20Dist, addAdvice: d.addAdvice ? d.addAdvice[c] : null };
  });
  return { mv, totalPnl, totalPnlPct, dailyPnl, dailyPnlPct, stocks };
}

function navDate(dir) {
  const idx = DAYS.findIndex(d => d.date === currentDate);
  const newIdx = idx + dir;
  if (newIdx >= 0 && newIdx < DAYS.length) selectDate(DAYS[newIdx].date);
}

function liveStatusLabel() {
  const latest = latestDay();
  if (currentDate !== latest.date) return '';
  if (isTradingRefreshWindow()) {
    return ` <span class="live-status">实时刷新中${lastLiveUpdateText ? '｜' + lastLiveUpdateText : ''}</span>`;
  }
  return ` <span class="live-status">非交易刷新时段，数据固定${lastLiveUpdateText ? '｜最后更新 ' + lastLiveUpdateText : ''}</span>`;
}

function loadSinaQuotes(codes) {
  return new Promise((resolve, reject) => {
    const callbackId = 'quoteScript_' + Date.now();
    const symbols = codes.map(code => `${stockPrefix(code)}${code}`);
    const script = document.createElement('script');
    script.id = callbackId;
    script.src = `https://hq.sinajs.cn/list=${symbols.join(',')}&_=${Date.now()}`;
    script.charset = 'gbk';
    script.onload = () => {
      const quotes = {};
      codes.forEach((code, idx) => {
        const raw = window[`hq_str_${symbols[idx]}`];
        if (!raw) return;
        const parts = raw.split(',');
        const price = parseFloat(parts[3]);
        const prevClose = parseFloat(parts[2]);
        if (Number.isFinite(price) && Number.isFinite(prevClose) && price > 0) {
          quotes[code] = { price, prevClose };
        }
      });
      script.remove();
      resolve(quotes);
    };
    script.onerror = () => {
      script.remove();
      reject(new Error('实时行情获取失败'));
    };
    document.body.appendChild(script);
  });
}

async function refreshLivePnL() {
  const latest = latestDay();
  if (!isTradingRefreshWindow() || todayText() !== latest.date) return;
  try {
    const codes = Object.keys(HOLDINGS.shares);
    const quotes = await loadSinaQuotes(codes);
    codes.forEach(code => {
      const q = quotes[code];
      if (!q) return;
      latest.price[code] = q.price;
      latest.prev = latest.prev || {};
      latest.prev[code] = q.prevClose;
      if (STOCK_INFO[code]) STOCK_INFO[code].price = q.price.toFixed(3);
    });
    lastLiveUpdateText = timeText();
    if (currentDate === latest.date) {
      render();
      renderCharts();
    } else {
      renderWeekChart();
    }
  } catch (err) {
    lastLiveUpdateText = `刷新失败 ${timeText()}`;
  }
}

let calViewMonth = null;
function calMonth(dir) {
  if (!calViewMonth) {
    const parts = currentDate.split('-');
    calViewMonth = parseInt(parts[0]) * 100 + parseInt(parts[1]);
  }
  const y = Math.floor(calViewMonth / 100);
  const m = calViewMonth % 100 + dir;
  if (m < 1) calViewMonth = (y - 1) * 100 + 12;
  else if (m > 12) calViewMonth = (y + 1) * 100 + 1;
  else calViewMonth = y * 100 + m;
  renderCalendar();
}
function renderCalendar() {
  const el = document.getElementById('chartDaily');
  if (!el) return;
  if (!calViewMonth) {
    const parts = currentDate.split('-');
    calViewMonth = parseInt(parts[0]) * 100 + parseInt(parts[1]);
  }
  const y = Math.floor(calViewMonth / 100);
  const m = calViewMonth % 100;
  const label = document.getElementById('calMonthLabel');
  if (label) label.textContent = `${y}年${m}月`;
  const prefix = `${y}-${String(m).padStart(2,'0')}`;
  const daysInMonth = new Date(y, m, 0).getDate();
  const firstDay = new Date(y, m - 1, 1).getDay();
  const weekDays = ['一','二','三','四','五','六','日'];
  let h = '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;text-align:center;font-size:.72rem">';
  weekDays.forEach(wd => { h += `<div style="color:var(--text-dim);padding:4px 0;font-weight:700">${wd}</div>`; });
  // offset: Mon=0, Sun=6
  let offset = firstDay === 0 ? 6 : firstDay - 1;
  for (let i = 0; i < offset; i++) h += '<div></div>';
  for (let day = 1; day <= daysInMonth; day++) {
    const ds = `${prefix}-${String(day).padStart(2,'0')}`;
    const dayData = DAYS.find(d => d.date === ds);
    const isToday = ds === todayText();
    let cellStyle = 'padding:6px 2px;border-radius:6px;cursor:pointer;';
    let inner = `<div style="font-weight:700">${day}</div>`;
    if (dayData) {
      const pnl = calcPnL(dayData);
      const v = pnl.dailyPnl;
      if (v != null) {
        if (v >= 0) cellStyle += 'background:rgba(255,23,68,0.12);border:1px solid rgba(255,23,68,0.3);';
        else cellStyle += 'background:rgba(0,200,83,0.12);border:1px solid rgba(0,200,83,0.3);';
        inner += `<div style="font-size:.68rem;color:${v >= 0 ? '#ff5a5f' : '#00c853'}">${sign(v)}${fmt(v)}</div>`;
      } else {
        cellStyle += 'background:var(--card);border:1px solid var(--border);';
        inner += '<div style="font-size:.68rem;color:var(--text-dim)">—</div>';
      }
    } else {
      cellStyle += 'color:var(--text-dim);';
    }
    if (isToday) cellStyle += 'box-shadow:0 0 0 2px var(--yellow);';
    h += `<div style="${cellStyle}" onclick="selectDate('${ds}')">${inner}</div>`;
  }
  h += '</div>';
  // Monthly summary
  const monthDays = DAYS.filter(d => d.date.startsWith(prefix));
  if (monthDays.length) {
    const monthPnl = monthDays.reduce((s, d) => s + (calcPnL(d).dailyPnl || 0), 0);
    const winDays = monthDays.filter(d => (calcPnL(d).dailyPnl || 0) > 0).length;
    h += `<div style="display:flex;justify-content:space-between;margin-top:10px;padding:8px 12px;background:var(--card);border-radius:8px;font-size:.78rem;color:var(--text-dim)">
      <span>当月收益：<b style="color:${monthPnl >= 0 ? '#ff5a5f' : '#00c853'}">${sign(monthPnl)}${fmt(monthPnl)}</b></span>
      <span>胜率：<b>${monthDays.length ? (winDays / monthDays.length * 100).toFixed(1) : 0}%</b>（${winDays}/${monthDays.length}）</span>
    </div>`;
  }
  el.innerHTML = h;
}

          <span class="l">当日盈亏</span><span class="v ${cls(dailyIncome)}">${sign(dailyIncome)}${fmt(dailyIncome)}</span>
          <span class="l">距回本</span><span class="v ${holdingIncome >= 0 ? 'pos' : 'warn'}">${holdingIncome >= 0 ? '（正收益）' : '待回本'}</span>
          <span class="l">预估回本</span><span class="v"><span class="${holdingIncome >= 0 ? 'hl-green' : 'hl-yellow'}">${holdingIncome >= 0 ? '已回本' : '观察中'}</span></span>
          <span class="l">关联账户</span><span class="v">${f.account || '—'}</span>
        </div>
      </div>`;
    });
    html += `</div>`;
    const fundRows = [
      { label:'最新净值', value:f => Number(f.latestNav).toFixed(4), cls:f => '' },
      { label:'单位成本', value:f => Number(f.unitCost).toFixed(4), cls:f => '' },
      { label:'持有份额', value:f => Number(f.shares).toFixed(2), cls:f => '' },
      { label:'可用份额', value:f => Number(f.available).toFixed(2), cls:f => '' },
      { label:'当前金额', value:f => fmt(Number(f.amount)), cls:f => '' },
      { label:'持有收益', value:f => `${sign(Number(f.holdingIncome))}${fmt(Number(f.holdingIncome))}\n${sign(Number(f.holdingYield))}${fmt(Number(f.holdingYield))}%`, cls:f => cls(Number(f.holdingIncome)) },
      { label:'当日盈亏', value:f => `${sign(Number(f.dailyIncome || 0))}${fmt(Number(f.dailyIncome || 0))}`, cls:f => cls(Number(f.dailyIncome || 0)) },

      { label:'预估回本', value:f => Number(f.holdingIncome) >= 0 ? '已回本' : '观察中', cls:f => Number(f.holdingIncome) >= 0 ? 'pos' : 'warn' }

    html += `<div class="holding-matrix"><table>
      <thead><tr><th>指标</th>${FUND_PORTFOLIO.map(f => `<th class="hm-stock">${fundTag(f.code, {price:false})}</th>`).join('')}</tr></thead>
      <tbody>${fundRows.map(row => `<tr>
        <td>${row.label}</td>
        ${FUND_PORTFOLIO.map(f => `<td class="hm-value ${row.cls(f)}">${String(row.value(f)).replace(/\n/g, '<br>')}</td>`).join('')}

    </table></div>`;
  } else {
    html += `<div class="empty-state">暂无基金持仓数据。后续可通过 <code>/api/portfolio.json</code> 的 <code>funds</code> 字段补充。</div>`;
  }
  html += `</div>`;
  html += '</div>'; // end holdingTabFunds

  const calendarData = DAYS.map(day => ({ day, pnl: calcPnL(day) }));
  html += `<div class="section"><h2>盈亏日历</h2><div class="calendar-grid">
    ${calendarData.map(item => {

  const stockTrades = TRANSACTIONS.stocks || [];

  const totalTrades = stockTrades.length + fundTrades.length;

  // === Section 2: 大盘情绪 ===

  html += `<div class="info-row market-compact">

  html += `</div>`;

  // === Section 3: 主线板块 ===

    <div class="sector">
      <div class="sname">${d.sectorName} <span class="badge badge-hot">${d.sectorBadge}</span></div>

      </div>
    </div>
  </div>`;

  const heatItems = ((d.sectorHeat && d.sectorHeat.length) ? d.sectorHeat : [{ name:'暂无热力数据', pct:0, size:20, desc:'当前日期未记录行业涨跌幅', leaders:'—' }])
    .slice().sort((a, b) => Math.abs(b.pct) - Math.abs(a.pct));
  html += `<div class="section"><h2>板块热力图</h2><div class="treemap" aria-label="板块热力图">
    ${heatItems.map(item => {
      const alpha = Math.min(Math.abs(item.pct) / 7, 1);
      const bg = item.pct >= 0 ? `rgba(255,23,68,${0.08 + alpha * 0.24})` : `rgba(0,200,83,${0.08 + alpha * 0.24})`;
      const bd = item.pct >= 0 ? 'rgba(255,23,68,0.45)' : 'rgba(0,200,83,0.45)';
      const grow = Math.max(item.size || Math.abs(item.pct) * 10, 16);

        <div class="hn">${item.name}</div>
        <div class="hp ${cls(item.pct)}">${sign(item.pct)}${fmt(item.pct)}%</div>
        <div class="heat-desc">${item.desc}</div>

      </div>`;
    }).join('')}
  </div></div>`;

  // === Section 4: 备选标的 ===
  html += `<div class="section"><h2>备选标的</h2>`;
  if (d.watchlist && d.watchlist.length > 0) {
    html += `<div class="tbl-wrap watch-table"><table>
      <thead><tr><th>代码</th><th>名称</th><th>最新价</th><th>板块</th><th>涨停时间</th><th>封单</th><th>概念正宗</th><th>明日策略</th></tr></thead>
      <tbody>${d.watchlist.map(w => `<tr>
        <td>${w.code}</td>
        <td style="font-weight:600">${stockTag(w.code, {price:false})}</td>
        <td>${STOCK_INFO[w.code] ? '¥' + STOCK_INFO[w.code].price : '—'}</td>
        <td>${w.sector}</td>

        <td><span class="badge badge-strong">${w.seal}</span></td>
        <td>${w.pure ? '<span class="badge badge-strong">是</span> ' : ''}${w.pureNote}</td>
        <td><span class="hl-green">${w.strategy}</span></td>
      </tr>`).join('')}</tbody>
    </table></div>`;
    const watchRows = [
      { label:'名称', value:w => stockTag(w.code, {price:false}) },
      { label:'最新价', value:w => STOCK_INFO[w.code] ? '¥' + STOCK_INFO[w.code].price : '—' },
      { label:'板块', value:w => w.sector },
      { label:'涨停时间', value:w => w.time },
      { label:'封单', value:w => w.seal },
      { label:'概念正宗', value:w => `${w.pure ? '是｜' : ''}${w.pureNote}` },
      { label:'明日策略', value:w => `<span class="hl-green">${w.strategy}</span>` }
    ];
    html += `<div class="watch-matrix"><table>
      <tbody>${watchRows.map(row => `<tr>
        <td>${row.label}</td>
        ${d.watchlist.map(w => `<td class="wm-value">${row.value(w)}</td>`).join('')}
      </tr>`).join('')}</tbody>
    </table></div>`;
  } else {
    html += `<div class="info-item">当日无详细备选标的记录。</div>`;
  }
  html += `</div>`;

  // === Section 5: 隔夜单 ===
  html += `<div class="section"><h2>隔夜单计划</h2><div class="info-item">${d.overnight}</div></div>`;

  // === Section 6: 操作纪律 ===
  html += `<div class="section"><h2>明日操作纪律</h2>
    <div class="rules">
      <div class="rules-box"><h3>买入纪律</h3><ol>
        <li>只买主线龙一 / 首个首板 / 首个二板</li>
        <li>买入时间 9:30-10:00</li>
        <li>单票 ≤ 2成，总仓 ≤ 5成</li>
      </ol></div>
      <div class="rules-box"><h3>卖出纪律</h3><ol>
        <li>不涨停 / 低开不翻红 / 冲高回落 / 烂板 → 卖</li>
        <li>止损 -5% 无条件走</li>
        <li>止盈 +8%~+15% 分批卖</li>
      </ol></div>
    </div>
  </div>`;

  // === Section 7: 一句话策略 ===
  html += `<div class="section"><h2>明日一句话策略</h2><div class="strat">${linkStocks(d.strategy)}</div></div>`;

  // === Section 8: 题材汇总 ===
  html += `<div class="section"><h2>附录 · 当日热点题材汇总</h2><div class="themes">`;
  d.hotThemes.forEach(t => {
    html += `<div class="theme ${t.dim ? 'dim' : ''}">
      <div class="tn"><span class="rank">${t.rank}</span>${t.name} ${t.badge ? '<span class="badge badge-hot">' + t.badge + '</span>' : ''}</div>
      <div class="td">${t.desc}</div>

  html += `</div></div>`;

  document.getElementById('content').innerHTML = html;
  renderWeekChart();
}

// ==================== CHARTS (Pure SVG) ====================

function renderCharts() {
  const labels = DAYS.map(d => d.date.slice(5) + ' ' + d.weekday);
  const selectedIdx = DAYS.findIndex(d => d.date === currentDate);
  const n = DAYS.length;

  const allPnl = DAYS.map(d => calcPnL(d));
  const mvData = allPnl.map(p => p.mv);
  const dailyPnlData = allPnl.map(p => p.dailyPnl);

  const stockPrices = {};
  Object.keys(HOLDINGS.shares).forEach(code => {
    stockPrices[code] = DAYS.map(d => d.price[code]);
  });

  const shData = DAYS.map(d => d.idx.sh[0]);
  const szData = DAYS.map(d => d.idx.sz[0]);
  const cyData = DAYS.map(d => d.idx.cy[0]);

  // SVG chart helper
  const W = 480, H = 200, PAD = { t: 20, r: 20, b: 36, l: 56 };
  const plotW = W - PAD.l - PAD.r, plotH = H - PAD.t - PAD.b;

  function makeSvg(id) {
    const el = document.getElementById(id);
    if (!el) return null;
    el.innerHTML = '';
    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
    svg.setAttribute('width', '100%');
    svg.setAttribute('height', '200');
    svg.style.display = 'block';
    el.appendChild(svg);
    return svg;
  }

  function addText(svg, x, y, text, opts = {}) {
    const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    t.setAttribute('x', x); t.setAttribute('y', y);
    t.setAttribute('fill', opts.color || '#8b8fa3');
    t.setAttribute('font-size', opts.size || '10');
    t.setAttribute('text-anchor', opts.anchor || 'middle');
    t.setAttribute('font-family', '-apple-system, sans-serif');
    if (opts.bold) t.setAttribute('font-weight', '600');
    t.textContent = text;
    svg.appendChild(t);
  }

  function addLine(svg, x1, y1, x2, y2, color, opts = {}) {
    const l = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    l.setAttribute('x1', x1); l.setAttribute('y1', y1);
    l.setAttribute('x2', x2); l.setAttribute('y2', y2);
    l.setAttribute('stroke', color);
    l.setAttribute('stroke-width', opts.width || '1');
    if (opts.dash) l.setAttribute('stroke-dasharray', opts.dash);
    svg.appendChild(l);
  }

  function addCircle(svg, cx, cy, r, color) {
    const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    c.setAttribute('cx', cx); c.setAttribute('cy', cy);
    c.setAttribute('r', r); c.setAttribute('fill', color);
    svg.appendChild(c);
  }

  function addPolyline(svg, points, color, opts = {}) {
    const p = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
    p.setAttribute('points', points.map(pt => pt.join(',')).join(' '));
    p.setAttribute('fill', opts.fill || 'none');
    p.setAttribute('stroke', color);
    p.setAttribute('stroke-width', opts.width || '2');
    p.setAttribute('stroke-linejoin', 'round');
    if (opts.dash) p.setAttribute('stroke-dasharray', opts.dash);
    svg.appendChild(p);
  }

  function addRect(svg, x, y, w, h, color, opts = {}) {
    const r = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    r.setAttribute('x', x); r.setAttribute('y', y);
    r.setAttribute('width', w); r.setAttribute('height', h);
    r.setAttribute('fill', color);
    r.setAttribute('rx', opts.rx || '3');
    svg.appendChild(r);
  }

  function xScale(i) { return PAD.l + (i / (n - 1)) * plotW; }
  function yScale(v, min, max) { return PAD.t + plotH - ((v - min) / (max - min)) * plotH; }

  function drawGrid(svg, min, max, fmtFn, xFn = xScale) {
    const steps = 4;
    for (let i = 0; i <= steps; i++) {
      const v = min + (max - min) * i / steps;
      const y = yScale(v, min, max);
      addLine(svg, PAD.l, y, W - PAD.r, y, 'rgba(255,255,255,0.06)');
      addText(svg, PAD.l - 6, y + 3, fmtFn(v), { anchor: 'end', size: '9' });
    }
    // X labels
    for (let i = 0; i < n; i++) {
      const x = xFn(i);
      addLine(svg, x, PAD.t, x, H - PAD.b, 'rgba(255,255,255,0.03)');
      addText(svg, x, H - PAD.b + 14, labels[i], { size: '9' });
    }
  }

  function drawLine(svg, data, color, min, max, opts = {}) {
    const points = data.map((v, i) => [xScale(i), yScale(v, min, max)]);
    if (opts.fill) {
      const fillPoints = [...points, [xScale(n-1), yScale(min, min, max)], [xScale(0), yScale(min, min, max)]];
      addPolyline(svg, fillPoints, 'none', { fill: opts.fill });
    }
    addPolyline(svg, points, color, { width: '2', dash: opts.dash });
    if (!opts.noPoints) {
      data.forEach((v, i) => {
        const r = i === selectedIdx ? 5 : 3;
        const c = i === selectedIdx ? '#ffd600' : 'rgba(255,255,255,0.3)';
        addCircle(svg, xScale(i), yScale(v, min, max), r, c);
      });
    }
  }

  // --- Chart 1: Portfolio Value ---
  const svg1 = makeSvg('chartMv');
  if (svg1) {
    const min = Math.min(...mvData, HOLDINGS.cost.total) * 0.999;
    const max = Math.max(...mvData, HOLDINGS.cost.total) * 1.001;
    drawGrid(svg1, min, max, v => v.toFixed(0));
    drawLine(svg1, mvData, '#448aff', min, max, { fill: 'rgba(68,138,255,0.1)' });
    drawLine(svg1, DAYS.map(() => HOLDINGS.cost.total), 'rgba(255,255,255,0.25)', min, max, { dash: '5,5', noPoints: true });
    // Legend
    addText(svg1, W - PAD.r, 12, '— 持仓成本', { anchor: 'end', size: '9', color: 'rgba(255,255,255,0.4)' });
    addText(svg1, W - PAD.r - 80, 12, '● 总市值', { anchor: 'end', size: '9', color: '#448aff' });
  }

  // Daily P&L now rendered as calendar via renderCalendar()
  // --- Chart 2.5: Intraday P&L Curve ---
  const svgIntraday = makeSvg('chartIntraday');
  if (svgIntraday && INTRADAY_PNL.length) {
    const vals = INTRADAY_PNL.map(p => Number(p.value));
    const min = Math.min(...vals, 0) * 1.18;
    const max = Math.max(...vals, 0) * 1.18 || 1;
    const xIntraday = i => PAD.l + (i / Math.max(INTRADAY_PNL.length - 1, 1)) * plotW;
    drawGrid(svgIntraday, min, max, v => v.toFixed(0), xIntraday);
    // X-axis: show trading time labels 9:00-15:00
    const timeLabels = ['9:30','10:00','10:30','11:00','11:30/13:00','13:30','14:00','14:30','15:00'];
    timeLabels.forEach((label, i) => {
      if (i < INTRADAY_PNL.length) {
        const x = xIntraday(i);
        addLine(svgIntraday, x, H - PAD.b, x, H - PAD.b + 4, 'rgba(255,255,255,0.3)');
        addText(svgIntraday, x, H - 4, label, { anchor:'middle', size:'8', color:'#8b8fa3' });
      }
    });
    const zeroY2 = yScale(0, min, max);
    addLine(svgIntraday, PAD.l, zeroY2, W - PAD.r, zeroY2, 'rgba(255,255,255,0.16)', { width:'1' });
    const pts = INTRADAY_PNL.map((p, i) => [xIntraday(i), yScale(Number(p.value), min, max)]);
    addPolyline(svgIntraday, pts, '#ffd600', { width:'2.2' });
    INTRADAY_PNL.forEach((p, i) => {
      if (i === 0 || i === INTRADAY_PNL.length - 1 || i % 3 === 0) {
        addCircle(svgIntraday, xIntraday(i), yScale(Number(p.value), min, max), i === INTRADAY_PNL.length - 1 ? 4 : 3, i === INTRADAY_PNL.length - 1 ? '#ffd600' : 'rgba(255,255,255,.45)');
      }
    });
    const last = INTRADAY_PNL[INTRADAY_PNL.length - 1];
    addText(svgIntraday, W - PAD.r, Math.max(PAD.t + 12, yScale(Number(last.value), min, max) - 8), `${last.time} ${sign(Number(last.value))}${fmt(Number(last.value))}`, { anchor:'end', size:'10', color:'#ffd600', bold:true });
  }

  // --- Chart 3: Stock Price Trends (normalized %) ---
  const svg3 = makeSvg('chartStocks');
  if (svg3) {
    const colors = { '159941': '#448aff', '518880': '#ffd600', '601288': '#00c853' };
    const normalize = (arr) => { const base = arr[0]; return arr.map(v => ((v - base) / base * 100)); };
    const allNorm = Object.keys(HOLDINGS.shares).map(c => normalize(stockPrices[c]));
    const costNorm = Object.keys(HOLDINGS.cost).filter(c => c !== 'total').map(c => {
      const base = stockPrices[c][0];
      return ((HOLDINGS.cost[c] - base) / base * 100);
    });
    const allVals = allNorm.flat().concat(costNorm);
    const min = Math.min(...allVals) - 0.5;
    const max = Math.max(...allVals) + 0.5;
    drawGrid(svg3, min, max, v => v.toFixed(1) + '%');
    Object.keys(HOLDINGS.shares).forEach((code, ci) => {
      drawLine(svg3, allNorm[ci], colors[code], min, max);
      // Cost line
      const costVal = costNorm[ci];
      drawLine(svg3, DAYS.map(() => costVal), colors[code] + '60', min, max, { dash: '4,4', noPoints: true });
    });
    // Legend
    let lx = PAD.l;
    Object.keys(HOLDINGS.shares).forEach(code => {
      addCircle(svg3, lx + 4, 10, 4, colors[code]);
      addText(svg3, lx + 12, 13, HOLDINGS.names[code], { anchor: 'start', size: '9', color: colors[code] });
      lx += 80;
    });
  }

  // --- Chart 4: Index Trends (normalized %) ---
  const svg4 = makeSvg('chartIdx');
  if (svg4) {
    const normalize = (arr) => arr.map(v => ((v - arr[0]) / arr[0] * 100));
    const normSh = normalize(shData);
    const normSz = normalize(szData);
    const normCy = normalize(cyData);
    const allVals = normSh.concat(normSz).concat(normCy);
    const min = Math.min(...allVals) - 0.3;
    const max = Math.max(...allVals) + 0.3;
    drawGrid(svg4, min, max, v => v.toFixed(1) + '%');
    // Zero line
    if (min < 0 && max > 0) {
      const zeroY = yScale(0, min, max);
      addLine(svg4, PAD.l, zeroY, W - PAD.r, zeroY, 'rgba(255,255,255,0.1)', { dash: '3,3' });
    }
    drawLine(svg4, normSh, '#ff1744', min, max);
    drawLine(svg4, normSz, '#448aff', min, max);
    drawLine(svg4, normCy, '#00c853', min, max);
    // Legend
    const items = [['上证', '#ff1744'], ['深成指', '#448aff'], ['创业板', '#00c853']];
    let lx = PAD.l;
    items.forEach(([name, color]) => {
      addCircle(svg4, lx + 4, 10, 4, color);
      addText(svg4, lx + 12, 13, name, { anchor: 'start', size: '9', color });
      lx += 70;
    });
  }

  // --- Chart 5: Daily P&L Attribution ---
  const svg5 = makeSvg('chartAttribution');
  if (svg5) {
    const selected = DAYS[selectedIdx];
    const attribution = calcPnL(selected).stocks.map(s => ({ name: s.name, code: s.code, value: s.daily || 0 }));
    const maxAbs = Math.max(...attribution.map(i => Math.abs(i.value)), 1);
    const aPad = { l: 72, r: 54, t: PAD.t, b: PAD.b };
    const aPlotW = W - aPad.l - aPad.r;
    const domain = maxAbs * 1.25;
    const zeroX = aPad.l + aPlotW / 2;
    const xMoney = v => aPad.l + ((v + domain) / (domain * 2)) * aPlotW;
    [-maxAbs, -maxAbs / 2, 0, maxAbs / 2, maxAbs].forEach((v, idx) => {
      const x = xMoney(v);
      addLine(svg5, x, PAD.t, x, H - PAD.b, 'rgba(255,255,255,0.07)', { dash: v === 0 ? '' : '3,3' });
      addText(svg5, x, H - PAD.b + 16, `${v >= 0 ? '+' : ''}${v.toFixed(0)}`, {
        size: '9',
        anchor: idx === 0 ? 'start' : idx === 4 ? 'end' : 'middle'
      });
    });
    addText(svg5, W - PAD.r, H - 6, '金额（元）', { anchor: 'end', size: '10', color: '#8b8fa3' });
    addLine(svg5, zeroX, PAD.t, zeroX, H - PAD.b, 'rgba(255,255,255,0.18)', { width: '1' });
    const rowH = plotH / attribution.length;
    attribution.forEach((item, i) => {
      const y = PAD.t + i * rowH + rowH * 0.25;
      const barH = Math.max(rowH * 0.48, 14);
      const endX = xMoney(item.value);
      const barW = Math.abs(endX - zeroX);
      const color = item.value >= 0 ? 'rgba(255,23,68,0.72)' : 'rgba(0,200,83,0.72)';
      if (item.value >= 0) addRect(svg5, zeroX, y, barW, barH, color, { rx: '6' });
      else addRect(svg5, zeroX - barW, y, barW, barH, color, { rx: '6' });
      addText(svg5, aPad.l - 8, y + barH * 0.65, item.name, { anchor: 'end', size: '10', color: '#8b8fa3' });
      addText(svg5, item.value >= 0 ? endX - 8 : endX + 8, y + barH * 0.65, `${sign(item.value)}${fmt(item.value)}`, {
        anchor: item.value >= 0 ? 'end' : 'start',
        size: '11',
        color: '#ffffff',
        bold: true
      });
    });
  }
}

// Override selectDate to also re-render charts
const origSelectDate = selectDate;
selectDate = function(date) {
  origSelectDate(date);
  renderCharts();
  renderCalendar();
};

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  });
}
</script>
