async function testAIConnection() {
  const btn = document.getElementById('aiTestBtn');
  const baseUrl = document.getElementById('aiBaseUrl').value.trim();
  const apiKey = document.getElementById('aiApiKey').value.trim();
  const model = document.getElementById('aiModel').value.trim();
  if (!apiKey) {
    showToast('请先填入API Key');
    return;
  }
  btn.disabled = true;
  btn.textContent = '测试中...';
  try {
    const response = await fetch(baseUrl.replace(/\/+$/, '') + '/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
      body: JSON.stringify({
        model: model,
        messages: [{ role: 'user', content: '回复ok' }],
        temperature: 0.3,
        max_tokens: 10
      })
    });
    if (!response.ok) {
      let err = '连接失败 (HTTP ' + response.status + ')';
      try {
        const d = await response.json();
        if (d.error && d.error.message) err += ': ' + d.error.message;
      } catch(e) {}
      showToast(err);
    } else {
      const data = await response.json();
      if (data.choices && data.choices[0]) {
        showToast('✅ 连接成功！');
      } else {
        showToast('连接成功但返回格式异常');
      }
    }
  } catch(e) {
    showToast('❌ 连接失败：' + (e.message || '网络错误') + '（可能是CORS限制）');
  } finally {
    btn.disabled = false;
    btn.textContent = '🔌 测试连接';
  }
}

function handleAIConfigImport(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.configs || !Array.isArray(data.configs)) {
        showToast('无效的配置文件格式');
        event.target.value = '';
        return;
      }
      if (!confirm('是否覆盖当前所有AI配置？此操作不可撤销。')) {
        event.target.value = '';
        return;
      }
      if (aiSaveTimer) { clearTimeout(aiSaveTimer); aiSaveTimer = null; }
      let activeId = data.activeId;
      if (!activeId || !data.configs.find(c => c.id === activeId)) {
        activeId = data.configs[0] ? data.configs[0].id : null;
      }
      saveAIConfigs(data.configs, activeId);
      renderAIConfigTabs();
      const config = getAIConfig();
      document.getElementById('aiConfigName').value = config.name || '';
      document.getElementById('aiBaseUrl').value = config.baseUrl;
      document.getElementById('aiApiKey').value = config.apiKey;
      document.getElementById('aiModel').value = config.model;
      document.getElementById('aiStyleSamples').value = config.styleSample || '';
      showToast('配置导入成功');
    } catch(err) {
      showToast('无效的配置文件格式');
    }
    event.target.value = '';
  };
  reader.readAsText(file);
}

function initAIConfigImport() {
  const importEl = document.getElementById('aiConfigImport');
  if (importEl) {
    importEl.addEventListener('change', handleAIConfigImport);
  }
}

async function callAIPolish(originalText, btnElement) {
  const config = getAIConfig();
  if (!config.apiKey) {
    showToast('请先配置AI API Key');
    openAIConfig();
    return null;
  }
  const styleSamples = getStyleSamples();
  let systemPrompt = '你是一位专业的文字润色助手，擅长日记随笔的润色。请保持原文的核心意思和情感基调，让语言更加流畅优美、表达更自然。';
  if (styleSamples && styleSamples.trim()) {
    systemPrompt += '\n\n以下是用户过往的写作样本，请模仿其文风、语气、用词习惯进行润色：\n' + styleSamples.substring(0, 3000);
  }
  const userPrompt = '请润色以下日记内容，保持原意但语言更流畅优美，润色后只输出润色后的正文，不要加任何解释、标题或引号：\n\n' + originalText;
  
  if (btnElement) {
    btnElement.disabled = true;
    btnElement.dataset.originalText = btnElement.textContent;
    btnElement.textContent = '✨ 润色中...';
  }
  
  try {
    const response = await fetch(config.baseUrl.replace(/\/+$/, '') + '/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + config.apiKey
      },
      body: JSON.stringify({
        model: config.model,
        messages: [
          { role: 'system', content: systemPrompt },
          { role: 'user', content: userPrompt }
        ],
        temperature: 0.7,
        stream: false
      })
    });
    
    if (!response.ok) {
      let errorMsg = '润色失败，请稍后重试';
      if (response.status === 401) {
        errorMsg = 'API Key无效，请检查设置';
      } else if (response.status === 429) {
        errorMsg = '请求过于频繁，请稍后再试';
      } else {
        try {
          const errData = await response.json();
          if (errData.error && errData.error.message) {
            errorMsg = errData.error.message;
          }
        } catch(e) {}
      }
      showToast(errorMsg);
      return null;
    }
    
    const data = await response.json();
    if (!data.choices || !data.choices[0] || !data.choices[0].message) {
      showToast('AI未返回内容，请重试');
      return null;
    }
    return data.choices[0].message.content.trim();
  } catch(e) {
    showToast('网络连接失败，请检查网络或API地址');
    return null;
  } finally {
    if (btnElement) {
      btnElement.disabled = false;
      if (btnElement.dataset.originalText) {
        btnElement.textContent = btnElement.dataset.originalText;
      }
    }
  }
}

    document.execCommand('copy');
    document.body.removeChild(textarea);
  });
}

function renderTodoDetail() {
  if (!currentUser) { goHome(); return; }
  const todos = getTodos();
  const doneCount = todos.filter(t => t.done).length;
  const html = `<div class="page-nav"><button class="page-nav-btn" onclick="goHome()">← 返回首页</button><span class="breadcrumb">${buildBreadcrumbs(currentPage)}</span></div>
    <div class="section">
      <h2>待办清单 <span class="tag tag-blue" style="font-size:.72rem">${AUTH_ACCOUNTS[currentUser]?.name || currentUser}</span></h2>
      <div class="update-time">${todos.length > 0 ? `共 ${todos.length} 项 · 已完成 ${doneCount} 项` : ''}</div>
      <div class="todo-add-bar">
        <input type="text" id="todoInput" placeholder="输入待办事项，回车添加" autocomplete="off" onkeydown="if(event.key==='Enter') addTodoDetail()">
        <button onclick="addTodoDetail()">添加</button>
      </div>
      <div id="todoListContainer" data-mode="detail"></div>
    </div>`;
  const _oldTodoInput = _prevPage === 'todoDetail' ? document.getElementById('todoInput') : null;
  document.getElementById('content').innerHTML = html;
  if (_oldTodoInput) {
    const _newTodoInput = document.getElementById('todoInput');
    if (_newTodoInput) _newTodoInput.replaceWith(_oldTodoInput);
  }
  renderTodoListDetail();
}

function renderTodoListDetail() {
  const container = document.getElementById('todoListContainer');
  if (!container) return;
  const todos = getTodos();
  if (todos.length === 0) {
    container.innerHTML = '<div class="todo-empty">暂无待办事项</div>';
    return;
  }
  container.innerHTML = todos.map(t => `
    <div class="todo-item ${t.done ? 'done' : ''}">
      <div class="todo-check ${t.done ? 'done' : ''}" onclick="toggleTodoDetail(${t.id})"></div>
      <span class="todo-text" onclick="toggleTodoDetail(${t.id})">${escapeHtml(t.text)}</span>
      <span class="todo-del" onclick="deleteTodoDetail(${t.id})">×</span>
    </div>
  `).join('');
  const summary = document.querySelector('.update-time');
  if (summary) {
    const doneCount = todos.filter(t => t.done).length;
    summary.textContent = todos.length > 0 ? `共 ${todos.length} 项 · 已完成 ${doneCount} 项` : '';
  }
}

function addTodoDetail() {
  const input = document.getElementById('todoInput');
  const text = input.value.trim();
  if (!text) return;
  const todos = getTodos();
  todos.push({ id: Date.now(), text: text, done: false });
  saveTodos(todos);
  input.value = '';
  renderTodoListDetail();
}

function toggleTodoDetail(id) {
  const todos = getTodos();
  const t = todos.find(t => t.id === id);
  if (t) t.done = !t.done;
  saveTodos(todos);
  renderTodoListDetail();
}

function deleteTodoDetail(id) {
  let todos = getTodos();
  todos = todos.filter(t => t.id !== id);
  saveTodos(todos);
  renderTodoListDetail();
}

function renderThemeCard(t, hidden) {
  const pctStr = `${t.pct >= 0 ? '+' : ''}${t.pct.toFixed(2)}%`;
  const pctColor = t.pct >= 0 ? 'var(--green)' : 'var(--red)';
  const badgeClass = t.badge === '主线' ? 'badge-hot' : t.badge === '活跃' ? 'badge-active' : '';
  const cls = 'theme ' + (hidden ? 'theme-extra ' : '') + (t.dim ? 'dim' : '');
  return `<div class="${cls.trim()}"${hidden ? ' style="display:none"' : ''}>
    <div class="tn"><span class="rank">${t.rank}</span>${t.name}<span class="pct" style="color:${pctColor}">${pctStr}</span>${t.badge ? '<span class="badge ' + badgeClass + '">' + t.badge + '</span>' : ''}</div>
    <div class="td">${linkStocks(t.desc)}</div>
    <div class="ts">${linkStocks(t.stocks)}</div>
  </div>`;
}

function toggleThemesMore(btn) {
  const section = btn.closest('.section');
  const extras = section.querySelectorAll('.theme-extra');
  const expanded = btn.dataset.expanded === '1';
  if (expanded) {
    extras.forEach(el => el.style.display = 'none');
    btn.textContent = `展开其余${extras.length}个题材 ▼`;
    btn.dataset.expanded = '0';
  } else {
    extras.forEach(el => el.style.display = '');
    btn.textContent = '收起 ▲';
    btn.dataset.expanded = '1';
  }
}

      <div class="idx-card"><div class="name">创业板指</div><div class="pt">${fmt(d.idx.cy[0])}</div><div class="chg ${cls(d.idx.cy[1])}">${sign(d.idx.cy[1])}${fmt(d.idx.cy[1])}%</div></div>

  html += `<div class="info-row market-compact">

    <div class="info-item"><div class="label">涨停家数</div><div class="value"><span class="hl-yellow" style="color:#ff5a5f">${typeof d.limitUp === 'number' && d.limitUp > 0 ? d.limitUp + '只' : '—'}</span></div></div>

    <div class="info-item"><div class="label">高标情绪</div><div class="value">${d.sentiment && d.sentiment !== '—' ? `<span class="tag tag-${d.sentiment.includes('回暖') || d.sentiment === '强势' ? 'green' : d.sentiment === '差' || d.sentiment === '偏弱' ? 'red' : 'yellow'}">${d.sentiment}</span>` : '—'}</div></div>
    <div class="info-item"><div class="label">个股涨跌比</div><div class="value">${formatUd(d.ud)}</div></div>
    <div class="info-item"><div class="label">赚钱效应</div><div class="value">${d.earnEffect}</div></div>
  </div>`;

  html += `<div class="info-item" style="margin-bottom:16px"><div class="label" style="margin-bottom:4px;">明日操作方向</div>
    <div><span class="hl-yellow">${linkStocks(d.direction)}</span></div></div>`;
  html += `</div>`;

  // === 今日主线板块 ===
  if (d.drivers && d.drivers.length > 0) {
  html += `<div class="section"><h2>今日主线板块</h2>
    <div class="sector">
      <div class="sname">${d.sectorName || '—'}${d.sectorBadge ? ' <span class="badge badge-hot">' + d.sectorBadge + '</span>' : ''}</div>
      <h3 style="color:var(--yellow);margin-bottom:4px">驱动消息</h3>
      <ul>${d.drivers.map(dr => `<li>${linkStocks(dr)}</li>`).join('')}</ul>
      <div class="leader">
        <strong>板块龙头：</strong>${linkStocks(d.leader || '—')}<br>
        <strong>板块强度：</strong>${d.sectorStrength ? `<span class="hl-${d.sectorStrength === '强' || d.sectorStrength === '极强' ? 'green' : d.sectorStrength === '弱' ? 'red' : 'yellow'}">${d.sectorStrength}</span>` : '—'}${d.sectorReason ? ' — ' + linkStocks(d.sectorReason) : ''}
      </div>
    </div>
  </div>`;
  }

  // === 板块热力图 ===
  const heatItems = ((d.sectorHeat && d.sectorHeat.length) ? d.sectorHeat : [{ name:'暂无热力数据', pct:0, size:20, desc:'当前日期未记录行业涨跌幅', leaders:'—' }])
    .slice().sort((a, b) => Math.abs(b.pct) - Math.abs(a.pct));
  html += `<div class="section"><h2>板块热力图</h2><div class="treemap" aria-label="板块热力图">
    ${heatItems.map(item => {
      const alpha = Math.min(Math.abs(item.pct) / 7, 1);
      const bg = item.pct >= 0 ? `rgba(255,23,68,${0.08 + alpha * 0.24})` : `rgba(0,200,83,${0.08 + alpha * 0.24})`;
      const bd = item.pct >= 0 ? 'rgba(255,23,68,0.45)' : 'rgba(0,200,83,0.45)';
      const grow = Math.max(item.size || Math.abs(item.pct) * 10, 16);
      const basis = Math.max(16, Math.min(46, grow * 0.62));
      return `<div class="tree-cell${item.isCategory ? ' cat-cell' : ''}" tabindex="0" style="--grow:${grow};--basis:${basis}%;background:${bg};border-color:${bd}" title="${item.name} ${sign(item.pct)}${fmt(item.pct)}%｜${item.desc}">
        <div class="hn">${item.name}${item.isCategory ? ' <span class="badge" style="font-size:.6em;vertical-align:middle;opacity:.7">大类</span>' : ''}</div>

        <div class="heat-desc">${item.desc}</div>

          <div><strong>${item.name}</strong> ${sign(item.pct)}${fmt(item.pct)}%${item.isCategory ? '（' + item.subCount + '个细分板块）' : ''}</div>

          <div>龙头：${linkStocks(item.leaders || '—')}</div>
        </div>
      </div>`;
    }).join('')}

  // === 备选标的（仅显示3个）===
  html += `<div class="section"><h2>备选标的</h2>`;
  if (d.watchlist && d.watchlist.length > 0) {
    const watchShow = d.watchlist.slice(0, 3);
    html += `<div class="tbl-wrap watch-table"><table>
      <thead><tr><th>代码</th><th>名称</th><th>最新价</th><th>板块</th><th>涨停时间</th><th>封单</th><th>概念正宗</th><th>明日策略</th></tr></thead>
      <tbody>${watchShow.map(w => `<tr>
        <td>${w.code}</td>
        <td style="font-weight:600">${stockTag(w.code, {price:false})}</td>
        <td>${STOCK_INFO[w.code] ? '¥' + STOCK_INFO[w.code].price : '—'}</td>
        <td>${w.sector}</td>
        <td>${w.time}</td>
        <td><span class="badge badge-strong">${w.seal}</span></td>
        <td>${w.pure ? '<span class="badge badge-strong">是</span> ' : ''}${w.pureNote}</td>
        <td><span class="hl-green">${w.strategy}</span></td>
      </tr>`).join('')}</tbody>
    </table></div>`;
    const watchRows = [
      { label:'名称', value:w => stockTag(w.code, {price:false}) },
      { label:'最新价', value:w => STOCK_INFO[w.code] ? '¥' + STOCK_INFO[w.code].price : '—' },
      { label:'板块', value:w => w.sector },
      { label:'涨停时间', value:w => w.time },
      { label:'封单', value:w => w.seal },
      { label:'概念正宗', value:w => `${w.pure ? '是｜' : ''}${w.pureNote}` },
      { label:'明日策略', value:w => `<span class="hl-green">${w.strategy}</span>` }
    ];
    html += `<div class="watch-matrix"><table>
      <tbody>${watchRows.map(row => `<tr>
        <td>${row.label}</td>
        ${watchShow.map(w => `<td class="wm-value">${row.value(w)}</td>`).join('')}
      </tr>`).join('')}</tbody>
    </table></div>`;
  } else {
    html += `<div class="info-item">当日无详细备选标的记录。</div>`;
  }
  html += `</div>`;

  // === 隔夜单计划 ===
  const overnightText = (d.overnight || d.overnightPlan || '—').replace(/\n/g, '<br>');
  html += `<div class="section"><h2>隔夜单计划</h2><div class="info-item">${linkStocks(overnightText)}</div></div>`;

  // === 明日操作纪律 ===
  html += `<div class="section"><h2>明日操作纪律</h2>
    <div class="rules">
      <div class="rules-box"><h3>买入纪律</h3><ol>
        <li>只买主线龙一 / 首个首板 / 首个二板</li>
        <li>买入时间 9:30-10:00</li>
        <li>单票 ≤ 2成，总仓 ≤ 5成</li>
      </ol></div>
      <div class="rules-box"><h3>卖出纪律</h3><ol>
        <li>不涨停 / 低开不翻红 / 冲高回落 / 烂板 → 卖</li>
        <li>止损 -5% 无条件走</li>
        <li>止盈 +8%~+15% 分批卖</li>
      </ol></div>
    </div>
  </div>`;

  // === 明日一句话策略 ===
  html += `<div class="section"><h2>明日一句话策略</h2><div class="strat">${linkStocks(d.strategy)}</div></div>`;

  // === 附录 ===
  html += `<div class="section"><h2>附录 · 当日热点题材汇总</h2><div class="themes">`;
  if (d.hotThemes && d.hotThemes.length > 0) {
    const themesShow = d.hotThemes.slice(0, 6);
    const themesMore = d.hotThemes.slice(6);
    themesShow.forEach(t => {
      html += renderThemeCard(t);
    });
    if (themesMore.length > 0) {
      themesMore.forEach(t => {
        html += renderThemeCard(t, true);
      });
      html += `<div style="grid-column:1/-1;text-align:center;margin-top:4px"><button class="btn-more" onclick="toggleThemesMore(this)" style="background:var(--card-hover);color:var(--blue);border:1px solid var(--border);border-radius:8px;padding:6px 24px;cursor:pointer;font-size:0.85rem;transition:all 0.2s" onmouseover="this.style.borderColor='var(--blue)'" onmouseout="this.style.borderColor='var(--border)'">展开其余${themesMore.length}个题材 ▼</button></div>`;
    }
  } else {
    html += `<div class="info-item" style="color:var(--text-dim)">盘前数据，等待9:30开盘后自动更新热点题材。</div>`;
  }
  html += `</div></div>`;

  document.getElementById('content').innerHTML = html;
}

      { label:'可用份额', value:f => Number(f.available || f.shares).toFixed(2), cls:f => '' },
      { label:'当前金额', value:f => fmt(Number(f.amount)), cls:f => '' },
      { label:'持有收益', value:f => `${sign(Number(f.holdingIncome))}${fmt(Number(f.holdingIncome))}\n${sign(Number(f.holdingYield))}${fmt(Number(f.holdingYield))}%`, cls:f => cls(Number(f.holdingIncome)) },
      { label:'当日盈亏', value:f => `${sign(Number(f.dailyIncome || 0))}${fmt(Number(f.dailyIncome || 0))}`, cls:f => cls(Number(f.dailyIncome || 0)) },
      { label:'距回本', value:f => Number(f.holdingIncome) >= 0 ? '正收益' : '待回本', cls:f => Number(f.holdingIncome) >= 0 ? 'pos' : 'warn' },
      { label:'预估回本', value:f => Number(f.holdingIncome) >= 0 ? '已回本' : '观察中', cls:f => Number(f.holdingIncome) >= 0 ? 'pos' : 'warn' }
    ];
    html += `<div class="holding-matrix"><table>
      <thead><tr><th>指标</th>${fundData.map(f => `<th class="hm-stock">${fundTag(f.code, {price:false})}</th>`).join('')}</tr></thead>
      <tbody>${fundRows.map(row => `<tr>
        <td>${row.label}</td>
        ${fundData.map(f => `<td class="hm-value ${row.cls(f)}">${String(row.value(f)).replace(/\n/g, '<br>')}</td>`).join('')}
      </tr>`).join('')}</tbody>
    </table></div>`;
  } else {
    html += `<div class="empty-state">暂无基金持仓数据。后续可通过 <code>/api/portfolio.json</code> 的 <code>funds</code> 字段补充。</div>`;
  }
  html += `</div>`;
  html += '</div>'; // end holdingTabFunds
  }

  const stockTrades = summaryTab !== 'funds' ? (TRANSACTIONS.stocks || []) : [];
  const fundTrades = summaryTab !== 'stocks' ? (TRANSACTIONS.funds || []) : [];
  const totalTrades = stockTrades.length + fundTrades.length;
  html += `<div class="section"><h2>交易记录</h2>
    <div class="collapse-box" id="tradeAll">
      <button class="collapse-head" onclick="toggleCollapse('tradeAll')">
        <span>交易记录 <span class="collapse-meta">共 ${totalTrades} 条，默认收起</span></span><span class="collapse-icon">⌄</span>
      </button>
      <div class="collapse-body">
        ${summaryTab !== 'funds' ? `<div class="collapse-box" id="tradeStocks">
          <button class="collapse-head" onclick="toggleCollapse('tradeStocks');event.stopPropagation();">
            <span>股票交易记录 <span class="collapse-meta">${stockTrades.length} 条</span></span><span class="collapse-icon">⌄</span>
          </button>
          <div class="collapse-body">${tradeTable(stockTrades, '股票')}</div>
        </div>` : ''}
        ${summaryTab !== 'stocks' ? `<div class="collapse-box" id="tradeFunds">
          <button class="collapse-head" onclick="toggleCollapse('tradeFunds');event.stopPropagation();">
            <span>基金交易记录 <span class="collapse-meta">${fundTrades.length} 条</span></span><span class="collapse-icon">⌄</span>
          </button>
          <div class="collapse-body">${tradeTable(fundTrades, '基金')}</div>
        </div>` : ''}
      </div>
    </div>
  </div>`;

  document.getElementById('content').innerHTML = html;
  renderWeekChart();
}

function runPlControlsTest() {
  const results = [];
  const origValueType = plValueType;

  // Test switchPlValueType
  switchPlValueType('yield');
  results.push({ test: 'switchPlValueType(yield)', pass: plValueType === 'yield', got: plValueType });
  switchPlValueType('amount');
  results.push({ test: 'switchPlValueType(amount)', pass: plValueType === 'amount', got: plValueType });

  // Restore
  plValueType = origValueType;

  const passed = results.filter(r => r.pass).length;
  console.log(`[PL Controls Test] ${passed}/${results.length} passed`);
  results.forEach(r => {
    console.log(`  ${r.pass ? '✓' : '✗'} ${r.test} => ${r.got}`);
  });
  return passed === results.length;
}

// ==================== INIT ====================
async function initApp() {
  initTheme();
  initAuth();
  initAIConfigImport();
  if (currentUser) {
    await loadFromCloud();
  }
  const poem = CLASSIC_POEMS[Math.floor(Math.random() * CLASSIC_POEMS.length)];
  document.getElementById('versionInfo').innerHTML = `<span class="vi-ver">版本 ${APP_VERSION}</span><span class="vi-date">${APP_VERSION_DATE}</span><span class="vi-poem">「${poem.text}」—— ${poem.author}</span>`;
  // 先加载缓存净值（避免被loadPortfolioApi的旧数据覆盖）
  loadFundNavCache();
  // 交易时段重置当日收益为0（盘后会被基金净值刷新覆盖）
  const bjInit = getBeijingTime();
  const initH = bjInit.getHours(), initM = bjInit.getMinutes();
  const isInitTrading = (initH > 9 || (initH === 9 && initM >= 30)) && (initH < 15 || (initH === 15 && initM <= 30));
  if (isInitTrading) {
    FUND_PORTFOLIO.forEach(f => { f.dailyIncome = 0; });
  }
  ensureTodayData();
  rebuildFundHistory();
  await loadPortfolioApi();
  // loadPortfolioApi会替换FUND_PORTFOLIO，重新应用缓存净值（盘后保留最新净值/收益）
  loadFundNavCache();
  rebuildFundHistory();
  // P0: 先从localStorage恢复历史收盘归档数据
  loadStoredCloseSnapshots();
  const today = todayText();
  const workerData = await fetchDailyFromWorker(today);
  mergeWorkerDailyData(workerData);
  // 默认选择最新交易日（今天优先，否则选DAYS中最后一天）
  const hasToday = DAYS.some(d => d.date === today);
  currentDate = hasToday ? today : (DAYS.length > 0 ? DAYS[DAYS.length - 1].date : currentDate);
  renderDateButtons();
  render();
  renderCharts();
  renderCalendar();
  loadHeaderCustom();
  runPlControlsTest();
  startLiveRefresh();
  startMarketAutoSave();
  startFundNavAutoRefresh();
  // 页面加载后立即刷新一次市场情绪数据（板块/涨停等）
  refreshMarketData().catch(() => {});
  fetchWeather();
  updateHeaderClock();
  setInterval(updateHeaderClock, 1000);
  setInterval(fetchWeather, 600000);
  scheduleWorkerAutoRefresh();
  // P0: 页面加载后，如果当前时间>15:05且当日是交易日但未归档，立即补录
  setTimeout(() => {
    const bj = getBeijingTime();
    const mins = bj.getHours() * 60 + bj.getMinutes();
    const t = todayText(bj);
    if (isTradingDay(t) && mins >= 15 * 60 + 5) {
      const td = DAYS.find(d => d.date === t);
      if (!td || !td.closed) {
        console.log('[收盘归档] 检测到当日未归档，自动补录');
        snapshotClose().then(ok => { if (ok) { render(); renderCharts(); renderCalendar(); } });
      }
    }
  }, 3000);
}
initApp();

function scheduleWorkerAutoRefresh() {
  function checkRefresh() {
    const bj = getBeijingTime();
    const day = bj.getDay();
    if (day < 1 || day > 5) return;
    const h = bj.getHours();
    const m = bj.getMinutes();
    const currentTime = h * 60 + m;
    const triggers = [10*60, 14*60, 15*60+5];
    for (const t of triggers) {
      if (Math.abs(currentTime - t) < 3) {
        const today = todayText();
        fetchDailyFromWorker(today).then(data => {
          if (data && mergeWorkerDailyData(data)) {
            render();
            renderCharts();
            renderCalendar();
          }
        });
        break;
      }
    }
  }
  setInterval(checkRefresh, 60000);
}

// ==================== CHARTS (Pure SVG) ====================

function renderCharts(dimension = summaryTab) {
  const labels = DAYS.map(d => d.date.slice(5) + ' ' + d.weekday);
  const selectedIdx = DAYS.findIndex(d => d.date === currentDate);
  const n = DAYS.length;

  const allPnl = DAYS.map(d => calcPnL(d));
  const fundMvTotal = FUND_PORTFOLIO.reduce((s, f) => s + Number(f.amount || 0), 0);
  const fundCostTotal = FUND_PORTFOLIO.reduce((s, f) => s + Number(f.shares || 0) * Number(f.unitCost || 0), 0);
  let mvData, costTotal;
  if (dimension === 'all') {
    mvData = allPnl.map(p => p.mv + fundMvTotal);
    costTotal = HOLDINGS.cost.total + fundCostTotal;
  } else if (dimension === 'funds') {
    mvData = DAYS.map(() => fundMvTotal);
    costTotal = fundCostTotal;
  } else {
    mvData = allPnl.map(p => p.mv);
    costTotal = HOLDINGS.cost.total;
  }
  const dailyPnlData = allPnl.map(p => p.dailyPnl);

  const stockPrices = {};
  Object.keys(HOLDINGS.shares).forEach(code => {
    stockPrices[code] = DAYS.map(d => d.price[code]);
  });

  const shData = DAYS.map(d => d.idx.sh[0]);
  const szData = DAYS.map(d => d.idx.sz[0]);
  const cyData = DAYS.map(d => d.idx.cy[0]);

  // SVG chart helper
  const W = 480, H = 200, PAD = { t: 20, r: 20, b: 36, l: 56 };
  const plotW = W - PAD.l - PAD.r, plotH = H - PAD.t - PAD.b;

  function makeSvg(id) {
    const el = document.getElementById(id);
    if (!el) return null;
    el.innerHTML = '';
    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
    svg.setAttribute('width', '100%');
    svg.setAttribute('height', '200');
    svg.style.display = 'block';
    el.appendChild(svg);
    return svg;
  }

  function addText(svg, x, y, text, opts = {}) {
    const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    t.setAttribute('x', x); t.setAttribute('y', y);
    t.setAttribute('fill', opts.color || '#8b8fa3');
    t.setAttribute('font-size', opts.size || '10');
    t.setAttribute('text-anchor', opts.anchor || 'middle');
    t.setAttribute('font-family', '-apple-system, sans-serif');
    if (opts.bold) t.setAttribute('font-weight', '600');
    t.textContent = text;
    svg.appendChild(t);
  }

  function addLine(svg, x1, y1, x2, y2, color, opts = {}) {
    const l = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    l.setAttribute('x1', x1); l.setAttribute('y1', y1);
    l.setAttribute('x2', x2); l.setAttribute('y2', y2);
    l.setAttribute('stroke', color);
    l.setAttribute('stroke-width', opts.width || '1');
    if (opts.dash) l.setAttribute('stroke-dasharray', opts.dash);
    svg.appendChild(l);
  }

  function addCircle(svg, cx, cy, r, color) {
    const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    c.setAttribute('cx', cx); c.setAttribute('cy', cy);
    c.setAttribute('r', r); c.setAttribute('fill', color);
    svg.appendChild(c);
  }

  function addPolyline(svg, points, color, opts = {}) {
    const p = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
    p.setAttribute('points', points.map(pt => pt.join(',')).join(' '));
    p.setAttribute('fill', opts.fill || 'none');
    p.setAttribute('stroke', color);
    p.setAttribute('stroke-width', opts.width || '2');
    p.setAttribute('stroke-linejoin', 'round');
    if (opts.dash) p.setAttribute('stroke-dasharray', opts.dash);
    svg.appendChild(p);
  }

  function addRect(svg, x, y, w, h, color, opts = {}) {
    const r = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    r.setAttribute('x', x); r.setAttribute('y', y);
    r.setAttribute('width', w); r.setAttribute('height', h);
    r.setAttribute('fill', color);
    r.setAttribute('rx', opts.rx || '3');
    svg.appendChild(r);
  }

  function xScale(i) { return PAD.l + (i / (n - 1)) * plotW; }
  function yScale(v, min, max) { return PAD.t + plotH - ((v - min) / (max - min)) * plotH; }

  function drawGrid(svg, min, max, fmtFn, xFn = xScale, xLabels = null) {
    const steps = 4;
    const useLabels = xLabels || labels;
    const maskFn = (v) => dataRevealed ? fmtFn(v) : '****';
    for (let i = 0; i <= steps; i++) {
      const v = min + (max - min) * i / steps;
      const y = yScale(v, min, max);
      addLine(svg, PAD.l, y, W - PAD.r, y, 'rgba(255,255,255,0.06)');
      addText(svg, PAD.l - 6, y + 3, maskFn(v), { anchor: 'end', size: '9' });
    }
    // X labels: loop based on actual label count, not global n
    const xCount = xLabels !== null ? useLabels.length : n;
    for (let i = 0; i < xCount; i++) {
      const x = xFn(i);
      addLine(svg, x, PAD.t, x, H - PAD.b, 'rgba(255,255,255,0.03)');
      if (useLabels[i]) addText(svg, x, H - PAD.b + 14, useLabels[i], { size: '9' });
    }
  }

  function drawLine(svg, data, color, min, max, opts = {}) {
    const points = data.map((v, i) => [xScale(i), yScale(v, min, max)]);
    if (opts.fill) {
      const fillPoints = [...points, [xScale(n-1), yScale(min, min, max)], [xScale(0), yScale(min, min, max)]];
      addPolyline(svg, fillPoints, 'none', { fill: opts.fill });
    }
    addPolyline(svg, points, color, { width: '2', dash: opts.dash });
    if (!opts.noPoints) {
      data.forEach((v, i) => {
        const r = i === selectedIdx ? 5 : 3;
        const c = i === selectedIdx ? '#ffd600' : 'rgba(255,255,255,0.3)';
        addCircle(svg, xScale(i), yScale(v, min, max), r, c);
      });
    }
  }

  // --- Chart 1: Portfolio Value ---
  const svg1 = makeSvg('chartMv');
  if (svg1) {
    const min = Math.min(...mvData, costTotal) * 0.999;
    const max = Math.max(...mvData, costTotal) * 1.001;
    drawGrid(svg1, min, max, v => v.toFixed(0));
    drawLine(svg1, mvData, '#448aff', min, max, { fill: 'rgba(68,138,255,0.1)' });
    drawLine(svg1, DAYS.map(() => costTotal), 'rgba(255,255,255,0.25)', min, max, { dash: '5,5', noPoints: true });
    // Legend
    addText(svg1, W - PAD.r, 12, '— 持仓成本', { anchor: 'end', size: '9', color: 'rgba(255,255,255,0.4)' });
    addText(svg1, W - PAD.r - 80, 12, '● 总市值', { anchor: 'end', size: '9', color: '#448aff' });
  }

  // Daily P&L now rendered as calendar via renderCalendar()
  // --- Chart: Intraday P&L ---
  const svgIntraday = makeSvg('chartIntraday');
  if (svgIntraday) {
    const isToday = currentDate === todayText();
    const hasDataForDate = INTRADAY_PNL.length > 0 && isToday;
    // 时间到 x 坐标的映射（9:30-15:00 固定轴）
    const timeToX = timeStr => {
      const [h, m] = timeStr.split(':').map(Number);
      const mins = h * 60 + m;
      const start = 570; // 9:30
      const end = 900;   // 15:00
      const ratio = Math.max(0, Math.min(1, (mins - start) / (end - start)));
      return PAD.l + ratio * plotW;
    };
    if (hasDataForDate) {
      const vals = INTRADAY_PNL.map(p => Number(p.value));
      const min = Math.min(...vals, 0) * 1.18;
      const max = Math.max(...vals, 0) * 1.18 || 1;
      // 固定横轴：只画水平网格，不画竖直网格（下面手动画）
      drawGrid(svgIntraday, min, max, v => v.toFixed(0), () => PAD.l, []);
      // 固定时间轴刻度
      const timeLabels = [
        { time: '9:30', label: '9:30' },
        { time: '10:30', label: '10:30' },
        { time: '11:30', label: '11:30' },
        { time: '14:00', label: '14:00' },
        { time: '15:00', label: '15:00' }
      ];
      timeLabels.forEach(({ time, label }) => {
        const x = timeToX(time);
        addLine(svgIntraday, x, PAD.t, x, H - PAD.b, 'rgba(255,255,255,0.03)');
        addLine(svgIntraday, x, H - PAD.b, x, H - PAD.b + 4, 'rgba(255,255,255,0.3)');
        addText(svgIntraday, x, H - 4, label, { anchor: 'middle', size: '8', color: '#8b8fa3' });
      });
      const zeroY2 = yScale(0, min, max);
      addLine(svgIntraday, PAD.l, zeroY2, W - PAD.r, zeroY2, 'rgba(255,255,255,0.16)', { width: '1' });
      const pts = INTRADAY_PNL.map(p => [timeToX(p.time), yScale(Number(p.value), min, max)]);
      addPolyline(svgIntraday, pts, '#ffd600', { width: '2.2' });
      INTRADAY_PNL.forEach((p, i) => {
        const x = timeToX(p.time);
        const y = yScale(Number(p.value), min, max);
        if (i === 0 || i === INTRADAY_PNL.length - 1 || i % 3 === 0) {
          addCircle(svgIntraday, x, y, i === INTRADAY_PNL.length - 1 ? 4 : 3, i === INTRADAY_PNL.length - 1 ? '#ffd600' : 'rgba(255,255,255,.45)');
        }
      });
      const last = INTRADAY_PNL[INTRADAY_PNL.length - 1];
      addText(svgIntraday, timeToX(last.time) + 10, Math.max(PAD.t + 12, yScale(Number(last.value), min, max) - 8), `${last.time} ${sign(Number(last.value))}${fmt(Number(last.value))}`, { anchor: 'start', size: '10', color: '#ffd600', bold: true });
    } else if (isToday) {
      svgIntraday.parentElement.innerHTML = '<div style="text-align:center;padding:60px 20px;color:var(--text-dim);font-size:.85rem"><div style="margin-bottom:8px;font-size:1.5rem">⏳</div><div>交易时段开始后自动刷新</div><div style="font-size:.75rem;margin-top:4px;opacity:.7">9:30 - 15:15 盘中实时更新</div></div>';
    } else {
      svgIntraday.parentElement.innerHTML = '';
    }
  }

  // --- Chart 3: Stock Price Trends (normalized %) ---
  const svg3 = makeSvg('chartStocks');
  if (svg3) {
    const colors = { '159941': '#448aff', '518880': '#ffd600', '601288': '#00c853' };
    const normalize = (arr) => { const base = arr[0]; return arr.map(v => ((v - base) / base * 100)); };
    const allNorm = Object.keys(HOLDINGS.shares).map(c => normalize(stockPrices[c]));
    const costNorm = Object.keys(HOLDINGS.cost).filter(c => c !== 'total').map(c => {
      const base = stockPrices[c][0];
      return ((HOLDINGS.cost[c] - base) / base * 100);
    });
    const allVals = allNorm.flat().concat(costNorm);
    const min = Math.min(...allVals) - 0.5;
    const max = Math.max(...allVals) + 0.5;
    drawGrid(svg3, min, max, v => v.toFixed(1) + '%');
    Object.keys(HOLDINGS.shares).forEach((code, ci) => {
      drawLine(svg3, allNorm[ci], colors[code], min, max);
      // Cost line
      const costVal = costNorm[ci];
      drawLine(svg3, DAYS.map(() => costVal), colors[code] + '60', min, max, { dash: '4,4', noPoints: true });
    });
    // Legend
    let lx = PAD.l;
    Object.keys(HOLDINGS.shares).forEach(code => {
      addCircle(svg3, lx + 4, 10, 4, colors[code]);
      addText(svg3, lx + 12, 13, HOLDINGS.names[code], { anchor: 'start', size: '9', color: colors[code] });
      lx += 80;
    });
  }

  // --- Chart 4: Index Trends (normalized %) ---
  const svg4 = makeSvg('chartIdx');
  if (svg4) {
    const normalize = (arr) => arr.map(v => ((v - arr[0]) / arr[0] * 100));
    const normSh = normalize(shData);
    const normSz = normalize(szData);
    const normCy = normalize(cyData);
    const allVals = normSh.concat(normSz).concat(normCy);
    const min = Math.min(...allVals) - 0.3;
    const max = Math.max(...allVals) + 0.3;
    drawGrid(svg4, min, max, v => v.toFixed(1) + '%');
    // Zero line
    if (min < 0 && max > 0) {
      const zeroY = yScale(0, min, max);
      addLine(svg4, PAD.l, zeroY, W - PAD.r, zeroY, 'rgba(255,255,255,0.1)', { dash: '3,3' });
    }
    drawLine(svg4, normSh, '#ff1744', min, max);
    drawLine(svg4, normSz, '#448aff', min, max);
    drawLine(svg4, normCy, '#00c853', min, max);
    // Legend
    const items = [['上证', '#ff1744'], ['深成指', '#448aff'], ['创业板', '#00c853']];
    let lx = PAD.l;
    items.forEach(([name, color]) => {
      addCircle(svg4, lx + 4, 10, 4, color);
      addText(svg4, lx + 12, 13, name, { anchor: 'start', size: '9', color });
      lx += 70;
    });
  }

  // --- Chart 5: Daily P&L Attribution ---
  const svg5 = makeSvg('chartAttribution');
  const selected = DAYS[selectedIdx];
  if (svg5) {
    if (summaryTab === 'funds') {
      svg5.parentElement.innerHTML = '<div class="empty-state">基金不展示个股归因</div>';
    } else if (!selected || !selected.price || Object.keys(selected.price).length === 0) {
      svg5.parentElement.innerHTML = '<div style="text-align:center;padding:40px 20px;color:var(--text-dim);font-size:.85rem"><div style="margin-bottom:8px;font-size:1.5rem">📊</div><div>暂无归因数据</div><div style="font-size:.75rem;margin-top:4px;opacity:.7">该日期无持仓价格记录</div></div>';
    } else {
    const attribution = calcPnL(selected).stocks.map(s => ({ name: s.name, code: s.code, value: s.daily || 0 }));
    const maxAbs = Math.max(...attribution.map(i => Math.abs(i.value)), 1);
    const aPad = { l: 72, r: 54, t: PAD.t, b: PAD.b };
    const aPlotW = W - aPad.l - aPad.r;
    const domain = maxAbs * 1.25;
    const zeroX = aPad.l + aPlotW / 2;
    const xMoney = v => aPad.l + ((v + domain) / (domain * 2)) * aPlotW;
    [-maxAbs, -maxAbs / 2, 0, maxAbs / 2, maxAbs].forEach((v, idx) => {
      const x = xMoney(v);
      addLine(svg5, x, PAD.t, x, H - PAD.b, 'rgba(255,255,255,0.07)', { dash: v === 0 ? '' : '3,3' });
      addText(svg5, x, H - PAD.b + 16, `${v >= 0 ? '+' : ''}${v.toFixed(0)}`, {
        size: '9',
        anchor: idx === 0 ? 'start' : idx === 4 ? 'end' : 'middle'
      });
    });
    addText(svg5, W - PAD.r, H - 6, '金额（元）', { anchor: 'end', size: '10', color: '#8b8fa3' });
    addLine(svg5, zeroX, PAD.t, zeroX, H - PAD.b, 'rgba(255,255,255,0.18)', { width: '1' });
    const rowH = plotH / attribution.length;
    attribution.forEach((item, i) => {
      const y = PAD.t + i * rowH + rowH * 0.25;
      const barH = Math.max(rowH * 0.48, 14);
      const endX = xMoney(item.value);
      const barW = Math.abs(endX - zeroX);
      const color = item.value >= 0 ? 'rgba(255,23,68,0.72)' : 'rgba(0,200,83,0.72)';
      if (item.value >= 0) addRect(svg5, zeroX, y, barW, barH, color, { rx: '6' });
      else addRect(svg5, zeroX - barW, y, barW, barH, color, { rx: '6' });
      addText(svg5, aPad.l - 8, y + barH * 0.65, item.name, { anchor: 'end', size: '10', color: '#8b8fa3' });
      addText(svg5, item.value >= 0 ? endX - 8 : endX + 8, y + barH * 0.65, `${sign(item.value)}${fmt(item.value)}`, {
        anchor: item.value >= 0 ? 'end' : 'start',
        size: '11',
        color: '#ffffff',
        bold: true
      });
    });
    }
  }
}

// Override selectDate to also re-render charts
const origSelectDate = selectDate;
selectDate = function(date) {
  origSelectDate(date);
  renderCharts();
  renderCalendar();
};

let waitingWorker = null;

function showUpdateToast() {
  const existingToast = document.getElementById('sw-update-toast');
  if (existingToast) return;
  const toast = document.createElement('div');
  toast.id = 'sw-update-toast';
  toast.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#10b981;color:#fff;padding:12px 20px;z-index:99999;display:flex;align-items:center;justify-content:center;gap:16px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;font-size:14px;box-shadow:0 2px 8px rgba(0,0,0,0.15);';
  toast.innerHTML = '<span>发现新版本，点击刷新</span><button id="sw-refresh-btn" style="background:#fff;color:#10b981;border:none;padding:6px 16px;border-radius:4px;cursor:pointer;font-weight:500;">立即刷新</button>';
  document.body.appendChild(toast);
  document.getElementById('sw-refresh-btn').addEventListener('click', () => {
    if (waitingWorker) {
      waitingWorker.postMessage({ action: 'skipWaiting' });
    }
    window.location.reload();
  });
}

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').then(reg => {
      if (reg.waiting) {
        waitingWorker = reg.waiting;
        showUpdateToast();
        return;
      }
      reg.addEventListener('updatefound', () => {
        const newWorker = reg.installing;
        newWorker.addEventListener('statechange', () => {
          if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
            waitingWorker = newWorker;
            showUpdateToast();
          }
        });
      });
    }).catch(() => {});

    let refreshing = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (refreshing) return;
      refreshing = true;
    });
  });
}
</script>
