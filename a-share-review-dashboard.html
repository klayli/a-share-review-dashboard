}

function selectDate(date) {
  currentDate = date;
  document.getElementById('dateSelect').value = date;
  render();
}

function navDate(dir) {
  const idx = DAYS.findIndex(d => d.date === currentDate);
  const newIdx = idx + dir;
  if (newIdx >= 0 && newIdx < DAYS.length) selectDate(DAYS[newIdx].date);
}

function liveStatusLabel() {
  const latest = latestDay();
  if (currentDate !== latest.date) return '';
  if (isTradingRefreshWindow()) {
    return ` <span class="live-status">实时刷新中${lastLiveUpdateText ? '｜' + lastLiveUpdateText : ''}</span>`;
  }
  return ` <span class="live-status">非交易刷新时段，数据固定${lastLiveUpdateText ? '｜最后更新 ' + lastLiveUpdateText : ''}</span>`;
}

function eastmoneySecid(code) {
  const c = code.charAt(0);
  // 上海: 6(A股), 9(B股), 5(ETF/基金); 其他默认深圳
  return (c === '6' || c === '9' || c === '5') ? '1.' + code : '0.' + code;
}

async function loadEastmoneyQuotes(codes, prevPrices = {}) {
  const fields = 'f43,f57,f60';
  const quotes = {};
  for (const code of codes) {
    try {
      const r = await fetch(`https://push2.eastmoney.com/api/qt/stock/get?secid=${eastmoneySecid(code)}&fields=${fields}&_=${Date.now()}`);
      if (!r.ok) continue;
      const data = await r.json();
      if (data.rc === 0 && data.data) {
        const d = data.data;
        // 动态计算价格缩放比例：股票通常为100，ETF通常为1000
        let scale = 100;
        const knownPrev = prevPrices[code];
        if (knownPrev && d.f60) {
          const ratio = d.f60 / knownPrev;
          if (ratio >= 800 && ratio <= 1200) scale = 1000;
          else if (ratio >= 80 && ratio <= 120) scale = 100;
        }
        const price = d.f43 ? d.f43 / scale : null;
        const prevClose = d.f60 ? d.f60 / scale : null;
        if (price && prevClose && price > 0) {
          quotes[code] = { price, prevClose };
        }
      }
    } catch (e) {
      // 单只失败不影响其他
    }
    // 东方财富接口有频率限制，间隔 400ms
    if (codes.indexOf(code) < codes.length - 1) {
      await new Promise(resolve => setTimeout(resolve, 400));
    }
  }
  return quotes;
}

function loadSinaQuotes(codes) {
  return new Promise((resolve, reject) => {
    const callbackId = 'quoteScript_' + Date.now();
    const symbols = codes.map(code => `${stockPrefix(code)}${code}`);
    const script = document.createElement('script');
    script.id = callbackId;
    script.src = `https://hq.sinajs.cn/list=${symbols.join(',')}&_=${Date.now()}`;
    script.charset = 'gbk';
    script.onload = () => {
      const quotes = {};
      codes.forEach((code, idx) => {
        const raw = window[`hq_str_${symbols[idx]}`];
        if (!raw) return;
        const parts = raw.split(',');
        const price = parseFloat(parts[3]);
        const prevClose = parseFloat(parts[2]);
        if (Number.isFinite(price) && Number.isFinite(prevClose) && price > 0) {
          quotes[code] = { price, prevClose };
        }
      });
      script.remove();
      resolve(quotes);
    };
    script.onerror = () => {
      script.remove();
      reject(new Error('实时行情获取失败'));
    };
    document.body.appendChild(script);
  });
}

async function refreshLivePnL() {
  const today = todayText();
  let todayData = DAYS.find(d => d.date === today);
  if (!todayData) {
    ensureTodayData();
    todayData = DAYS.find(d => d.date === today);
  }
  if (!todayData) return;
  try {
    // 1. 刷新三大指数实时数据（优先新浪JSONP，CORS友好；东财fetch作为备用）
    const sinaIdxList = [
      { sym: 'sh000001', key: 'sh' },
      { sym: 'sz399001', key: 'sz' },
      { sym: 'sz399006', key: 'cy' }
    ];
    const eastmoneyIdxList = [
      { secid: '1.000001', key: 'sh' },
      { secid: '0.399001', key: 'sz' },
      { secid: '0.399006', key: 'cy' }
    ];
    IDX_LIVE = {};
    try {
      // 优先使用新浪财经JSONP（script标签不受CORS限制，与个股行情方案一致）
      let sinaOk = false;
      try {
        const sinaSymbols = sinaIdxList.map(s => s.sym).join(',');
        await new Promise((resolve, reject) => {
          const script = document.createElement('script');
          script.src = `https://hq.sinajs.cn/list=${sinaSymbols}&_=${Date.now()}`;
          script.charset = 'gbk';
          script.async = true;
          script.onload = () => {
            let count = 0;
            sinaIdxList.forEach(({ sym, key }) => {
              const raw = window['hq_str_' + sym];
              if (!raw) return;
              const parts = raw.split(',');
              if (parts.length >= 4) {
                const prevClose = parseFloat(parts[2]);
                const price = parseFloat(parts[3]);
                if (price > 0 && prevClose > 0) {
                  const pct = ((price - prevClose) / prevClose) * 100;
                  todayData.idx[key] = [Number(price.toFixed(2)), Number(pct.toFixed(2))];
                  IDX_LIVE[key] = [Number(price.toFixed(2)), Number(pct.toFixed(2))];
                  count++;
                }
              }
              try { delete window['hq_str_' + sym]; } catch(e) { window['hq_str_' + sym] = null; }
            });
            script.remove();
            if (count >= 3) { sinaOk = true; resolve(); }
            else reject(new Error('sina partial: ' + count));
          };
          script.onerror = () => { script.remove(); reject(new Error('sina network error')); };
          document.body.appendChild(script);
          setTimeout(() => { script.remove(); reject(new Error('sina timeout')); }, 8000);
        });
      } catch(e) {}

      // 新浪失败时，尝试东方财富API（可能被CORS阻止，但在部分环境可用）
      if (!sinaOk) {
        for (const { secid, key } of eastmoneyIdxList) {
          if (IDX_LIVE[key]) continue;
          try {
            const url = `https://push2.eastmoney.com/api/qt/stock/get?secid=${secid}&fields=f43,f57,f60,f170&fltt=2&invt=2&_=${Date.now()}`;
            const r = await fetch(url);
            if (!r.ok) continue;
            const data = await r.json();
            if (data.rc === 0 && data.data) {
              const d = data.data;
              const point = d.f43 || 0;
              const prevClose = d.f60 || 0;
              if (point > 0 && prevClose > 0) {
                const pct = ((point - prevClose) / prevClose) * 100;
                todayData.idx[key] = [Number(point.toFixed(2)), Number(pct.toFixed(2))];
                IDX_LIVE[key] = [Number(point.toFixed(2)), Number(pct.toFixed(2))];
              }
            }
          } catch(e) {}
          await new Promise(resolve => setTimeout(resolve, 200));
        }
      }
      const idxNow = new Date();
      DATA_UPDATED_AT = `${idxNow.getFullYear()}-${pad2(idxNow.getMonth()+1)}-${pad2(idxNow.getDate())} ${pad2(idxNow.getHours())}:${pad2(idxNow.getMinutes())}:${pad2(idxNow.getSeconds())}`;
    } catch(e) {}

    // 2. 刷新个股/ETF实时价格（仅在已登录且有持仓数据时执行）
    const codes = Object.keys(HOLDINGS.shares || {});
    if (codes.length > 0 && dataRevealed) {
      if (!todayData.price) todayData.price = {};
      if (!todayData.prev) todayData.prev = {};
      let quotes;
      try {
        const prevPrices = todayData.prev || {};
        quotes = await loadEastmoneyQuotes(codes, prevPrices);
        if (Object.keys(quotes).length === 0) throw new Error('东财数据为空');
      } catch (e) {
        try {
          quotes = await loadSinaQuotes(codes);
        } catch(e2) {
          quotes = {};
        }
      }
      codes.forEach(code => {
        const q = quotes[code];
        if (!q) return;
        todayData.price[code] = q.price;
        todayData.prev[code] = q.prevClose;
        if (STOCK_INFO[code]) STOCK_INFO[code].price = q.price.toFixed(3);
      });

      // 2.5 刷新备选标的（watchlist）的最新价
      const watchCodes = DAYS.flatMap(dd => (dd.watchlist || []).map(w => w.code)).filter(c => c && STOCK_INFO[c] && STOCK_INFO[c].price === '—');
      const uniqueWatchCodes = [...new Set(watchCodes)];
      if (uniqueWatchCodes.length > 0) {
        try {
          const wq = await loadEastmoneyQuotes(uniqueWatchCodes, {});
          uniqueWatchCodes.forEach(code => {
            if (wq[code]) STOCK_INFO[code].price = wq[code].price.toFixed(3);
          });
        } catch(e) {
          try {
            const wq2 = await loadSinaQuotes(uniqueWatchCodes);
            uniqueWatchCodes.forEach(code => {
              if (wq2[code]) STOCK_INFO[code].price = wq2[code].price.toFixed(3);
            });
          } catch(e2) {}
        }
      }

      // 更新 INTRADAY_PNL：计算证券+基金总盈亏
      const fundDaily = FUND_PORTFOLIO.reduce((s, f) => s + Number(f.dailyIncome || 0), 0);
      const stockCodes = Object.keys(HOLDINGS.shares);
      const stockMv = stockCodes.reduce((s, c) => s + (HOLDINGS.shares[c] || 0) * (todayData.price[c] || 0), 0);
      const prevMv = stockCodes.reduce((s, c) => s + (HOLDINGS.shares[c] || 0) * (todayData.prev[c] || todayData.price[c] || 0), 0);
      const totalPnl = (stockMv - prevMv) + fundDaily;

      const nowTime = timeText();
      const existingIdx = INTRADAY_PNL.findIndex(p => p.time === nowTime);
      if (existingIdx >= 0) {
        INTRADAY_PNL[existingIdx].value = totalPnl;
      } else {
        INTRADAY_PNL.push({ time: nowTime, value: totalPnl });
        try { localStorage.setItem('intradayPnl_' + today, JSON.stringify(INTRADAY_PNL)); } catch(e) {}
      }
      const seen = {};
      INTRADAY_PNL.forEach(p => { seen[p.time] = p.value; });
      INTRADAY_PNL = Object.keys(seen).sort().map(t => ({ time: t, value: seen[t] }));
    }

    const now2 = new Date();
    lastLiveUpdateText = `${now2.getFullYear()}-${pad2(now2.getMonth()+1)}-${pad2(now2.getDate())} ${pad2(now2.getHours())}:${pad2(now2.getMinutes())}:${pad2(now2.getSeconds())}`;
    if (currentDate === today) {
      render();
      renderCharts();
      renderCalendar();
    }
  } catch (err) {
    console.error('[refreshLivePnL] error:', err);
    lastLiveUpdateText = `刷新失败 ${timeText()}`;
    if (currentDate === today) {
      render();
      renderCharts();
    }
  }
}

// === 自动获取市场情绪数据（板块/涨停/成交额等）===
async function refreshMarketData() {
  const today = todayText();
  let todayD = DAYS.find(d => d.date === today);
  if (!todayD) return;
  try {
    // 1. 先获取涨停池数据（用于后续推导板块龙头股）
    const dateStr = today.replace(/-/g, '');
    let ztCount = 0, dtCount = 0, sealCount = 0, totalZt = 0;
    const ztStocks = {};
    const sectorLeaders = {};
    try {
      const ztR = await fetch(`https://push2ex.eastmoney.com/getTopicZTPool?ut=7eea3edcaed734bea9c&dpt=wz.ztzt&Pageindex=0&Pagesize=500&sort=fbt:asc&date=${dateStr}&_=${Date.now()}`);
      if (ztR.ok) {
        const ztData = await ztR.json();
        if (ztData.data && ztData.data.pool) {
          ztData.data.pool.forEach(s => {
            totalZt++;
            if (s.zbc === 0) sealCount++;
            const stockInfo = {
              name: s.n, code: s.c,
              time: typeof s.fbt === 'number' ? String(s.fbt).padStart(6, '0').replace(/(\d{2})(\d{2})(\d{2})/, '$1:$2:$3') : '',
              seal: s.fund ? (s.fund / 10000).toFixed(0) + '万' : '—',
              lbc: s.lbc || 0, hy: s.hy || ''
            };
            ztStocks[s.c] = stockInfo;
            if (s.hy) {
              if (!sectorLeaders[s.hy]) sectorLeaders[s.hy] = [];
              sectorLeaders[s.hy].push(stockInfo);
            }
          });
          ztCount = totalZt;
        }
      }
    } catch(e) {}
    try {
      const dtR = await fetch(`https://push2ex.eastmoney.com/getTopicZTPool?ut=7eea3edcaed734bea9c&dpt=wz.dtzt&Pageindex=0&Pagesize=500&sort=fbt:asc&date=${dateStr}&_=${Date.now()}`);
      if (dtR.ok) {
        const dtData = await dtR.json();
        if (dtData.data && dtData.data.pool) dtCount = dtData.data.pool.length;
      }
    } catch(e) {}

    // 2. 获取板块涨跌幅排行（概念板块+行业板块）
    const sectorUrl = 'https://push2.eastmoney.com/api/qt/clist/get';
    const sectors = [];
    for (const fs of ['m:90+t:2', 'm:90+t:1']) {
      try {
        const r = await fetch(`${sectorUrl}?pn=1&pz=50&po=1&np=1&ut=bd1d9ddb04089700cf9c27f6f7426281&fltt=2&invt=2&fid=f3&fs=${fs}&fields=f12,f14,f3,f10,f15&_=${Date.now()}`);
        if (!r.ok) continue;
        const data = await r.json();
        if (data.data && data.data.diff) {
          sectors.push(...data.data.diff.map(s => ({
            code: s.f12, name: s.f14, pct: s.f3,
            vol: s.f15, amount: s.f10
          })));
        }
      } catch(e) {}
      await new Promise(r => setTimeout(r, 500));
    }
    sectors.sort((a, b) => b.pct - a.pct);
    // 判断是否在交易时段或收盘后1小时内（9:30-16:00，用于获取当日收盘数据）
    const nowH = new Date().getHours();
    const nowM = new Date().getMinutes();
    const isMarketHours = (nowH > 9 || (nowH === 9 && nowM >= 30)) && (nowH < 15 || (nowH === 15 && nowM <= 30));
    const isPostMarket = nowH >= 15 && (nowH < 16 || (nowH === 16 && nowM === 0));
    const canFetchMarketData = isMarketHours || isPostMarket;

    if (sectors.length > 0) {
      function findLeadersForSector(sectorName) {
        const matchedHy = Object.keys(sectorLeaders).find(hy => hy.includes(sectorName) || sectorName.includes(hy));
        if (matchedHy && sectorLeaders[matchedHy] && sectorLeaders[matchedHy].length > 0) {
          return sectorLeaders[matchedHy].slice(0, 4).map(s => `${s.name}(${s.code})`).join(' · ');
        }
        return '';
      }
      todayD.topSectors = sectors.slice(0, 10).map(s => ({ name: s.name, pct: s.pct }));
      todayD.heatMap = sectors.slice(0, 30).map(s => ({ name: s.name, pct: s.pct, vol: s.vol }));
      todayD.sectorHeat = sectors.slice(0, 30).map(s => {
        const leaders = findLeadersForSector(s.name);
        return {
          name: s.name, pct: s.pct,
          size: Math.max(16, Math.min(46, Math.abs(s.pct) * 10)),
          desc: leaders ? `${s.pct >= 0 ? '上涨' : '下跌'}${Math.abs(s.pct).toFixed(2)}%` : '',
          leaders: leaders || (s.pct >= 0 ? '领涨股' : '领跌股')
        };
      });
      todayD.theme = sectors.slice(0, 3).map(s => s.name).join('+');
      todayD.sectorName = sectors.slice(0, 2).map(s => s.name).join('·');
    }

    // 涨停/跌停/封板率/情绪：仅在交易时段且API返回有效数据时更新
    if (isMarketHours && ztCount > 0) {
      todayD.limitUp = ztCount;
      todayD.limitDown = dtCount;
      todayD.sealRate = totalZt > 0 ? (sealCount / totalZt * 100).toFixed(0) + '%' : todayD.sealRate;
      if (ztCount > 100) todayD.sentiment = '强势';
      else if (ztCount > 50) todayD.sentiment = '偏强';
      else if (ztCount > 20) todayD.sentiment = '一般';
      else todayD.sentiment = '偏弱';
    }

    // 3. 更新 watchlist 涨停时间和封单
    if (todayD.watchlist && todayD.watchlist.length > 0 && Object.keys(ztStocks).length > 0) {
      todayD.watchlist.forEach(w => {
        if (w.code && ztStocks[w.code]) {
          w.time = ztStocks[w.code].time || w.time;
          w.seal = ztStocks[w.code].seal || w.seal;
        }
      });
    }

    // 4. 获取两市成交额
    try {
      let totalVol = 0;
      for (const secid of ['1.000001', '0.399001']) {
        try {
          const vr = await fetch(`https://push2.eastmoney.com/api/qt/stock/get?secid=${secid}&fields=f47&fltt=2&invt=2&_=${Date.now()}`);
          if (vr.ok) {
            const vd = await vr.json();
            if (vd.data && vd.data.f47) totalVol += vd.data.f47;
          }
        } catch(e) {}
        await new Promise(r => setTimeout(r, 300));
      }
      if (totalVol > 0) todayD.volume = '约' + (totalVol / 100000000).toFixed(2) + '万亿';
    } catch(e) {}

    // 5-7. 推算策略/隔夜计划/热点汇总（仅在有板块数据时更新）
    if (sectors.length > 0) {
      todayD.strategy = generateStrategy(todayD);
      todayD.overnightPlan = generateOvernightPlan(todayD, ztStocks);
      todayD.appendix = generateAppendix(todayD);
    }
    console.log('[市场数据] 自动更新完成:', new Date().toLocaleTimeString());
    // 触发页面重渲染
    if (currentDate === today) {
      render();
      renderCharts();
      renderCalendar();
    }
  } catch(e) {
    console.warn('[市场数据] 自动更新失败:', e);
  }
}

function generateStrategy(d) {
  const zt = typeof d.limitUp === 'number' ? d.limitUp : parseInt(d.limitUp);
  const sentiment = d.sentiment || '', theme = d.theme || '';
  if (zt > 100 && sentiment === '强势') return `市场情绪强势（${zt}只涨停），主线${theme}，可持股待涨，关注补涨机会`;
  if (zt > 50) return `涨停${zt}只情绪尚可，聚焦${theme}主线，轻仓参与龙头回调`;
  if (zt > 20) return `涨停仅${zt}只情绪偏弱，控制仓位，观望为主，不追高`;
  return `市场极度弱势（涨停${zt}只），空仓等待，严守纪律`;
}

function generateOvernightPlan(d, ztStocks) {
  const theme = d.theme || '';
  const lbcStocks = Object.values(ztStocks).filter(s => s.lbc >= 2).sort((a, b) => b.lbc - a.lbc).slice(0, 5);
  let plan = `主线方向：${theme}\n`;
  if (lbcStocks.length > 0) plan += `关注连板梯队：${lbcStocks.map(s => `${s.name}(${s.lbc}板)`).join('、')}\n`;
  plan += '策略：尾盘观察主线板块龙头承接情况，若封板坚定可考虑隔夜排队';
  return plan;
}

function generateAppendix(d) {
  const lines = [];
  if (d.volume) lines.push(`成交额：${d.volume}`);
  lines.push(`涨停家数：${d.limitUp || '—'}只`);
  lines.push(`跌停家数：${d.limitDown || '—'}只`);
  lines.push(`封板率：${d.sealRate || '—'}`);
  lines.push(`高标情绪：${d.sentiment || '—'}`);
  if (d.theme) lines.push(`当日主题：${d.theme}`);
  if (d.sectorName) lines.push(`主线板块：${d.sectorName}`);
  if (d.topSectors && d.topSectors.length > 0) {
    lines.push(`领涨板块：${d.topSectors.slice(0, 5).map(s => s.name + ' +' + s.pct.toFixed(2) + '%').join('、')}`);
  }
  return lines.join('\n');
}

let calViewMonth = null;
function calMonth(dir) {
  if (!calViewMonth) {
    const parts = currentDate.split('-');
    calViewMonth = parseInt(parts[0]) * 100 + parseInt(parts[1]);
  }
  const y = Math.floor(calViewMonth / 100);
  const m = calViewMonth % 100 + dir;
  if (m < 1) calViewMonth = (y - 1) * 100 + 12;
  else if (m > 12) calViewMonth = (y + 1) * 100 + 1;
  else calViewMonth = y * 100 + m;
  renderCalendar();
}

function renderBarChartSVG(data, labels, container, valueType) {
  const W = 480, H = 220, PAD = { t: 20, r: 16, b: 40, l: 56 };
  const plotW = W - PAD.l - PAD.r, plotH = H - PAD.t - PAD.b;
  const n = data.length;
  if (!n) { container.innerHTML = '<div class="empty-state">暂无数据</div>'; return; }
  const maxAbs = Math.max(...data.map(Math.abs), 0.01);
  const max = maxAbs * 1.15;
  const min = -maxAbs * 1.15;
  const xScale = i => PAD.l + (i / Math.max(n - 1, 1)) * plotW;
  const yScale = v => PAD.t + plotH - ((v - min) / (max - min)) * plotH;
  const zeroY = yScale(0);
  let svg = `<svg viewBox="0 0 ${W} ${H}" width="100%" height="${H}" style="display:block">`;
  for (let i = 0; i <= 4; i++) {
    const v = min + (max - min) * i / 4;
    const y = yScale(v);
    svg += `<line x1="${PAD.l}" y1="${y}" x2="${W-PAD.r}" y2="${y}" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>`;
    svg += `<text x="${PAD.l-6}" y="${y+3}" fill="#8b8fa3" font-size="9" text-anchor="end">${valueType === 'yield' ? v.toFixed(2)+'%' : v.toFixed(0)}</text>`;
  }
  svg += `<line x1="${PAD.l}" y1="${zeroY}" x2="${W-PAD.r}" y2="${zeroY}" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>`;
  const barW = Math.min(plotW / n * 0.65, 32);
  data.forEach((v, i) => {
    const x = xScale(i) - barW / 2;
    const y = v >= 0 ? yScale(v) : zeroY;
    const h = Math.max(Math.abs(yScale(v) - zeroY), 1);
    const color = v >= 0 ? 'rgba(255,23,68,0.72)' : 'rgba(0,200,83,0.72)';
    svg += `<rect x="${x}" y="${y}" width="${barW}" height="${h}" fill="${color}" rx="3"/>`;
    if (n <= 15 || i % Math.ceil(n/10) === 0) {
      svg += `<text x="${xScale(i)}" y="${v >= 0 ? y - 4 : y + h + 12}" fill="#fff" font-size="8" text-anchor="middle">${valueType === 'yield' ? sign(v)+fmt(v)+'%' : sign(v)+fmt(v)}</text>`;
    }
  });
  const step = Math.max(1, Math.ceil(n / 8));
  labels.forEach((l, i) => {
    if (i % step === 0 || i === n - 1) {
      svg += `<text x="${xScale(i)}" y="${H-8}" fill="#8b8fa3" font-size="8" text-anchor="middle">${l}</text>`;
    }
  });
  svg += '</svg>';
  container.innerHTML = svg;
}

function getTabDailyPnl(day) {
  const stockPnl = calcPnL(day);
  const fundDaily = FUND_PORTFOLIO.reduce((s, f) => s + Number(f.dailyIncome || 0), 0);
  const fundMv = FUND_PORTFOLIO.reduce((s, f) => s + Number(f.amount || 0), 0);
  if (summaryTab === 'stocks') {
    return { dailyPnl: stockPnl.dailyPnl, dailyPnlPct: stockPnl.dailyPnlPct };
  }
  if (summaryTab === 'funds') {
    // 今天基金净值T+1未更新，显示0；历史日期使用API值
    const isToday = day.date === todayText();
    const effFund = isToday ? 0 : fundDaily;
    const dailyPnlPct = fundMv > 0 ? (effFund / fundMv * 100) : null;
    return { dailyPnl: effFund, dailyPnlPct: dailyPnlPct };
  }
  const isToday = day.date === todayText();
  const effFund = isToday ? 0 : fundDaily;
  const allDaily = (stockPnl.dailyPnl || 0) + effFund;
  const allMv = stockPnl.mv + fundMv;
  return { dailyPnl: allDaily, dailyPnlPct: allMv > 0 ? (allDaily / allMv * 100) : null };
}

function renderCalendar() {
  const el = document.getElementById('chartDaily');
  if (!el) return;

  // 日历方式显示每日盈亏
  if (!calViewMonth) {
    const parts = currentDate.split('-');
    calViewMonth = parseInt(parts[0]) * 100 + parseInt(parts[1]);
  }
  const y = Math.floor(calViewMonth / 100);
  const m = calViewMonth % 100;
  const prefix = `${y}-${String(m).padStart(2,'0')}`;
  const daysInMonth = new Date(y, m, 0).getDate();
  const firstDay = new Date(y, m - 1, 1).getDay();
  const weekDays = ['一','二','三','四','五','六','日'];

  let h = `<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
    <button onclick="calMonth(-1)" style="background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:4px 10px;cursor:pointer;font-weight:700">‹</button>
    <span style="font-weight:800;min-width:100px;text-align:center">${y}年${m}月</span>
    <button onclick="calMonth(1)" style="background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:4px 10px;cursor:pointer;font-weight:700">›</button>
  </div>`;

  h += '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;text-align:center;font-size:.72rem">';
  weekDays.forEach(wd => { h += `<div style="color:var(--text-dim);padding:4px 0;font-weight:700">${wd}</div>`; });
  let offset = firstDay === 0 ? 6 : firstDay - 1;
  for (let i = 0; i < offset; i++) h += '<div></div>';

  for (let day = 1; day <= daysInMonth; day++) {
    const ds = `${prefix}-${String(day).padStart(2,'0')}`;
    const dayData = DAYS.find(d => d.date === ds);
    const isToday = ds === todayText();
    let cellStyle = 'padding:6px 2px;border-radius:6px;cursor:pointer;';
    let inner = `<div style="font-weight:700">${day}</div>`;
    if (dayData) {
      const pnl = getTabDailyPnl(dayData);
      let v = plValueType === 'yield' ? pnl.dailyPnlPct : pnl.dailyPnl;
      if (v != null) {
        if (v >= 0) cellStyle += 'background:rgba(255,23,68,0.12);border:1px solid rgba(255,23,68,0.3);';
        else cellStyle += 'background:rgba(0,200,83,0.12);border:1px solid rgba(0,200,83,0.3);';
        inner += `<div style="font-size:.68rem;color:${v >= 0 ? '#ff5a5f' : '#00c853'}">${sign(v)}${fmt(v)}${plValueType === 'yield' ? '%' : ''}</div>`;
      } else {
        cellStyle += 'background:var(--card);border:1px solid var(--border);';
        inner += '<div style="font-size:.68rem;color:var(--text-dim)">—</div>';
      }
    } else {
      cellStyle += 'color:var(--text-dim);';
    }
    if (isToday) cellStyle += 'box-shadow:0 0 0 2px var(--yellow);';
    h += `<div style="${cellStyle}" onclick="selectDate('${ds}')">${inner}</div>`;
  }
  h += '</div>';

  const monthDays = DAYS.filter(d => d.date.startsWith(prefix));
  if (monthDays.length) {
    const monthPnl = monthDays.reduce((s, d) => s + (getTabDailyPnl(d).dailyPnl || 0), 0);
    const winDays = monthDays.filter(d => (getTabDailyPnl(d).dailyPnl || 0) > 0).length;
    h += `<div style="display:flex;justify-content:space-between;margin-top:10px;padding:8px 12px;background:var(--card);border-radius:8px;font-size:.78rem;color:var(--text-dim)">
      <span>当月收益：<b style="color:${monthPnl >= 0 ? '#ff5a5f' : '#00c853'}">${sign(monthPnl)}${fmt(monthPnl)}</b></span>
      <span>胜率：<b>${monthDays.length ? (winDays / monthDays.length * 100).toFixed(1) : 0}%</b>（${winDays}/${monthDays.length}）</span>
    </div>`;
  }
  el.innerHTML = h;
}

async function manualRefresh() {
  const btn = document.getElementById('btnRefresh');
  if (btn) { btn.textContent = '⏳ 刷新中...'; btn.style.opacity = '0.6'; btn.disabled = true; }
  try {
    // 1. 刷新持仓API数据（基金净值、持仓信息等）
    await loadPortfolioApi();
    // 2. 刷新实时行情（指数、个股价格）
    await refreshLivePnL();

    await refreshMarketData();
    // 4. 重新渲染所有视图
    render();
    renderWeekChart();
    renderCharts();
    renderCalendar();
    if (btn) { btn.textContent = '✓ 已刷新'; btn.style.opacity = '1'; }
    setTimeout(() => { if (btn) { btn.textContent = '⟳ 刷新数据'; btn.style.opacity = '1'; btn.disabled = false; } }, 2000);
  } catch(e) {
    if (btn) { btn.textContent = '✗ 失败'; btn.style.opacity = '1'; }
    setTimeout(() => { if (btn) { btn.textContent = '⟳ 刷新数据'; btn.style.opacity = '1'; btn.disabled = false; } }, 2000);
  }
}

// === 大盘情绪数据定时保存 ===
// 每30分钟更新一次实时指数到 DAYS 数据，15:30收盘后自动保存到 localStorage
let marketAutoSaveTimer = null;
function startMarketAutoSave() {
  marketAutoSaveTimer = setInterval(async () => {
    const now = new Date();
    // 仅交易日 9:30-15:30 期间执行
    if (now.getHours() < 9 || (now.getHours() === 9 && now.getMinutes() < 30)) return;
    if (now.getHours() >= 16) return;
    const day = now.getDay();
    if (day === 0 || day === 6) return; // 周末不执行

    // 更新当天 DAYS 数据中的指数快照
    const todayD = DAYS.find(dd => dd.date === todayText());
    if (todayD && IDX_LIVE) {
      if (IDX_LIVE.sh) todayD.idx.sh = IDX_LIVE.sh;
      if (IDX_LIVE.sz) todayD.idx.sz = IDX_LIVE.sz;
      if (IDX_LIVE.cy) todayD.idx.cy = IDX_LIVE.cy;
    }

    // 15:30 收盘后自动保存到 localStorage
    if (now.getHours() === 15 && now.getMinutes() >= 30) {
      await refreshMarketData();
      saveMarketData();
      console.log('[市场数据] 15:30 自动保存完成');
    }
  }, 30 * 60 * 1000); // 每30分钟
}

function saveMarketData() {
  try {
    // 保存所有交易日的市场数据快照
    const snapshots = DAYS.map(d => ({
      date: d.date,

      idx: d.idx,
      volume: d.volume,
      limitUp: d.limitUp,
      limitDown: d.limitDown,
      sealRate: d.sealRate,

      theme: d.theme,
      sectorName: d.sectorName,
      topSectors: d.topSectors,

      watchlist: d.watchlist,
      overnightPlan: d.overnightPlan,
      discipline: d.discipline,
      strategy: d.strategy,
      appendix: d.appendix,
    }));
    localStorage.setItem('market_data_snapshots', JSON.stringify(snapshots));
    localStorage.setItem('market_data_saved_at', new Date().toISOString());
  } catch(e) {
    console.warn('[市场数据] 保存失败:', e);
  }
}

function loadMarketData() {
  try {
    const saved = localStorage.getItem('market_data_snapshots');
    if (!saved) return null;
    return JSON.parse(saved);
  } catch(e) {
    return null;
  }
}

function addTodoDetail() {
  const input = document.getElementById('todoInput');
  const text = input.value.trim();
  if (!text) return;
  const todos = getTodos();
  todos.push({ id: Date.now(), text: text, done: false });

  input.value = '';

function toggleTodoDetail(id) {
  const todos = getTodos();
  const t = todos.find(t => t.id === id);

    <div class="info-item"><div class="label">赚钱效应</div><div class="value">${d.earnEffect}</div></div>
  </div>`;

  html += `<div class="info-item" style="margin-bottom:16px"><div class="label" style="margin-bottom:4px;">明日操作方向</div>
    <div><span class="hl-yellow">${d.direction}</span></div></div>`;
  html += `</div>`;

  // === 今日主线板块 ===
  html += `<div class="section"><h2>今日主线板块</h2>
    <div class="sector">
      <div class="sname">${d.sectorName} <span class="badge badge-hot">${d.sectorBadge}</span></div>
      <h3 style="color:var(--yellow);margin-bottom:4px">驱动消息</h3>

        <strong>板块强度：</strong><span class="hl-${d.sectorStrength === '强' ? 'green' : d.sectorStrength === '弱' ? 'red' : 'yellow'}">${d.sectorStrength}</span> — ${linkStocks(d.sectorReason)}
      </div>
    </div>
  </div>`;

  // === 板块热力图 ===
  const heatItems = ((d.sectorHeat && d.sectorHeat.length) ? d.sectorHeat : [{ name:'暂无热力数据', pct:0, size:20, desc:'当前日期未记录行业涨跌幅', leaders:'—' }])
    .slice().sort((a, b) => Math.abs(b.pct) - Math.abs(a.pct));
  html += `<div class="section"><h2>板块热力图</h2><div class="treemap" aria-label="板块热力图">
    ${heatItems.map(item => {
      const alpha = Math.min(Math.abs(item.pct) / 7, 1);
      const bg = item.pct >= 0 ? `rgba(255,23,68,${0.08 + alpha * 0.24})` : `rgba(0,200,83,${0.08 + alpha * 0.24})`;
      const bd = item.pct >= 0 ? 'rgba(255,23,68,0.45)' : 'rgba(0,200,83,0.45)';
      const grow = Math.max(item.size || Math.abs(item.pct) * 10, 16);
      const basis = Math.max(16, Math.min(46, grow * 0.62));
      return `<div class="tree-cell" tabindex="0" style="--grow:${grow};--basis:${basis}%;background:${bg};border-color:${bd}" title="${item.name} ${sign(item.pct)}${fmt(item.pct)}%｜${item.desc}">
        <div class="hn">${item.name}</div>
        <div class="hp ${cls(item.pct)}">${sign(item.pct)}${fmt(item.pct)}%</div>
        <div class="heat-desc">${item.desc}</div>
        <div class="leader-line">龙头：${linkStocks(item.leaders || '—')}</div>
        <div class="tree-tip">
          <div><strong>${item.name}</strong> ${sign(item.pct)}${fmt(item.pct)}%</div>
          <div>${item.desc}</div>
          <div>龙头：${linkStocks(item.leaders || '—')}</div>
        </div>
      </div>`;
    }).join('')}
  </div></div>`;

  // === 备选标的 ===
  html += `<div class="section"><h2>备选标的</h2>`;
  if (d.watchlist && d.watchlist.length > 0) {
    html += `<div class="tbl-wrap watch-table"><table>
      <thead><tr><th>代码</th><th>名称</th><th>最新价</th><th>板块</th><th>涨停时间</th><th>封单</th><th>概念正宗</th><th>明日策略</th></tr></thead>
      <tbody>${d.watchlist.map(w => `<tr>
        <td>${w.code}</td>
        <td style="font-weight:600">${stockTag(w.code, {price:false})}</td>
        <td>${STOCK_INFO[w.code] ? '¥' + STOCK_INFO[w.code].price : '—'}</td>
        <td>${w.sector}</td>
        <td>${w.time}</td>
        <td><span class="badge badge-strong">${w.seal}</span></td>
        <td>${w.pure ? '<span class="badge badge-strong">是</span> ' : ''}${w.pureNote}</td>
        <td><span class="hl-green">${w.strategy}</span></td>
      </tr>`).join('')}</tbody>
    </table></div>`;
    const watchRows = [
      { label:'名称', value:w => stockTag(w.code, {price:false}) },
      { label:'最新价', value:w => STOCK_INFO[w.code] ? '¥' + STOCK_INFO[w.code].price : '—' },
      { label:'板块', value:w => w.sector },
      { label:'涨停时间', value:w => w.time },
      { label:'封单', value:w => w.seal },
      { label:'概念正宗', value:w => `${w.pure ? '是｜' : ''}${w.pureNote}` },
      { label:'明日策略', value:w => `<span class="hl-green">${w.strategy}</span>` }
    ];
    html += `<div class="watch-matrix"><table>
      <tbody>${watchRows.map(row => `<tr>
        <td>${row.label}</td>
        ${d.watchlist.map(w => `<td class="wm-value">${row.value(w)}</td>`).join('')}
      </tr>`).join('')}</tbody>
    </table></div>`;
  } else {
    html += `<div class="info-item">当日无详细备选标的记录。</div>`;
  }
  html += `</div>`;

  // === 隔夜单计划 ===
  html += `<div class="section"><h2>隔夜单计划</h2><div class="info-item">${d.overnight}</div></div>`;

  // === 明日操作纪律 ===
  html += `<div class="section"><h2>明日操作纪律</h2>
    <div class="rules">
      <div class="rules-box"><h3>买入纪律</h3><ol>
        <li>只买主线龙一 / 首个首板 / 首个二板</li>
        <li>买入时间 9:30-10:00</li>
        <li>单票 ≤ 2成，总仓 ≤ 5成</li>
      </ol></div>
      <div class="rules-box"><h3>卖出纪律</h3><ol>
        <li>不涨停 / 低开不翻红 / 冲高回落 / 烂板 → 卖</li>
        <li>止损 -5% 无条件走</li>
        <li>止盈 +8%~+15% 分批卖</li>
      </ol></div>
    </div>
  </div>`;

  // === 明日一句话策略 ===
  html += `<div class="section"><h2>明日一句话策略</h2><div class="strat">${linkStocks(d.strategy)}</div></div>`;

  // === 附录 ===
  html += `<div class="section"><h2>附录 · 当日热点题材汇总</h2><div class="themes">`;
  d.hotThemes.forEach(t => {
    html += `<div class="theme ${t.dim ? 'dim' : ''}">
      <div class="tn"><span class="rank">${t.rank}</span>${t.name} ${t.badge ? '<span class="badge badge-hot">' + t.badge + '</span>' : ''}</div>
      <div class="td">${t.desc}</div>
      <div class="ts">${linkStocks(t.stocks)}</div>
    </div>`;
  });
  html += `</div></div>`;

  document.getElementById('content').innerHTML = html;
}

      </div>
    </div>
  </div>`;

  document.getElementById('content').innerHTML = html;
  renderWeekChart();
}

  results.push({ test: 'switchPlValueType(yield)', pass: plValueType === 'yield', got: plValueType });
  switchPlValueType('amount');
  results.push({ test: 'switchPlValueType(amount)', pass: plValueType === 'amount', got: plValueType });

  // Restore
  plValueType = origValueType;

  const passed = results.filter(r => r.pass).length;
  console.log(`[PL Controls Test] ${passed}/${results.length} passed`);
  results.forEach(r => {
    console.log(`  ${r.pass ? '✓' : '✗'} ${r.test} => ${r.got}`);
  });
  return passed === results.length;
}

// ==================== INIT ====================
async function initApp() {
  initTheme();
  initAuth();
  const poem = CLASSIC_POEMS[Math.floor(Math.random() * CLASSIC_POEMS.length)];
  document.getElementById('versionInfo').innerHTML = `<span class="vi-ver">版本 ${APP_VERSION}</span><span class="vi-date">${APP_VERSION_DATE}</span><span class="vi-poem">「${poem.text}」—— ${poem.author}</span>`;
  // 每次加载时重置基金当日收益（基金净值T+1更新，开盘时当日收益为0）
  FUND_PORTFOLIO.forEach(f => { f.dailyIncome = 0; });
  ensureTodayData();
  await loadPortfolioApi();
  const today = todayText();
  const workerData = await fetchDailyFromWorker(today);
  mergeWorkerDailyData(workerData);
  // 默认选择最新交易日（今天优先，否则选DAYS中最后一天）
  const hasToday = DAYS.some(d => d.date === today);
  currentDate = hasToday ? today : (DAYS.length > 0 ? DAYS[DAYS.length - 1].date : currentDate);
  renderDateButtons();
  render();
  renderCharts();
  renderCalendar();
  loadHeaderCustom();
  runPlControlsTest();
  startLiveRefresh();
  startMarketAutoSave();
  // 页面加载后立即刷新一次市场情绪数据（板块/涨停等）
  refreshMarketData().catch(() => {});
  fetchWeather();
  updateHeaderClock();
  setInterval(updateHeaderClock, 1000);
  setInterval(fetchWeather, 600000);
  scheduleWorkerAutoRefresh();
}
initApp();

function scheduleWorkerAutoRefresh() {
  function checkRefresh() {
    const now = new Date();
    const day = now.getDay();
    if (day < 1 || day > 5) return;
    const h = now.getHours();
    const m = now.getMinutes();
    const currentTime = h * 60 + m;
    const triggers = [10*60, 14*60, 15*60+5];
    for (const t of triggers) {
      if (Math.abs(currentTime - t) < 3) {
        const today = todayText();
        fetchDailyFromWorker(today).then(data => {
          if (data && mergeWorkerDailyData(data)) {
            render();
            renderCharts();
            renderCalendar();
          }
        });
        break;
      }
    }
  }
  setInterval(checkRefresh, 60000);
}

// ==================== CHARTS (Pure SVG) ====================

function renderCharts(dimension = summaryTab) {
  const labels = DAYS.map(d => d.date.slice(5) + ' ' + d.weekday);
  const selectedIdx = DAYS.findIndex(d => d.date === currentDate);
  const n = DAYS.length;

  const allPnl = DAYS.map(d => calcPnL(d));
  const fundMvTotal = FUND_PORTFOLIO.reduce((s, f) => s + Number(f.amount || 0), 0);
  const fundCostTotal = FUND_PORTFOLIO.reduce((s, f) => s + Number(f.shares || 0) * Number(f.unitCost || 0), 0);
  let mvData, costTotal;
  if (dimension === 'all') {
    mvData = allPnl.map(p => p.mv + fundMvTotal);
    costTotal = HOLDINGS.cost.total + fundCostTotal;
  } else if (dimension === 'funds') {
    mvData = DAYS.map(() => fundMvTotal);
    costTotal = fundCostTotal;
  } else {
    mvData = allPnl.map(p => p.mv);
    costTotal = HOLDINGS.cost.total;
  }
  const dailyPnlData = allPnl.map(p => p.dailyPnl);

  const stockPrices = {};
  Object.keys(HOLDINGS.shares).forEach(code => {
    stockPrices[code] = DAYS.map(d => d.price[code]);
  });

  const shData = DAYS.map(d => d.idx.sh[0]);
  const szData = DAYS.map(d => d.idx.sz[0]);
  const cyData = DAYS.map(d => d.idx.cy[0]);

  // SVG chart helper
  const W = 480, H = 200, PAD = { t: 20, r: 20, b: 36, l: 56 };
  const plotW = W - PAD.l - PAD.r, plotH = H - PAD.t - PAD.b;

  function makeSvg(id) {
    const el = document.getElementById(id);
    if (!el) return null;
    el.innerHTML = '';
    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
    svg.setAttribute('width', '100%');
    svg.setAttribute('height', '200');
    svg.style.display = 'block';
    el.appendChild(svg);
    return svg;
  }

  function addText(svg, x, y, text, opts = {}) {
    const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    t.setAttribute('x', x); t.setAttribute('y', y);
    t.setAttribute('fill', opts.color || '#8b8fa3');
    t.setAttribute('font-size', opts.size || '10');
    t.setAttribute('text-anchor', opts.anchor || 'middle');
    t.setAttribute('font-family', '-apple-system, sans-serif');
    if (opts.bold) t.setAttribute('font-weight', '600');
    t.textContent = text;
    svg.appendChild(t);
  }

  function addLine(svg, x1, y1, x2, y2, color, opts = {}) {
    const l = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    l.setAttribute('x1', x1); l.setAttribute('y1', y1);
    l.setAttribute('x2', x2); l.setAttribute('y2', y2);
    l.setAttribute('stroke', color);
    l.setAttribute('stroke-width', opts.width || '1');
    if (opts.dash) l.setAttribute('stroke-dasharray', opts.dash);
    svg.appendChild(l);
  }

  function addCircle(svg, cx, cy, r, color) {
    const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    c.setAttribute('cx', cx); c.setAttribute('cy', cy);
    c.setAttribute('r', r); c.setAttribute('fill', color);
    svg.appendChild(c);
  }

  function addPolyline(svg, points, color, opts = {}) {
    const p = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
    p.setAttribute('points', points.map(pt => pt.join(',')).join(' '));
    p.setAttribute('fill', opts.fill || 'none');
    p.setAttribute('stroke', color);
    p.setAttribute('stroke-width', opts.width || '2');
    p.setAttribute('stroke-linejoin', 'round');
    if (opts.dash) p.setAttribute('stroke-dasharray', opts.dash);
    svg.appendChild(p);
  }

  function addRect(svg, x, y, w, h, color, opts = {}) {
    const r = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    r.setAttribute('x', x); r.setAttribute('y', y);
    r.setAttribute('width', w); r.setAttribute('height', h);
    r.setAttribute('fill', color);
    r.setAttribute('rx', opts.rx || '3');
    svg.appendChild(r);
  }

  function xScale(i) { return PAD.l + (i / (n - 1)) * plotW; }
  function yScale(v, min, max) { return PAD.t + plotH - ((v - min) / (max - min)) * plotH; }

  function drawGrid(svg, min, max, fmtFn, xFn = xScale, xLabels = null) {
    const steps = 4;
    const useLabels = xLabels || labels;
    const maskFn = (v) => dataRevealed ? fmtFn(v) : '****';
    for (let i = 0; i <= steps; i++) {
      const v = min + (max - min) * i / steps;
      const y = yScale(v, min, max);
      addLine(svg, PAD.l, y, W - PAD.r, y, 'rgba(255,255,255,0.06)');
      addText(svg, PAD.l - 6, y + 3, maskFn(v), { anchor: 'end', size: '9' });
    }
    // X labels: loop based on actual label count, not global n
    const xCount = xLabels !== null ? useLabels.length : n;
    for (let i = 0; i < xCount; i++) {
      const x = xFn(i);
      addLine(svg, x, PAD.t, x, H - PAD.b, 'rgba(255,255,255,0.03)');
      if (useLabels[i]) addText(svg, x, H - PAD.b + 14, useLabels[i], { size: '9' });
    }
  }

  function drawLine(svg, data, color, min, max, opts = {}) {
    const points = data.map((v, i) => [xScale(i), yScale(v, min, max)]);
    if (opts.fill) {
      const fillPoints = [...points, [xScale(n-1), yScale(min, min, max)], [xScale(0), yScale(min, min, max)]];
      addPolyline(svg, fillPoints, 'none', { fill: opts.fill });
    }
    addPolyline(svg, points, color, { width: '2', dash: opts.dash });
    if (!opts.noPoints) {
      data.forEach((v, i) => {
        const r = i === selectedIdx ? 5 : 3;
        const c = i === selectedIdx ? '#ffd600' : 'rgba(255,255,255,0.3)';
        addCircle(svg, xScale(i), yScale(v, min, max), r, c);
      });
    }
  }

  // --- Chart 1: Portfolio Value ---
  const svg1 = makeSvg('chartMv');
  if (svg1) {
    const min = Math.min(...mvData, costTotal) * 0.999;
    const max = Math.max(...mvData, costTotal) * 1.001;
    drawGrid(svg1, min, max, v => v.toFixed(0));
    drawLine(svg1, mvData, '#448aff', min, max, { fill: 'rgba(68,138,255,0.1)' });
    drawLine(svg1, DAYS.map(() => costTotal), 'rgba(255,255,255,0.25)', min, max, { dash: '5,5', noPoints: true });
    // Legend
    addText(svg1, W - PAD.r, 12, '— 持仓成本', { anchor: 'end', size: '9', color: 'rgba(255,255,255,0.4)' });
    addText(svg1, W - PAD.r - 80, 12, '● 总市值', { anchor: 'end', size: '9', color: '#448aff' });
  }

  // Daily P&L now rendered as calendar via renderCalendar()
  // --- Chart: Intraday P&L ---
  const svgIntraday = makeSvg('chartIntraday');
  if (svgIntraday) {
    const isToday = currentDate === todayText();
    const hasDataForDate = INTRADAY_PNL.length > 0 && isToday;
    // 时间到 x 坐标的映射（9:30-15:00 固定轴）
    const timeToX = timeStr => {
      const [h, m] = timeStr.split(':').map(Number);
      const mins = h * 60 + m;
      const start = 570; // 9:30
      const end = 900;   // 15:00
      const ratio = Math.max(0, Math.min(1, (mins - start) / (end - start)));
      return PAD.l + ratio * plotW;
    };
    if (hasDataForDate) {
      const vals = INTRADAY_PNL.map(p => Number(p.value));
      const min = Math.min(...vals, 0) * 1.18;
      const max = Math.max(...vals, 0) * 1.18 || 1;
      // 固定横轴：只画水平网格，不画竖直网格（下面手动画）
      drawGrid(svgIntraday, min, max, v => v.toFixed(0), () => PAD.l, []);
      // 固定时间轴刻度
      const timeLabels = [
        { time: '9:30', label: '9:30' },
        { time: '10:30', label: '10:30' },
        { time: '11:30', label: '11:30' },
        { time: '14:00', label: '14:00' },
        { time: '15:00', label: '15:00' }
      ];
      timeLabels.forEach(({ time, label }) => {
        const x = timeToX(time);
        addLine(svgIntraday, x, PAD.t, x, H - PAD.b, 'rgba(255,255,255,0.03)');
        addLine(svgIntraday, x, H - PAD.b, x, H - PAD.b + 4, 'rgba(255,255,255,0.3)');
        addText(svgIntraday, x, H - 4, label, { anchor: 'middle', size: '8', color: '#8b8fa3' });
      });
      const zeroY2 = yScale(0, min, max);
      addLine(svgIntraday, PAD.l, zeroY2, W - PAD.r, zeroY2, 'rgba(255,255,255,0.16)', { width: '1' });
      const pts = INTRADAY_PNL.map(p => [timeToX(p.time), yScale(Number(p.value), min, max)]);
      addPolyline(svgIntraday, pts, '#ffd600', { width: '2.2' });
      INTRADAY_PNL.forEach((p, i) => {
        const x = timeToX(p.time);
        const y = yScale(Number(p.value), min, max);
        if (i === 0 || i === INTRADAY_PNL.length - 1 || i % 3 === 0) {
          addCircle(svgIntraday, x, y, i === INTRADAY_PNL.length - 1 ? 4 : 3, i === INTRADAY_PNL.length - 1 ? '#ffd600' : 'rgba(255,255,255,.45)');
        }
      });
      const last = INTRADAY_PNL[INTRADAY_PNL.length - 1];
      addText(svgIntraday, timeToX(last.time) + 10, Math.max(PAD.t + 12, yScale(Number(last.value), min, max) - 8), `${last.time} ${sign(Number(last.value))}${fmt(Number(last.value))}`, { anchor: 'start', size: '10', color: '#ffd600', bold: true });
    } else if (isToday) {
      svgIntraday.parentElement.innerHTML = '<div style="text-align:center;padding:60px 20px;color:var(--text-dim);font-size:.85rem"><div style="margin-bottom:8px;font-size:1.5rem">⏳</div><div>交易时段开始后自动刷新</div><div style="font-size:.75rem;margin-top:4px;opacity:.7">9:30 - 15:15 盘中实时更新</div></div>';
    } else {
      svgIntraday.parentElement.innerHTML = '';
    }
  }

  // --- Chart 3: Stock Price Trends (normalized %) ---
  const svg3 = makeSvg('chartStocks');
  if (svg3) {
    const colors = { '159941': '#448aff', '518880': '#ffd600', '601288': '#00c853' };
    const normalize = (arr) => { const base = arr[0]; return arr.map(v => ((v - base) / base * 100)); };
    const allNorm = Object.keys(HOLDINGS.shares).map(c => normalize(stockPrices[c]));
    const costNorm = Object.keys(HOLDINGS.cost).filter(c => c !== 'total').map(c => {
      const base = stockPrices[c][0];
      return ((HOLDINGS.cost[c] - base) / base * 100);
    });
    const allVals = allNorm.flat().concat(costNorm);
    const min = Math.min(...allVals) - 0.5;
    const max = Math.max(...allVals) + 0.5;
    drawGrid(svg3, min, max, v => v.toFixed(1) + '%');
    Object.keys(HOLDINGS.shares).forEach((code, ci) => {
      drawLine(svg3, allNorm[ci], colors[code], min, max);
      // Cost line
      const costVal = costNorm[ci];
      drawLine(svg3, DAYS.map(() => costVal), colors[code] + '60', min, max, { dash: '4,4', noPoints: true });
    });
    // Legend
    let lx = PAD.l;
    Object.keys(HOLDINGS.shares).forEach(code => {
      addCircle(svg3, lx + 4, 10, 4, colors[code]);
      addText(svg3, lx + 12, 13, HOLDINGS.names[code], { anchor: 'start', size: '9', color: colors[code] });
      lx += 80;
    });
  }

  // --- Chart 4: Index Trends (normalized %) ---
  const svg4 = makeSvg('chartIdx');
  if (svg4) {
    const normalize = (arr) => arr.map(v => ((v - arr[0]) / arr[0] * 100));
    const normSh = normalize(shData);
    const normSz = normalize(szData);
    const normCy = normalize(cyData);
    const allVals = normSh.concat(normSz).concat(normCy);
    const min = Math.min(...allVals) - 0.3;
    const max = Math.max(...allVals) + 0.3;
    drawGrid(svg4, min, max, v => v.toFixed(1) + '%');
    // Zero line
    if (min < 0 && max > 0) {
      const zeroY = yScale(0, min, max);
      addLine(svg4, PAD.l, zeroY, W - PAD.r, zeroY, 'rgba(255,255,255,0.1)', { dash: '3,3' });
    }
    drawLine(svg4, normSh, '#ff1744', min, max);
    drawLine(svg4, normSz, '#448aff', min, max);
    drawLine(svg4, normCy, '#00c853', min, max);
    // Legend
    const items = [['上证', '#ff1744'], ['深成指', '#448aff'], ['创业板', '#00c853']];
    let lx = PAD.l;
    items.forEach(([name, color]) => {
      addCircle(svg4, lx + 4, 10, 4, color);
      addText(svg4, lx + 12, 13, name, { anchor: 'start', size: '9', color });
      lx += 70;
    });
  }

  // --- Chart 5: Daily P&L Attribution ---
  const svg5 = makeSvg('chartAttribution');
  const selected = DAYS[selectedIdx];
  if (svg5) {
    if (summaryTab === 'funds') {
      svg5.parentElement.innerHTML = '<div class="empty-state">基金不展示个股归因</div>';
    } else if (!selected || !selected.price || Object.keys(selected.price).length === 0) {
      svg5.parentElement.innerHTML = '<div style="text-align:center;padding:40px 20px;color:var(--text-dim);font-size:.85rem"><div style="margin-bottom:8px;font-size:1.5rem">📊</div><div>暂无归因数据</div><div style="font-size:.75rem;margin-top:4px;opacity:.7">该日期无持仓价格记录</div></div>';
    } else {
    const attribution = calcPnL(selected).stocks.map(s => ({ name: s.name, code: s.code, value: s.daily || 0 }));
    const maxAbs = Math.max(...attribution.map(i => Math.abs(i.value)), 1);
    const aPad = { l: 72, r: 54, t: PAD.t, b: PAD.b };
    const aPlotW = W - aPad.l - aPad.r;
    const domain = maxAbs * 1.25;
    const zeroX = aPad.l + aPlotW / 2;
    const xMoney = v => aPad.l + ((v + domain) / (domain * 2)) * aPlotW;
    [-maxAbs, -maxAbs / 2, 0, maxAbs / 2, maxAbs].forEach((v, idx) => {
      const x = xMoney(v);
      addLine(svg5, x, PAD.t, x, H - PAD.b, 'rgba(255,255,255,0.07)', { dash: v === 0 ? '' : '3,3' });
      addText(svg5, x, H - PAD.b + 16, `${v >= 0 ? '+' : ''}${v.toFixed(0)}`, {
        size: '9',
        anchor: idx === 0 ? 'start' : idx === 4 ? 'end' : 'middle'
      });
    });
    addText(svg5, W - PAD.r, H - 6, '金额（元）', { anchor: 'end', size: '10', color: '#8b8fa3' });
    addLine(svg5, zeroX, PAD.t, zeroX, H - PAD.b, 'rgba(255,255,255,0.18)', { width: '1' });
    const rowH = plotH / attribution.length;
    attribution.forEach((item, i) => {
      const y = PAD.t + i * rowH + rowH * 0.25;
      const barH = Math.max(rowH * 0.48, 14);
      const endX = xMoney(item.value);
      const barW = Math.abs(endX - zeroX);
      const color = item.value >= 0 ? 'rgba(255,23,68,0.72)' : 'rgba(0,200,83,0.72)';
      if (item.value >= 0) addRect(svg5, zeroX, y, barW, barH, color, { rx: '6' });
      else addRect(svg5, zeroX - barW, y, barW, barH, color, { rx: '6' });
      addText(svg5, aPad.l - 8, y + barH * 0.65, item.name, { anchor: 'end', size: '10', color: '#8b8fa3' });
      addText(svg5, item.value >= 0 ? endX - 8 : endX + 8, y + barH * 0.65, `${sign(item.value)}${fmt(item.value)}`, {
        anchor: item.value >= 0 ? 'end' : 'start',
        size: '11',
        color: '#ffffff',
        bold: true
      });
    });
    }
  }
}

selectDate = function(date) {
  origSelectDate(date);
  renderCharts();
  renderCalendar();
};

  window.addEventListener('load', () => {
